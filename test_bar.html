<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>进度条测试</title>
<style>
.bar-track{width:80px;height:8px;background:#ebebec;border-radius:4px;overflow:hidden;margin:8px 0}
.bar-fill{height:100%;border-radius:4px;width:0%;transition:width 1.2s cubic-bezier(0.25,0.46,0.45,0.94)}
.bar-fill.high{background:#27ae60}
.bar-fill.mid{background:#ec852b}
.bar-fill.low{background:#b03d3d}
</style>
</head>
<body>
<h3>进度条测试</h3>
<p>方法1: CSS width:0% + JS transition</p>
<div class="bar-track"><div class="bar-fill high" id="test1" data-tw="70%"></div></div>
<span id="r1">等待...</span>

<p>方法2: 内联 style 直接设宽度</p>
<div class="bar-track"><div class="bar-fill mid" style="width:60%"></div></div>
<span>60% - 直接设</span>

<p>方法3: 完全不设width，JS设</p>
<div class="bar-track"><div class="bar-fill high" id="test3"></div></div>
<span id="r3">等待...</span>

<script>
// 方法1: 双RAF后设
requestAnimationFrame(()=>requestAnimationFrame(()=>{
  const el1=document.getElementById('test1');
  const tw=el1.dataset.tw;
  el1.style.width=tw;
  document.getElementById('r1').textContent='已设 width='+tw+' 实际='+getComputedStyle(el1).width;
}));

// 方法3: 直接设
setTimeout(()=>{
  const el3=document.getElementById('test3');
  el3.style.width='80%';
  document.getElementById('r3').textContent='已设 width=80% 实际='+getComputedStyle(el3).width;
},500);
</script>
</body>
</html>
