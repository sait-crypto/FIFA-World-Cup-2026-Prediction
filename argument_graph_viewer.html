<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>真实辩论图演化</title>
<style>
:root{--bg:#f5f7fa;--panel:#fff;--canvas:#f2f5f8;--node:#fff;--line:#d9e0e8;--structural:#8795a4;--evidence:#426b8d;--evidence-fill:#e5f0f7;--text:#18212d;--muted:#687587;--primary:#176ff2;--support:#14845b;--attack:#c64444;--query:#a16810;--changed:#ffb020;--shadow:0 8px 26px rgba(35,48,66,.09)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif}
button,select,input{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:20;background:#172230;color:#fff;border-bottom:1px solid #26364a}
.top-inner{max-width:1500px;margin:auto;padding:11px 18px;display:flex;align-items:center;gap:12px}.back{color:#c8d3df;text-decoration:none}.title{font-weight:750;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.spacer{flex:1}.mode{font-size:12px;color:#9fb0c2}
.load{min-height:82vh;display:grid;place-items:center;padding:24px}.load-card{width:min(620px,100%);background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);padding:30px;text-align:center}.drop{margin-top:18px;border:1px dashed #9aa8b8;padding:26px;color:var(--muted);background:#fafbfd}.drop.drag{border-color:var(--primary);color:var(--primary)}
.app{display:none;max-width:1500px;margin:auto;padding:18px}.controls{display:grid;grid-template-columns:auto auto minmax(240px,1fr) auto auto;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);padding:12px;box-shadow:var(--shadow)}
.btn{border:1px solid var(--line);background:#fff;color:var(--text);padding:7px 12px}.btn:hover{border-color:var(--primary);color:var(--primary)}.range{width:100%;accent-color:var(--primary)}.version{min-width:78px;text-align:center;font-weight:750}.agent-select,.graph-view{min-width:142px;padding:6px 7px;border:1px solid var(--line);background:var(--panel);color:var(--text)}
.meta{margin-top:8px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;font-size:12px}.grid{display:grid;grid-template-columns:minmax(0,1fr) 330px;align-items:start;gap:10px;margin-top:10px}.main-column{display:grid;grid-template-columns:minmax(0,1fr);gap:10px;min-width:0;align-content:start}.panel{background:var(--panel);border:1px solid var(--line);box-shadow:0 4px 14px rgba(35,48,66,.05);align-self:start}.panel-head{padding:8px 11px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;font-weight:700}.focus-note{font-size:11px;font-weight:400;color:var(--muted)}.legend{margin-left:auto;display:flex;gap:9px;font-size:11px;color:var(--muted)}.legend i{display:inline-block;width:14px;height:2px;margin-right:4px;vertical-align:middle}.canvas-wrap{position:relative;overflow:auto;height:640px;min-height:640px;background:var(--canvas)}#graph{display:block;min-width:820px;min-height:640px;background:var(--canvas)}.graph-tooltip{display:none;position:absolute;z-index:8;max-width:300px;padding:7px 9px;background:var(--panel);color:var(--text);border:1px solid var(--line);box-shadow:var(--shadow);font-size:12px;pointer-events:none;white-space:normal}.graph-tooltip.show{display:block}.side{display:grid;gap:10px;align-content:start}.event{padding:12px}.event-top{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap}.speaker{font-weight:800}.tag{font-size:11px;border:1px solid var(--line);padding:1px 6px;color:var(--muted)}.action{color:var(--primary);border-color:#bcd3f7;background:#f1f6ff}.speech{white-space:pre-wrap;max-height:170px;overflow:auto;padding:8px;background:#f7f9fb;border-left:2px solid var(--primary);color:#344052}.patch{margin-top:8px;display:grid;grid-template-columns:auto 1fr;gap:3px 8px;font-size:12px}.patch dt{color:var(--muted)}.patch dd{margin:0;overflow-wrap:anywhere}.atom-list{margin:8px 0 0;padding:0;list-style:none;display:grid;gap:5px}.atom-list li{font-size:12px;padding-left:7px;border-left:2px solid var(--line)}
.stats{padding:12px}.status-line{display:flex;flex-wrap:wrap;gap:8px 16px;color:var(--muted);font-size:12px}.status-line b{color:var(--text);font-size:14px;margin-right:3px}.status-line .decision-status{color:var(--primary)}.atom-list .muted{color:var(--muted)}
.detail{padding:13px}.detail h3{margin:0 0 8px;font-size:14px}.detail-text{white-space:pre-wrap;color:#344052}.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}.chip{font-size:11px;padding:2px 6px;border:1px solid #cbd5df;background:#f7f9fb}.meters{display:grid;gap:7px;margin-top:11px}.meter-row{display:grid;grid-template-columns:72px 1fr 44px;gap:7px;align-items:center;font-size:11px;color:var(--muted)}.meter{height:6px;background:#e7ecf1}.meter>i{display:block;height:100%;background:var(--primary)}
.timeline{min-width:0;width:auto;justify-self:stretch;overflow:hidden}.timeline-list{display:flex;min-width:0;width:auto;gap:5px;padding:8px;overflow-x:auto}.step{flex:0 0 100px;border:1px solid var(--line);background:#fff;text-align:left;padding:6px}.step.active{border-color:var(--primary);box-shadow:inset 0 -2px var(--primary)}.step .v{font-weight:700;font-size:12px}.step .who{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:11px}.step .op{font-size:11px;margin-top:1px}.empty{padding:18px;color:var(--muted);text-align:center}.error{color:#a42c2c}.hint{font-size:12px;color:var(--muted);margin-top:8px}
@media(max-width:980px){.grid{grid-template-columns:1fr}.side{grid-template-columns:1fr 1fr}.controls{grid-template-columns:auto auto 1fr}.agent-select{grid-column:1/-1}.canvas-wrap{height:560px;min-height:560px}#graph{min-height:560px}}@media(max-width:620px){.app{padding:10px}.side{grid-template-columns:1fr}.controls{grid-template-columns:auto auto 1fr}.version{grid-column:1/-1}.legend,.focus-note{display:none}.top-inner{padding:10px}.mode{display:none}.graph-view{min-width:108px}.canvas-wrap{height:520px;min-height:520px}#graph{min-height:520px}}
</style>
</head>
<body>
<header class="top"><div class="top-inner"><a class="back" href="match.html">← 返回</a><div class="title" id="title">真实辩论图演化</div><div class="spacer"></div><div class="mode" id="mode-label">真实发言 · 理由共识 · 开放答案</div></div></header>

<main class="load" id="load"><section class="load-card"><h2>载入渐进共识辩论 JSON</h2><p id="load-msg">通过 <code>?json=data/xxx.json</code> 自动读取，或选择本地输出文件。</p><div class="drop" id="drop">拖放 JSON 到这里，或点击选择<input id="file" type="file" accept=".json" hidden></div></section></main>

<main class="app" id="app">
  <section class="controls">
    <button class="btn" id="prev">← 上一步</button><button class="btn" id="next">下一步 →</button>
    <input class="range" id="range" type="range" min="0" value="0">
    <div class="version" id="version">v0</div><select class="agent-select" id="agent" title="查看该 Agent 截至当前版本的个体评价"></select>
  </section>
  <div class="meta" id="meta"></div>
  <section class="grid">
    <div class="main-column">
      <article class="panel"><div class="panel-head">公共论证图 <span class="tag" id="graph-count"></span><select class="graph-view" id="graph-view" aria-label="选择公共图突出方式"><option value="active">突出有效节点</option><option value="episode">本次对抗空间</option><option value="debate">突出争议前沿</option><option value="consensus">突出共识骨架</option><option value="all">等权显示全部</option></select><span class="focus-note" id="focus-note">全部既有节点常驻；悬浮看摘要，点击看详情</span><span class="legend"><span><i style="background:var(--evidence);height:2px"></i>证据绑定</span><span><i style="background:var(--support)"></i>支持</span><span><i style="background:var(--attack)"></i>反驳</span><span><i style="background:var(--query)"></i>对抗焦点</span><span><i style="background:var(--changed);height:4px"></i>本事件变化</span></span></div><div class="canvas-wrap" id="canvas-wrap"><svg id="graph" role="img" aria-label="公共论证图"></svg><div class="graph-tooltip" id="graph-tooltip" role="tooltip"></div></div></article>
      <section class="panel timeline"><div class="panel-head">真实事件时间线</div><div class="timeline-list" id="timeline"></div></section>
    </div>
    <aside class="side">
      <section class="panel event" id="event"></section>
      <section class="panel stats" id="stats"></section>
      <section class="panel detail" id="detail"></section>
    </aside>
  </section>
  <p class="hint" id="graph-hint">理由层由 snapshots 累积共识与分歧；决策层由 forecast_history 重建候选答案竞争。答案收敛不等于事实共识，只有 final_decision 才关闭任务。</p>
</main>

<script>
const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let DATA=null,GRAPH=null,EVENTS=[],current=0,selectedNode='';
const OP={propose:'提出',support:'支持',attack:'反驳',undercut:'削弱前提',condition:'补充条件',query:'质疑',assess:'重新评价',retract:'撤回',supersede:'修订替代',episode:'对手戏事务'};
const STATUS={proposed:'待讨论',contested:'争议',insufficient_coverage:'覆盖不足',under_grounded:'证据不足',emerging_consensus:'共识萌芽',provisional_consensus:'暂定共识',provisionally_rejected:'暂时否决',leaning_support:'偏支持',leaning_oppose:'偏反对',unresolved:'未决'};
const LIFECYCLE={active:'有效',challenged:'受到质疑',superseded:'已被替代',retracted:'已撤回'};

function patchStatements(patch){if(!patch)return[];return Array.isArray(patch.statements)?patch.statements:[patch]}
function taskSchema(){return GRAPH?.task_schema||{task_type:'forecast',value_refinement_enabled:true,probability_required:false,evidence_contract:'off'}}
function isVerification(){return taskSchema().task_type==='fact_verification'}
function decisionText(item){return String(item?.label||item?.winner||'')+(item?.score?` ${item.score}`:'')}
function probabilityText(item){const p=item?.probabilities||{},parts=Object.entries(p).map(([label,value])=>`${label} ${(Number(value)*100).toFixed(1)}%`);return parts.join(' · ')}

function flattenMessages(){const out=[];(DATA.rounds||[]).forEach((round,ri)=>(round||[]).forEach((m,mi)=>{if(m&&m.role==='assistant')out.push({...m,_round:ri+1,_order:mi+1})}));return out}
function numOr(value,fallback=0){if(value===null||value===undefined||value==='')return fallback;const n=Number(value);return Number.isFinite(n)?n:fallback}
function makeEvents(){
  const messages=flattenMessages(),snaps=[...(GRAPH.snapshots||[])].sort((a,b)=>Number(a.version)-Number(b.version));
  const snapByVersion=new Map(snaps.map(s=>[Number(s.version),s]));
  EVENTS=[{version:0,forecast_sequence:0,author:'系统',operation:'init',changed_targets:[],message:null}];
  for(const s of snaps){
    const systemSeed=String(s.author||'').startsWith('系统');
    if(systemSeed)EVENTS.push({...s,forecast_sequence:0,message:null,system_event:true});
  }
  let lastVersion=EVENTS.at(-1)?.version||0,lastSequence=0;
  for(let i=0;i<messages.length;){
    const first=messages[i],episodeId=first.graph_episode_id||'';
    if(!episodeId){
      const version=numOr(first.graph_version,lastVersion),forecastSequence=numOr(first.forecast_sequence,lastSequence),statements=patchStatements(first.argument_patch),snap=snapByVersion.get(version);
      EVENTS.push({version,forecast_sequence:forecastSequence,author:first.speaker||'Agent',operation:statements.length>1?'episode':statements[0]?.operation||(forecastSequence>lastSequence?'forecast':'speak'),changed_targets:snap?.changed_targets||[],message:first});
      lastVersion=Math.max(lastVersion,version);lastSequence=Math.max(lastSequence,forecastSequence);i++;continue;
    }
    const group=[];while(i<messages.length&&messages[i].graph_episode_id===episodeId)group.push(messages[i++]);
    const beforeVersion=lastVersion,beforeSequence=lastSequence;
    for(let gi=0;gi<group.length;gi++){const m=group[gi];EVENTS.push({version:beforeVersion,forecast_sequence:beforeSequence,author:m.speaker||'Agent',operation:'speak',changed_targets:[],message:m,pending_episode:true,graph_episode_id:episodeId,episode_context_messages:group.slice(0,gi+1)})}
    const version=Math.max(beforeVersion,...group.map(m=>numOr(m.graph_version,beforeVersion))),forecastSequence=Math.max(beforeSequence,...group.map(m=>numOr(m.forecast_sequence,beforeSequence))),snap=snapByVersion.get(version);
    EVENTS.push({version,forecast_sequence:forecastSequence,author:snap?.author||group.map(m=>m.speaker).join(' ↔ '),operation:'episode',changed_targets:snap?.changed_targets||[],message:null,episode_messages:group,graph_episode_id:episodeId});
    lastVersion=version;lastSequence=forecastSequence;
  }
  if(GRAPH.final_decision){const f=GRAPH.final_decision;EVENTS.push({version:Number(f.graph_version)||lastVersion,forecast_sequence:Number(f.forecast_sequence)||lastSequence,author:f.author||'仲裁者',operation:'finalize',changed_targets:[f.outcome_id,f.score_id].filter(Boolean),message:null,final_decision:f})}
}
function decisionNodes(){
  if((GRAPH.decision_nodes||[]).length)return GRAPH.decision_nodes;
  return (GRAPH.claims||[]).filter(x=>x.kind==='hypothesis').map(x=>({...x,kind:'outcome',parent_id:'',outcome:x.text,created_sequence:0}));
}
function loadData(data){
  if(!data?.argument_graph){showError('该输出没有 argument_graph。请使用 progressive_consensus 模式生成真实辩论结果后再载入。');return}
  DATA=data;GRAPH=data.argument_graph;makeEvents();current=EVENTS.length-1;selectedNode=decisionNodes().find(x=>x.kind==='task')?.id||decisionNodes()[0]?.id||(GRAPH.claims||[])[0]?.id||'';
  $('#title').textContent=`${DATA.topic||'辩论'} · 图演化`;document.title=$('#title').textContent;
  const agents=GRAPH.participants||[];$('#agent').innerHTML=['<option value="">公共视角</option>',...agents.map(a=>`<option value="${esc(a)}">个体：${esc(a)}</option>`)].join('');
  $('#mode-label').textContent=isVerification()?'真实发言 · 证据契约 · 标签概率':'真实发言 · 理由共识 · 开放答案';
  $('#focus-note').textContent=taskSchema().value_refinement_enabled?'全部既有节点常驻；比分归入结果分支':'全部既有节点常驻；标签候选保持开放';
  $('#graph-hint').textContent=isVerification()?'理由层逐步积累共识与分歧；标签概率是显式决策输出，不由自评 confidence 推导，且默认未校准。':'理由层逐步积累共识与分歧；答案收敛不等于事实共识，只有 final_decision 才关闭任务。';
  $('#range').max=Math.max(0,EVENTS.length-1);$('#range').value=current;$('#load').style.display='none';$('#app').style.display='block';render();
}
function showError(msg){$('#load-msg').innerHTML=`<span class="error">${esc(msg)}</span>`}
async function loadUrl(path){try{$('#load-msg').textContent='正在读取真实辩论输出…';const r=await fetch(path,{cache:'no-cache'});if(!r.ok)throw new Error(`HTTP ${r.status}`);loadData(await r.json())}catch(e){showError(`读取失败：${e.message}`)}}
function readFile(file){const r=new FileReader();r.onload=()=>{try{loadData(JSON.parse(r.result))}catch(e){showError(`JSON 解析失败：${e.message}`)}};r.readAsText(file)}

function currentEvent(){return EVENTS[current]||EVENTS[0]}
function episodeDrafts(messages,episodeId){
  const nodes=[],relations=[];(messages||[]).forEach((message,messageIndex)=>patchStatements(message.argument_patch).forEach((patch,patchIndex)=>{const local=String(patch.local_id||`L${patchIndex+1}`).toUpperCase(),id=`DL${messageIndex}-${local}`,summary=patch.claim_summary||patch.claim||patch.verbatim||`评价 ${patch.target_id||''}`,operation=patch.operation||'propose',stance=Number(patch.stance||0),relation=operation==='assess'?(stance<-.15?'attack':stance>.15?'support':'question'):operation==='query'?'question':operation==='propose'?'':operation,evidenceIds=[...new Set([...(patch.evidence_ids||[]),...(patch.evidence_bindings||[]).map(x=>x.evidence_id)])];nodes.push({id,text:summary,verbatim:patch.verbatim||'',kind:'draft',author:message.speaker||'Agent',local_id:local,operation,target_id:patch.target_id||'',evidence_ids:evidenceIds,stance,confidence:Number(patch.confidence??.5),episode_id:episodeId,created_version:Number(currentEvent()?.version||0)});if(patch.target_id&&relation)relations.push({id:`DR-${id}`,source_id:id,target_id:patch.target_id,relation,draft:true})}));return{nodes,relations}
}
function episodeSpace(e=currentEvent()){
  const id=e?.graph_episode_id||e?.message?.graph_episode_id||'';if(!id)return{id:'',targets:new Set(),changed:new Set(),participants:[],messages:[]};
  const messages=e.episode_messages||e.episode_context_messages||(e.message?[e.message]:[]),episode=(GRAPH.episode_history||[]).find(item=>item.id===id),targets=new Set(),changed=new Set(e.changed_targets||[]),participants=[];
  for(const message of messages){for(const target of message.graph_target_ids||[])targets.add(target);for(const patch of patchStatements(message.argument_patch))if(patch.target_id)targets.add(patch.target_id);if(message.speaker&&!participants.includes(message.speaker))participants.push(message.speaker)}
  for(const target of episode?.changed_targets||[])if(e.episode_messages)changed.add(target);
  const drafts=episodeDrafts(messages,id);return{id,targets,changed,participants:episode?.authors||participants,messages,operationCount:episode?.operation_count||0,draftCount:drafts.nodes.length,drafts}
}
function normalizeConsensusState(st){if(st?.status==='insufficient_coverage'&&Number(st.assessor_count||0)>=2&&Number(st.acceptance||0)>=.55&&Number(st.controversy||0)<.45&&Number(st.groundedness||0)>=.5)return{...st,status:'emerging_consensus'};return st}
function publicStates(version){const map=new Map();for(const s of GRAPH.snapshots||[]){if(s.version>version)break;for(const st of s.states||[])map.set(st.target_id,normalizeConsensusState(st))}return map}
function lifecycleAt(id,version){let status='active';for(const item of GRAPH.lifecycle_history||[]){if(Number(item.version)>version)break;if(item.target_id===id)status=item.status}return status}
function privateStates(agent,version){
  const map=new Map();if(!agent)return map;const history=GRAPH.assessment_history||[];
  for(const a of history){if(a.agent===agent&&a.version<=version)map.set(a.target_id,a)}
  if(!history.length){for(const [target,items] of Object.entries(GRAPH.assessments||{})){for(const a of items||[]){if(a.agent===agent&&a.version<=version)map.set(target,a)}}}
  return map
}
function forecastsAt(sequence){const map=new Map();for(const f of [...(GRAPH.forecast_history||[])].sort((a,b)=>a.sequence-b.sequence)){if(Number(f.sequence)>sequence)break;map.set(f.agent,f)}if(!(GRAPH.forecast_history||[]).length){for(const f of GRAPH.forecast_commitments||[])if(Number(f.sequence||0)<=sequence)map.set(f.agent,f)}return map}
function forecastAtEvent(e){return (GRAPH.forecast_history||[]).find(f=>Number(f.sequence)===Number(e.forecast_sequence)&&(!e.message?.speaker||f.agent===e.message.speaker))||null}
function finalVisible(sequence){const f=GRAPH.final_decision;return f&&Number(f.forecast_sequence||0)<=sequence?f:null}
function decisionState(node,sequence){
  const forecasts=forecastsAt(sequence),supporters=[],probabilities=[];let weight=0;
  if(node.kind!=='task')for(const [agent,f] of forecasts){const hit=node.kind==='outcome'?f.outcome_id===node.id:f.score_id===node.id;if(hit){supporters.push(agent);weight+=Number(f.confidence||0)/10}if(node.kind==='outcome'&&f.probabilities){const label=node.outcome||node.text;if(Object.hasOwn(f.probabilities,label))probabilities.push(Number(f.probabilities[label]))}}
  const active=forecasts.size,share=active?supporters.length/active:0,coverage=active/Math.max(1,(GRAPH.participants||[]).length),final=finalVisible(sequence);
  let status=supporters.length?'competing':'inactive';if(share>=.75&&coverage>=.6)status='converging';if(final&&(final.outcome_id===node.id||final.score_id===node.id))status='finalized';if(node.kind==='task')status=final?'finalized':'open';
  return{supporters,support_count:supporters.length,support_share:share,weighted_support:weight,coverage:Math.min(1,coverage),probability_count:probabilities.length,mean_probability:probabilities.length?probabilities.reduce((a,b)=>a+b,0)/probabilities.length:0,status}
}
function decisionOverview(sequence){
  const forecasts=forecastsAt(sequence),outcomes=decisionNodes().filter(n=>n.kind==='outcome').map(n=>decisionState(n,sequence)),active=forecasts.size,shares=outcomes.filter(x=>x.support_count).map(x=>x.support_share);let dispersion=0;
  if(shares.length>1){const denom=Math.log(Math.max(2,outcomes.length));dispersion=-shares.reduce((s,p)=>s+p*Math.log(p),0)/denom}
  const max=Math.max(0,...outcomes.map(x=>x.support_share)),coverage=active/Math.max(1,(GRAPH.participants||[]).length);let status=finalVisible(sequence)?'finalized':'open';if(status==='open'&&coverage>=.6&&max>=.75)status='converging';else if(status==='open'&&dispersion>=.75)status='dispersed';return{active,dispersion:Math.min(1,dispersion),coverage:Math.min(1,coverage),max,status}
}
const GRAPH_NODE_W=140,GRAPH_NODE_H=40,REASON_NODE_R=9,SCORE_NODE_W=58,SCORE_NODE_H=18;
const RELATION_LABEL={support:'支持',attack:'反驳',undercut:'削弱',condition:'条件',question:'质疑'};
function relationColor(r){return r==='support'?'var(--support)':r==='attack'||r==='undercut'?'var(--attack)':'var(--query)'}

  const desc=node?node.text:`${rel.source_id} --${rel.relation}→ ${rel.target_id}`;let meters='';if(st){meters=[['接受度',(Number(st.acceptance)+1)/2,Number(st.acceptance).toFixed(2)],['争议度',st.controversy,Number(st.controversy).toFixed(2)],['覆盖率',st.coverage,Math.round(st.coverage*100)+'%'],['证据扎根',st.groundedness,Math.round(st.groundedness*100)+'%']].map(x=>`<div class="meter-row"><span>${x[0]}</span><div class="meter"><i style="width:${Math.max(0,Math.min(1,x[1]))*100}%"></i></div><b>${x[2]}</b></div>`).join('')}
  const origin=item.origin_statement_id||[item.episode_id,item.origin_message_index>=0?item.origin_message_index:'',item.origin_local_id].filter(x=>x!==''&&x!=null).join(':');$('#detail').innerHTML=`<h3>${esc(item.id)} · ${esc(LIFECYCLE[life]||life)} · ${esc(STATUS[st?.status]||'尚无公共评价')}</h3><div class="detail-text">${esc(desc)}</div><div class="hint">作者：${esc(item.author||'系统')} · 建立于 v${item.created_version}${origin?` · 来源 ${esc(origin)}`:''}${item.origin_forecast_sequence?` · p${item.origin_forecast_sequence}`:''}${item.superseded_by?` · 替代节点 ${esc(item.superseded_by)}`:''}${item.contract_status&&item.contract_status!=='off'?` · 证据契约 ${esc(item.contract_status)}`:''}</div><div class="chips">${evidence.map(id=>{const binding=bindings.find(x=>x.evidence_id===id),relation=binding?` · ${binding.entailment}`:'';return`<span class="chip" title="${esc(short(evMap.get(id)?.content||'',120))}">${esc(id+relation)}</span>`}).join('')||'<span class="chip">无证据引用</span>'}</div>${audits.map(a=>`<div class="hint error">${esc(a.id)} 待修复：${esc(a.required_fix)}</div>`).join('')}${own?`<div class="hint">所选 Agent 当时评价：立场 ${Number(own.stance).toFixed(2)}，把握 ${Number(own.confidence).toFixed(2)}（v${own.version}）</div>`:''}<div class="meters">${meters}</div>${st?`<div class="hint">覆盖率 = 已独立评价该项的 Agent 数 / 全部辩论 Agent 数。它只控制该项能否从“共识萌芽”升级为“暂定共识”，不直接决定最终预测。</div>`:''}`;
}
function renderTimeline(){
  $('#timeline').innerHTML=EVENTS.map((e,i)=>`<button class="step ${i===current?'active':''}" data-i="${i}"><div class="v">v${e.version} · p${e.forecast_sequence||0}</div><div class="who">${esc(e.message?.speaker||e.author)}</div><div class="op">${esc(i===0?'初始化':e.final_decision?'最终仲裁':e.episode_messages?'对手戏提交':e.message?.action||OP[e.operation]||e.operation)}</div></button>`).join('');$('#timeline').querySelectorAll('.step').forEach(b=>b.onclick=()=>{current=Number(b.dataset.i);render()})
}
function render(){
  $('#range').value=current;const e=currentEvent(),f=forecastAtEvent(e);$('#version').textContent=`理由 v${e.version}/${GRAPH.version} · 决策 p${e.forecast_sequence||0}/${GRAPH.forecast_sequence||0}`;const changes=[...(e.changed_targets||[]),...(f?[f.outcome_id,f.score_id]:[])];$('#meta').innerHTML=`<span>主题：${esc(DATA.topic||'')}</span><span>任务：${esc(taskSchema().task_type||'forecast')}</span><span>事件：${current}/${EVENTS.length-1}</span><span>当前提交者：${esc(e.message?.speaker||e.author)}</span><span>变更：${esc([...new Set(changes.filter(Boolean))].join(', ')||'无')}</span>`;renderGraph();renderEvent();renderStats();renderDetail();renderTimeline();
}
function moveEvent(delta){const next=Math.max(0,Math.min(EVENTS.length-1,current+delta));if(next!==current){current=next;render()}}
$('#prev').onclick=()=>moveEvent(-1);$('#next').onclick=()=>moveEvent(1);$('#range').oninput=e=>{current=Number(e.target.value);render()};$('#agent').onchange=()=>{renderGraph();renderDetail()};$('#graph-view').onchange=()=>{renderGraph();renderDetail()};
document.addEventListener('keydown',event=>{if(event.altKey||event.ctrlKey||event.metaKey||event.shiftKey)return;const tag=document.activeElement?.tagName;if(['INPUT','SELECT','TEXTAREA'].includes(tag))return;if(event.key==='ArrowLeft'||event.key==='ArrowRight'){event.preventDefault();moveEvent(event.key==='ArrowLeft'?-1:1)}});
const drop=$('#drop'),file=$('#file');drop.onclick=()=>file.click();file.onchange=e=>e.target.files[0]&&readFile(e.target.files[0]);drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag')};drop.ondragleave=()=>drop.classList.remove('drag');drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');e.dataTransfer.files[0]&&readFile(e.dataTransfer.files[0])};
