<!DOCTYPE html>
<html lang="zh-CN" data-theme="default">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 辩论预测 · 赛程</title>
<style>
/* ═══ Theme: Default（高级灰） ═══ */
[data-theme="default"]{
  --primary:#4a7bbf;--primary-dark:#3a65a0;--primary-light:#edf1f8;
  --bg:#f4f4f6;--card:#fff;--border:#ddd;--divider:#ebebec;
  --text:#2a2a2a;--text2:#5a5a5a;--text3:#8a8a8a;
  --red:#b03d3d;--green:#2d9e5c;--orange:#c06e27;--blue:#3a65a0;--yellow:#a4a380;
  --green-light:#e2efe6;--orange-light:#f5eadb;
  --side-a:#b03d3d;--side-b:#3a65a0;--side-x:#a4a380;
  --nav-bg:rgba(58,72,96,0.96);--nav-text:#d0d8e4;--nav-muted:rgba(255,255,255,0.55);
  --badge-yes-bg:#e2efe6;--badge-no-bg:#f5eadb;
}
/* ═══ Theme: Light（原色） ═══ */
[data-theme="light"]{
  --primary:#1678F2;--primary-dark:#125ccc;--primary-light:#e8f0fe;
  --bg:#f5f5f5;--card:#fff;--border:#e8e8e8;--divider:#f1f1f1;
  --text:#222;--text2:#555;--text3:#888;
  --red:#e74c3c;--green:#27ae60;--orange:#f39c12;--blue:#2980b9;--yellow:#f0ad4e;
  --green-light:#e8f5e9;--orange-light:#fff3e0;
  --side-a:#e74c3c;--side-b:#2980b9;--side-x:#f0ad4e;
  --nav-bg:rgba(22,120,242,0.95);--nav-text:#fff;--nav-muted:rgba(255,255,255,0.65);
  --badge-yes-bg:#e8f5e9;--badge-no-bg:#fff3e0;
}
/* ═══ Theme: Dark ═══ */
[data-theme="dark"]{
  --primary:#5a7aaa;--primary-dark:#4a6a98;--primary-light:#252538;
  --bg:#1a1a24;--card:#242432;--border:#363648;--divider:#2a2a38;
  --text:#c8c8d4;--text2:#8a8aa4;--text3:#5a5a72;
  --red:#dd6550;--green:#27ae60;--orange:#e9842c;--blue:#5790d6;--yellow:#bdccab;
  --green-light:#1e2e28;--orange-light:#2e2818;
  --side-a:#dd6550;--side-b:#5790d6;--side-x:#bdccab;
  --nav-bg:rgba(18,18,28,0.97);--nav-text:#a8a8bc;--nav-muted:rgba(255,255,255,0.4);
  --badge-yes-bg:#1e2e28;--badge-no-bg:#2e2818;
}

*{margin:0;padding:0;box-sizing:border-box}
:root{--radius:10px;--shadow:0 2px 8px rgba(0,0,0,0.12);--max-w:1080px}
html{font-size:17px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s}
a{color:var(--primary);text-decoration:none}

/* ── Sticky Nav ── */
.sticky-nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(10px);padding:9px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.12);transition:background .3s}
.nav-brand{color:var(--nav-text);font-size:14px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.nav-spacer{flex:1}
.nav-links{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.nav-link{color:var(--nav-muted);font-size:13px;padding:4px 12px;border-radius:16px;transition:all .2s;text-decoration:none;white-space:nowrap}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,0.14);color:rgba(255,255,255,0.95)}
.theme-btns{display:flex;gap:2px;margin-left:8px;border-left:1px solid rgba(255,255,255,0.15);padding-left:10px}
.theme-btn{color:var(--nav-muted);font-size:12px;padding:3px 8px;border-radius:12px;cursor:pointer;border:none;background:none;transition:all .2s;line-height:1.2}
.theme-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85)}
.theme-btn.active{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.95)}

/* ── Hero ── */
.hero-header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;transition:background .3s}
.hero-header::before{content:'';position:absolute;top:-50%;right:-20%;width:80%;height:200%;border-radius:50%;background:rgba(255,255,255,0.03);pointer-events:none}
.hero-title{font-size:22px;font-weight:800;margin-bottom:4px}
.hero-sub{font-size:13px;opacity:.6}

/* ── Container ── */
.container{max-width:var(--max-w);margin:0 auto;padding:0 16px}

/* ── Today Button ── */
.today-btn{display:inline-block;padding:10px 120px;background:var(--card);border:1.5px solid var(--primary);border-radius:28px;font-size:15px;font-weight:700;color:var(--primary);cursor:pointer;transition:all .2s;box-shadow:var(--shadow);text-decoration:none;letter-spacing:.5px}
.today-btn:hover{background:var(--primary);color:#fff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
[data-theme="default"] .today-btn{background:var(--bg);border-color:var(--text3);box-shadow:none}
[data-theme="default"] .today-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 16px rgba(0,0,0,0.15)}

/* ── Stage Section ── */
.stage-section[id]{scroll-margin-top:54px}
.stage-title{font-size:20px;font-weight:800;color:var(--text);margin:28px 0 6px;padding:6px 0 6px 14px;border-left:5px solid var(--primary);background:linear-gradient(90deg,var(--primary-light),transparent);border-radius:0 var(--radius) var(--radius) 0;transition:color .3s,border-color .3s,background .3s}
.sub-stage-title{font-size:15px;font-weight:700;color:var(--text2);margin:16px 0 6px;padding-left:4px;transition:color .3s}
.date-head{font-size:13px;font-weight:600;color:var(--text3);margin:14px 0 6px;padding-left:4px}

/* ── Cards Grid ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;align-items:start}

/* ── Schedule Card ── */
.sched-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease,background .3s;text-decoration:none;color:var(--text);display:block;border-left:4px solid var(--text3);animation:card-in .5s ease both;min-width:0;overflow:hidden}
.sched-card:hover{transform:translateY(-4px);box-shadow:0 6px 20px rgba(0,0,0,0.15)}
.sched-card.side-a{border-left-color:var(--side-a)}
.sched-card.side-b{border-left-color:var(--side-b)}
.sched-card.side-x{border-left-color:var(--side-x)}
@keyframes card-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;gap:6px}
.stage-tag{background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:background .3s,color .3s}
.city-tag{color:var(--text3);font-size:11px;display:block;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;transition:color .3s}

/* Teams Row */
.teams-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.team-col{text-align:center;flex:1;min-width:0}
.team-flag{width:72px;height:48px;border-radius:4px;object-fit:contain;margin:0 auto 4px;border:none;background:none}
.team-flag-ph{width:72px;height:48px;border-radius:4px;margin:0 auto 4px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--primary);border:none}
.team-name{font-size:16px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
/* Prediction Middle Area (reuses original real-score layout) */
.pred-middle-area{display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;gap:5px}
.pred-middle-score{display:flex;align-items:center;justify-content:center;gap:2px;font-size:28px;font-weight:800;line-height:1;border-radius:8px;padding:2px 10px;transition:background .3s;margin-top:2px}
.pred-middle-num{min-width:22px;text-align:center}
.pred-middle-sep{color:var(--text3);font-size:22px;margin:0 2px}
.pred-middle-score.pred-score-match{background:var(--green);color:#fff}
.pred-middle-score.pred-score-match .pred-middle-num{color:#fff}
.pred-middle-score.pred-score-match .pred-middle-sep{color:rgba(255,255,255,0.6)}
.pred-middle-bar-row{display:flex;justify-content:center;width:100%}
.pred-conf-bar-full{flex:1;max-width:100px;height:8px;background:var(--divider);border-radius:4px;overflow:hidden;transition:background .3s}
.pred-conf-text-dark{font-size:11px;color:var(--text);white-space:nowrap;font-weight:600}

/* Stance Distribution (label + dots inline + legend right) */
.stance-row{display:flex;align-items:center;gap:6px;margin:10px 0 0}
.stance-label{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0;font-weight:700}
.stance-dots{display:inline-flex;align-items:center;gap:3px;flex-shrink:0}
.stance-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.stance-dot.dot-a{background:var(--side-a)}
.stance-dot.dot-x{background:var(--side-x)}
.stance-dot.dot-b{background:var(--side-b)}
.stance-sep{width:1px;height:12px;background:var(--text3);opacity:.4;flex-shrink:0}
.stance-legend-area{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text3);margin-left:auto;flex-shrink:0}
.stance-legend-item{display:inline-flex;align-items:center;gap:2px;white-space:nowrap}
.stance-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Prediction shared styles */
.pred-conf-fill{height:100%;border-radius:4px;display:block;clip-path:inset(0 100% 0 0);animation:bar-enter 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
@keyframes bar-enter{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
.pred-conf-fill.high{background:var(--green)}
.pred-conf-fill.mid{background:var(--orange)}
.pred-conf-fill.low{background:var(--red)}
.topk-row{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;flex-wrap:wrap}
.topk-label{color:var(--text3);white-space:nowrap;font-weight:700}
.topk-score{color:var(--text2);font-weight:600;padding:1px 5px;background:var(--primary-light);border-radius:3px}
.topk-score.exact-match{background:var(--green);color:#fff;font-weight:700;padding:1px 6px;border-radius:3px}

/* Flag prediction: stamp overlay on flag img */
.team-flag-wrap{position:relative;display:inline-flex;flex-direction:column;align-items:center;margin:0 auto 4px}
.team-flag-wrap .team-flag,.team-flag-wrap .team-flag-ph{margin:0 auto 0}
.pred-stamp{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;pointer-events:none;border-radius:4px;border:3px solid var(--green);background:rgba(255,255,255,0.65)}
.pred-stamp.stamp-wrong{border-color:var(--red);background:rgba(255,255,255,0.65)}
.pred-stamp .stamp-main{font-size:14px;font-weight:900;line-height:1;letter-spacing:1px;color:var(--green);text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.pred-stamp .stamp-sub{font-size:10px;font-weight:800;line-height:1.3;letter-spacing:.3px;text-align:center;color:var(--green);text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.pred-stamp.stamp-wrong .stamp-main{color:var(--red)}
.pred-stamp.stamp-wrong .stamp-sub{color:var(--red)}
.pred-stamp.stamp-pending{background:rgba(255,255,255,0.5)}
.pred-stamp.stamp-pending .stamp-main{font-size:24px;text-shadow:0 1px 3px rgba(0,0,0,0.35)}

/* Review Section (复盘区) */
.review-divider{height:1px;background:var(--text3);margin:10px 0 6px;border-top:1.5px dashed var(--text3);background:none}
.review-section{padding:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px;color:var(--text3)}
.review-section .review-score-box{margin-right:4px}
.review-label{color:var(--text3);font-weight:600;white-space:nowrap}
.review-score-box{display:inline-flex;align-items:center;border:1.5px solid var(--border);border-radius:5px;overflow:hidden}
.review-score-num{font-size:16px;font-weight:900;color:var(--text);min-width:20px;text-align:center;line-height:1;padding:2px 6px}
.review-score-num.score-left{background:var(--divider)}
.review-score-sep{width:1.5px;align-self:stretch;background:var(--border)}
.review-match-text{white-space:nowrap}
.review-match-text.match-hit{color:var(--green);font-weight:700}
.review-match-text.match-miss{color:var(--red);font-weight:600}

/* Stats Section (below hero, aligned with cards grid) */
.stats-section{margin:16px 0 8px;padding:0 4px}
.stats-row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap}
.stat-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;flex:1;min-width:140px;cursor:default;transition:transform .2s ease,box-shadow .2s ease,background .3s;border:1px solid var(--border);display:flex;flex-direction:column;justify-content:space-between}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.12)}
.stat-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.stat-label{font-size:12px;color:var(--text3);font-weight:600}
.stat-value{font-size:24px;font-weight:800;line-height:1.2}
.stat-total{font-size:14px;font-weight:600;color:var(--text3)}
.stat-bar{height:6px;background:var(--divider);border-radius:3px;overflow:hidden;transition:background .3s}
.stat-bar-fill{height:100%;border-radius:3px;display:block;clip-path:inset(0 100% 0 0);animation:bar-enter 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
.stat-bar-fill.green{background:var(--green)}
.stat-bar-fill.primary{background:var(--primary)}
.stat-bar-fill.orange{background:var(--orange)}

/* Upset tag - half-overlapping below winner flag */
.upset-tag{font-size:10px;font-weight:700;text-align:center;border-radius:3px;padding:1px 6px;display:inline-block;line-height:1.4;color:#fff;border:none}
.upset-major{background:#ea580c}
.upset-minor{background:#f59e0b}
/* Accuracy Info lines (used in review section) */

/* Consensus Badge */
.consensus-badge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;flex-shrink:0;transition:background .3s}
.consensus-badge.yes{background:var(--badge-yes-bg);color:var(--green)}
.consensus-badge.no{background:var(--badge-no-bg);color:var(--orange)}

/* ── Empty / Loading ── */
.empty-slot{padding:10px 16px;margin:4px 0;background:var(--card);border-radius:var(--radius);border:1px dashed var(--border);font-size:13px;color:var(--text3);text-align:center;transition:background .3s;grid-column:1/-1}
.date-loading{color:var(--text3);font-size:13px;display:block;text-align:center;padding:10px 16px;margin:4px 0;background:var(--card);border-radius:var(--radius);border:1px dashed var(--border);grid-column:1/-1;transition:background .3s}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}

/* ── Drop Zone ── */
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:30px 20px;text-align:center;cursor:pointer;transition:border-color .2s;color:var(--text3);margin:20px 0;font-size:14px}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}

/* ── Footer ── */
.page-footer{text-align:center;padding:20px;font-size:12px;color:var(--text3);margin-top:40px}

/* ── Back to Top ── */
.back-top{position:fixed;right:16px;bottom:40px;width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.18);opacity:0;pointer-events:none;transition:opacity .3s,transform .2s;z-index:90}
.back-top:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.22)}
.back-top.show{opacity:.85;pointer-events:auto}
.back-top svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}

/* ── Responsive ── */
@media(max-width:760px){
  .cards{grid-template-columns:1fr}
  .sticky-nav{padding:7px 12px;gap:6px}
  .nav-brand{font-size:13px}
  .nav-link{font-size:12px;padding:3px 8px}
  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{min-width:0;padding:10px 10px}
  .stat-value{font-size:20px}
  .stat-label{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stance-row{gap:4px}
  .review-section{gap:4px}
}
</style>
</head>

<nav class="sticky-nav" id="sticky-nav">
  <span class="nav-brand">AI Arena · 多智能体辩论预测</span>
  <span class="nav-spacer"></span>

  <div class="theme-btns" id="theme-btns">
    <button class="theme-btn active" data-theme="default" title="默认灰调">◈</button>
    <button class="theme-btn" data-theme="light" title="明亮原色">☀</button>
    <button class="theme-btn" data-theme="dark" title="暗夜模式">◐</button>
  </div>
</nav>

<div class="hero-header" id="hero-header">
  <div class="hero-title">2026 世界杯 · 赛程预测</div>
  <div class="hero-sub">多智能体对抗辩论系统 · 综合研判</div>
  <div style="margin-top:14px"><a class="today-btn" id="today-btn" style="display:none" onclick="jumpToToday()">跳转至今日赛程</a></div>
</div>

<script>
const DATA_DIR='data/',MANIFEST=DATA_DIR+'manifest.json',DETAIL_PAGE='match.html',IMAGES_DIR='images/',REAL_RESULTS=DATA_DIR+'real_results.json';
const SCROLL_KEY='index_scroll_y',THEME_KEY='arena_theme';
let REAL_DATA=null; // 全局真实结果数据

// ═══ 赛程结构 ═══
const TOURNAMENT=[
  {key:'group',label:'小组赛',subs:[
    {key:'g-r1',label:'小组赛第1轮',dates:['2026-06-12','2026-06-13','2026-06-14','2026-06-15','2026-06-16','2026-06-17','2026-06-18']},
    {key:'g-r2',label:'小组赛第2轮',dates:['2026-06-19','2026-06-20','2026-06-21','2026-06-22','2026-06-23','2026-06-24']},
    {key:'g-r3',label:'小组赛第3轮',dates:['2026-06-25','2026-06-26','2026-06-27','2026-06-28']},
  ]},
  {key:'ko',label:'淘汰赛',subs:[
    {key:'r32',label:'1/16 决赛',dates:['2026-06-29','2026-06-30','2026-07-01','2026-07-02','2026-07-03','2026-07-04']},
    {key:'r16',label:'1/8 决赛',dates:['2026-07-05','2026-07-06','2026-07-07','2026-07-08']},
    {key:'qf',label:'1/4 决赛',dates:['2026-07-10','2026-07-11','2026-07-12']},
    {key:'sf',label:'半决赛',dates:['2026-07-15','2026-07-16']},
    {key:'sf',label:'季军赛',dates:['2026-07-19']},
  ]},
  {key:'final',label:'决赛',subs:[
    {key:'f1',label:'决赛',dates:['2026-07-20']},
  ]},
];

// ═══ 主题切换 ═══
function initTheme(){
  const saved=localStorage.getItem(THEME_KEY);
  if(saved)document.documentElement.setAttribute('data-theme',saved);
  updateThemeBtns();
  document.querySelectorAll('.theme-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=btn.dataset.theme;
      document.documentElement.setAttribute('data-theme',t);

}

// ═══ 数据提取 ═══
function findRealResult(teamA,teamB,date){
  if(!REAL_DATA)return null;
  const matches=REAL_DATA.matches||{};
  for(const key in matches){
    const m=matches[key];
    if(m.home_team===teamA&&m.away_team===teamB&&m.status==='已结束')return m;
    // 也尝试日期匹配
    if(date&&key===`${date}_${teamA}_vs_${teamB}`&&m.status==='已结束')return m;
  }
  return null;
}
function actualToPredFormat(homeTeam,awayTeam,homeScore,awayScore){
  if(homeScore>awayScore)return{winner:homeTeam,predScore:`${homeScore}-${awayScore}`};
  if(awayScore>homeScore)return{winner:awayTeam,predScore:`${awayScore}-${homeScore}`};
  return{winner:'平局',predScore:`${homeScore}-${awayScore}`};
}
function extractCardData(data,filename){
  const{teamA,teamB}=parseTopic(data.topic||'');
  const meta=data.match_meta||{},fp=data.final_prediction,agents=data.agents||[],ti=data.team_info||{};
  let cA=0,cB=0,cX=0;
  for(const a of agents){const s=sideOf(a,data.topic);if(s==='a')cA++;else if(s==='b')cB++;else cX++}
  const total=agents.length||1;
  const topPreds=(data.top_predictions||[]).slice(1,4);
  // 真实结果匹配
  const realResult=findRealResult(teamA,teamB,meta.date||'');
  let realScore=null,actualWinner=null,actualPredScore=null,winnerMatchRank=null,scoreMatchRank=null,upset=null;
  if(realResult){
    realScore=realResult.score_display;
    const upsetData=(realResult.review||{}).upset;
    if(upsetData&&upsetData.level&&upsetData.level!=='正常')upset=upsetData;
    const fmt=actualToPredFormat(teamA,teamB,realResult.home_score,realResult.away_score);
    actualWinner=fmt.winner;
    actualPredScore=fmt.predScore;
    // 在全部 top_predictions 中查找排名
    const allPreds=data.top_predictions||[];
    for(let i=0;i<allPreds.length;i++){
      if(winnerMatchRank===null&&allPreds[i].winner===actualWinner)winnerMatchRank=i+1;
      if(scoreMatchRank===null&&allPreds[i].winner===actualWinner&&allPreds[i].score===actualPredScore)scoreMatchRank=i+1;
    }
    // 回退：无 top_predictions 时，检查 final_prediction / verdict 是否命中
    if(!allPreds.length){
      const fp=data.final_prediction||data.verdict;
      if(fp){
        if(fp.winner===actualWinner)winnerMatchRank=1;
        if(fp.winner===actualWinner&&fp.score===actualPredScore)scoreMatchRank=1;
      }
    }
  }
  return{file:filename,teamA,teamB,stage:meta.stage||'',matchId:meta.match_id||'',
    date:meta.date||'',city:meta.city||'',venue:meta.venue_zh||meta.venue||'',
    winner:fp?.winner||'',score:fp?.score||'',confidence:fp?.confidence||0,
    countA:cA,countB:cB,countX:cX,
    pctA:Math.round(cA/total*100),pctB:Math.round(cB/total*100),
    pctX:Math.max(0,100-Math.round(cA/total*100)-Math.round(cB/total*100)),
    consensus:data.consensus,topPreds,
    realScore,actualWinner,actualPredScore,winnerMatchRank,scoreMatchRank,upset};
}

async function loadSchedule(){

  try{const r=await fetch(MANIFEST+'?t='+Date.now());if(r.ok)files=await r.json()}catch(e){}

  try{const r=await fetch(REAL_RESULTS+'?t='+Date.now());if(r.ok)REAL_DATA=await r.json()}catch(e){}
  if(!files||!files.length){showDropZone();return}

  // 先渲染骨架

  container.innerHTML=sk.html;

function buildSkeleton(){
  const byDate={};let html='';
  for(const stage of TOURNAMENT){
    html+=`<div class="stage-section" id="stage-${stage.key}"><div class="stage-title">${stage.label}</div>`;
    for(const sub of stage.subs){
      html+=`<div class="sub-stage-title">${sub.label}</div>`;
      for(const d of sub.dates){
        byDate[d]='cards-'+d.replace(/-/g,'');
        html+=`<div class="date-head">${formatDate(d)}</div>`;
        html+=`<div class="cards" id="${byDate[d]}"><span class="date-loading">加载中…</span></div>`;

      }

    html+='</div>';
  }

function insertCardSorted(m,byDate){
  const grid=document.getElementById(byDate[m.date]);
  if(!grid)return;
  const ld=grid.querySelector('.date-loading');if(ld)ld.remove();
  const myTime=m.file.match(/-\d{4}-/)?.[0]||'';
  // 找到同一日期网格中应插入的位置（按文件名中的开球时间升序）
  const cards=grid.querySelectorAll('.sched-card');

  for(const card of cards){
    const cardHref=card.getAttribute('href')||'';

async function handleDropped(fileList){

/** 从 REAL_DATA 和预测 JSON 文件直接计算统计（无需等卡片渲染完） */
async function renderAccuracyStatsFromFiles(files){
  if(!REAL_DATA||!REAL_DATA.matches)return;
  const endedMatches=Object.values(REAL_DATA.matches).filter(m=>m.status==='已结束');
  if(!endedMatches.length)return;

  // 并行加载所有预测 JSON 的 final_prediction
  const preds=[];
  const fetches=files.map(async f=>{
    try{
      const r=await fetch(DATA_DIR+f+'?t='+Date.now());
      if(!r.ok)return null;
      const d=await r.json();
      const{teamA,teamB}=parseTopic(d.topic||'');
      const fp=d.final_prediction;
      const allPreds=d.top_predictions||[];
      const meta=d.match_meta||{};
      const realResult=findRealResult(teamA,teamB,meta.date||'');
      if(!realResult)return null;
      let winnerMatchRank=null,scoreMatchRank=null;
      const fmt=actualToPredFormat(teamA,teamB,realResult.home_score,realResult.away_score);
      for(let i=0;i<allPreds.length;i++){
        if(winnerMatchRank===null&&allPreds[i].winner===fmt.winner)winnerMatchRank=i+1;
        if(scoreMatchRank===null&&allPreds[i].winner===fmt.winner&&allPreds[i].score===fmt.predScore)scoreMatchRank=i+1;
      }
      if(!allPreds.length&&fp){
        if(fp.winner===fmt.winner)winnerMatchRank=1;
        if(fp.winner===fmt.winner&&fp.score===fmt.predScore)scoreMatchRank=1;
      }
      return{winner:fp?.winner||'',score:fp?.score||'',actualWinner:fmt.winner,actualPredScore:fmt.predScore,winnerMatchRank,scoreMatchRank,teamA,teamB};
    }catch(e){return null}
  });
  const results=await Promise.all(fetches);
  const withResult=results.filter(Boolean);
  if(!withResult.length)return;

  let winnerCorrect=0,scoreHit=0,totalScore=0,maxScore=0;
  for(const m of withResult){
    maxScore+=10;
    if(!m.actualWinner)continue;
    if(m.winner===m.actualWinner){winnerCorrect++;totalScore+=5;}
    if(m.scoreMatchRank!==null){scoreHit++;totalScore+=3;}
    const r=endedMatches.find(x=>x.home_team===m.teamA&&x.away_team===m.teamB);
    if(r){
      const ap=actualToPredFormat(m.teamA,m.teamB,r.home_score,r.away_score);
      const predParts=m.score.split('-').map(Number);
      const actualParts=ap.predScore.split('-').map(Number);
      if(predParts.length===2&&actualParts.length===2){
        if(Math.abs(predParts[0]-actualParts[0])<=1)totalScore+=1;
        if(Math.abs(predParts[1]-actualParts[1])<=1)totalScore+=1;
        if(predParts[0]+predParts[1]===actualParts[0]+actualParts[1])totalScore+=1;
      }
    }
  }
  let upsetCount=0;
  for(const m of endedMatches){
    const u=m.review&&m.review.upset;
    if(u&&(u.level==='爆冷'||u.level==='大爆冷'))upsetCount++;
  }
  const container=document.getElementById('main-content');
  if(!container)return;
  const winnerPct=withResult.length?Math.round(winnerCorrect/withResult.length*100):0;
  const scorePct=withResult.length?Math.round(scoreHit/withResult.length*100):0;
  const scoreRate=maxScore?Math.round(totalScore/maxScore*100):0;
  const upsetPct=endedMatches.length?Math.round(upsetCount/endedMatches.length*100):0;
  const statsHtml=`<div class="stats-section">
    <div class="stats-row">
      <div class="stat-card" title="第一可能比分所声明的胜方与实际比赛胜方一致即算命中" onclick="showStatTooltip(this,event)">
        <div class="stat-header"><span class="stat-label">胜负命中</span><span class="stat-value" style="color:var(--green)">${winnerCorrect}<span class="stat-total">/${withResult.length} (${winnerPct}%)</span></span></div>
        <div class="stat-bar"><span class="stat-bar-fill green" style="width:${winnerPct}%"></span></div>
      </div>

        <div class="stat-header"><span class="stat-label">比分命中</span><span class="stat-value" style="color:var(--primary)">${scoreHit}<span class="stat-total">/${withResult.length} (${scorePct}%)</span></span></div>
        <div class="stat-bar"><span class="stat-bar-fill primary" style="width:${scorePct}%"></span></div>
      </div>
      <div class="stat-card" title="综合评分：胜负正确+5分，比分命中+3分，进球差±1内各+1分，总进球数相同+1分（满分10/场）" onclick="showStatTooltip(this,event)">
        <div class="stat-header"><span class="stat-label">综合分数</span><span class="stat-value" style="color:var(--primary)">${totalScore}<span class="stat-total">/${maxScore} (${scoreRate}%)</span></span></div>
        <div class="stat-bar"><span class="stat-bar-fill primary" style="width:${scoreRate}%"></span></div>
      </div>
      <div class="stat-card" title="已结束比赛中标记为「爆冷」或「大爆冷」的比例（基于赛前赔率与实力对比的客观评估，与本网页预测无关）" onclick="showStatTooltip(this,event)">
        <div class="stat-header"><span class="stat-label">赛事爆冷率</span><span class="stat-value" style="color:var(--green)">${upsetPct}<span class="stat-total">%</span></span></div>
        <div class="stat-bar"><span class="stat-bar-fill green" style="width:${upsetPct}%"></span></div>
      </div>
    </div>
  </div>`;
  container.insertAdjacentHTML('afterbegin',statsHtml);

      </div>
      <div class="stat-card" title="综合评分：胜负正确+5分，比分命中+3分，进球差±1内各+1分，总进球数相同+1分（满分10/场）" onclick="showStatTooltip(this,event)">
        <div class="stat-header"><span class="stat-label">综合分数</span><span class="stat-value" style="color:var(--primary)">${totalScore}<span class="stat-total">/${maxScore} (${scoreRate}%)</span></span></div>
        <div class="stat-bar"><span class="stat-bar-fill primary" style="width:${scoreRate}%"></span></div>
      </div>
      <div class="stat-card" title="已结束比赛中标记为「爆冷」或「大爆冷」的比例（基于赛前赔率与实力对比的客观评估，与本网页预测无关）" onclick="showStatTooltip(this,event)">
        <div class="stat-header"><span class="stat-label">赛事爆冷率</span><span class="stat-value" style="color:var(--green)">${upsetPct}<span class="stat-total">%</span></span></div>
        <div class="stat-bar"><span class="stat-bar-fill green" style="width:${upsetPct}%"></span></div>
      </div>
    </div>
  </div>`;
  container.insertAdjacentHTML('afterbegin',statsHtml);
}

function renderCard(m){
  const{teamA,teamB}=m;
  const ws=m.winner.includes(teamA)?'a':m.winner.includes(teamB)?'b':'x';
  const sc=ws==='a'?'side-a':ws==='b'?'side-b':'side-x';
  const confPct=Math.round(m.confidence/10*100);
  const cc=m.confidence>=7?'high':m.confidence>=4?'mid':'low';

  // ── 国旗上的预测章（叠加在国旗上） ──
  const winnerSide=ws;
  let stampClsA='',stampHtmlA='',stampClsB='',stampHtmlB='';
  if(m.realScore){
    if(winnerSide==='a'){
      if(m.scoreMatchRank===1){stampClsA='stamp-correct';stampHtmlA='<span class="stamp-main">胜</span><span class="stamp-sub">完全准确</span>';}
      else if(m.winnerMatchRank!==null){stampClsA='stamp-partial';stampHtmlA='<span class="stamp-main">胜</span><span class="stamp-sub">部分准确</span>';}
      else{stampClsA='stamp-wrong';stampHtmlA='<span class="stamp-main">胜</span><span class="stamp-sub">预测错误</span>';}
    }else if(winnerSide==='b'){
      if(m.scoreMatchRank===1){stampClsB='stamp-correct';stampHtmlB='<span class="stamp-main">胜</span><span class="stamp-sub">完全准确</span>';}
      else if(m.winnerMatchRank!==null){stampClsB='stamp-partial';stampHtmlB='<span class="stamp-main">胜</span><span class="stamp-sub">部分准确</span>';}
      else{stampClsB='stamp-wrong';stampHtmlB='<span class="stamp-main">胜</span><span class="stamp-sub">预测错误</span>';}
    }
  }else if(m.winner){
    // 无结果时只显示一个大"胜"
    if(winnerSide==='a'){stampClsA='stamp-pending';stampHtmlA='<span class="stamp-main">胜</span>';}
    else if(winnerSide==='b'){stampClsB='stamp-pending';stampHtmlB='<span class="stamp-main">胜</span>';}
  }
  // ── 爆冷标签 ──
  let upsetHtml='';
  if(m.upset){
    const cls=m.upset.level==='大爆冷'?'upset-major':'upset-minor';
    upsetHtml=`<span class="upset-tag ${cls}">${esc(m.upset.level)}</span>`;
  }

  const makeFlag=(name,cls,inner)=>{
    const stampDiv=inner?`<div class="pred-stamp ${cls}">${inner}</div>`:'';
    return`<div class="team-flag-wrap"><img class="team-flag" src="${IMAGES_DIR+encodeURIComponent(name)}.webp" onerror="if(!this.dataset.retry){this.dataset.retry='1';this.src='${IMAGES_DIR+encodeURIComponent(name)}.png'}else{this.style.display='none';this.nextElementSibling.style.display='flex'}" alt="${esc(name)}"><div class="team-flag-ph" style="display:none">${esc(name.charAt(0))}</div>${stampDiv}</div>`;
  };
  const flagA=makeFlag(teamA,stampClsA,stampHtmlA);
  const flagB=makeFlag(teamB,stampClsB,stampHtmlB);

  // ── 中间区域：第一可能预测比分（主场-客场格式） ──
  let middleHtml='';
  if(m.winner){
    // 主场-客场格式：直接从 realResult 取或从 score 推导
    let homeScore='',awayScore='';
    if(m.realScore){
      // 已有结果时不显示预测比分在中间... 不，始终显示预测
    }
    // 从预测比分解析：cleanScore 得到 "胜者分数-败者分数"，需转为 "主场-客场"
    const scoreStr=cleanScore(m.score,m.winner);
    const parts=scoreStr.split('-');
    if(ws==='a'){
      // 预测主队胜，格式已是 主场-客场
      homeScore=parts[0]||'';awayScore=parts[1]||'';
    }else if(ws==='b'){
      // 预测客队胜，score 是 "客分-主分"，需反转
      awayScore=parts[0]||'';homeScore=parts[1]||'';
    }else{
      // 平局
      homeScore=parts[0]||'';awayScore=parts[1]||'';
    }
    const matchCls=m.scoreMatchRank===1?' pred-score-match':'';
    middleHtml=`<div class="pred-middle-area">
      <div class="pred-middle-score${matchCls}">
        <span class="pred-middle-num">${esc(homeScore)}</span>
        <span class="pred-middle-sep">-</span>
        <span class="pred-middle-num">${esc(awayScore)}</span>
      </div>
      <span class="pred-conf-text-dark">准确度 ${m.confidence}/10</span>
      <div class="pred-middle-bar-row">
        <span class="pred-conf-bar-full"><span class="pred-conf-fill ${cc}" style="width:${confPct}%"></span></span>
      </div>
    </div>`;
  }else{
    middleHtml='<div class="pred-middle-area"><div style="color:var(--text3);font-size:13px">暂无预测</div></div>';
  }

  // ── 立场分布（label+bar同一行，图例右对齐在框外） ──
  let stanceHtml='';
  const totalAgents=m.countA+m.countB+m.countX;
  if(totalAgents>0){
    let dotsHtml='';
    const groups=[];
    if(m.countA){let g='';for(let i=0;i<m.countA;i++)g+=`<span class="stance-dot dot-a"></span>`;groups.push(g);}
    if(m.countX){let g='';for(let i=0;i<m.countX;i++)g+=`<span class="stance-dot dot-x"></span>`;groups.push(g);}
    if(m.countB){let g='';for(let i=0;i<m.countB;i++)g+=`<span class="stance-dot dot-b"></span>`;groups.push(g);}
    dotsHtml='<span class="stance-sep"></span>'+groups.join('<span class="stance-sep"></span>')+'<span class="stance-sep"></span>';
    stanceHtml=`<div class="stance-row">
      <span class="stance-label">智能体投票</span>
      <div class="stance-dots">${dotsHtml}</div>
      <div class="stance-legend-area">
        <span class="stance-legend-item"><span class="stance-legend-dot" style="background:var(--side-a)"></span>${esc(teamA.length>3?teamA.slice(0,3)+'…':teamA)}</span>
        <span class="stance-legend-item"><span class="stance-legend-dot" style="background:var(--side-x)"></span>平局</span>
        <span class="stance-legend-item"><span class="stance-legend-dot" style="background:var(--side-b)"></span>${esc(teamB.length>3?teamB.slice(0,3)+'…':teamB)}</span>
      </div>
    </div>`;
  }

  // ── 其它可能比分（格式：主场-客场 胜者队名胜/平局） ──
  let predHtml='';
  if(m.winner){
    let topkHtml='';
    if(m.topPreds&&m.topPreds.length){
      const altScores=m.topPreds.filter(p=>p.score&&(p.winner!==m.winner||p.score!==m.score)).slice(0,3);
      if(altScores.length) topkHtml=`<div class="topk-row"><span class="topk-label">其它可能比分</span>${altScores.map(p=>{
        const pDraw=p.winner&&!p.winner.includes(teamA)&&!p.winner.includes(teamB);
        // 转为主场-客场格式
        const pScoreStr=cleanScore(p.score,p.winner);
        const pParts=pScoreStr.split('-');
        const pSide=p.winner.includes(teamA)?'a':p.winner.includes(teamB)?'b':'x';
        let pHome=pParts[0]||'',pAway=pParts[1]||'';
        if(pSide==='b'){pHome=pParts[1]||'';pAway=pParts[0]||'';}
        const pLabel=esc(p.winner);
        // 平局时winner已含"平局"，不需再追加
        const pSuffix=pDraw?'':' 胜';
        const pDisp=`${esc(pHome)}-${esc(pAway)} ${pLabel}${pSuffix}`;
        let cls='topk-score';
        if(m.actualPredScore&&p.winner===m.actualWinner&&p.score===m.actualPredScore)cls+=' exact-match';
        return`<span class="${cls}">${pDisp}</span>`;
      }).join('')}</div>`;
    }
    predHtml=topkHtml;
  }

  // ── 复盘区（比赛结果+记分牌+匹配文本） ──
  let reviewHtml='';
  if(m.realScore){
    const parts=m.realScore.split('-');
    let matchText='';
    if(m.winnerMatchRank!==null){
      const cls=m.winnerMatchRank===1?'match-hit':m.winnerMatchRank<=3?'':'match-miss';
      matchText+=`<span class="review-match-text ${cls}"><strong>胜负</strong>匹配第<strong>${m.winnerMatchRank}</strong>可能</span>`;
    }else if(m.actualWinner){
      matchText+=`<span class="review-match-text match-miss">胜负未命中</span>`;
    }
    if(m.scoreMatchRank!==null){
      const cls=m.scoreMatchRank===1?'match-hit':m.scoreMatchRank<=3?'':'match-miss';
      matchText+=`<span class="review-match-text ${cls}"><strong>比分</strong>匹配第<strong>${m.scoreMatchRank}</strong>可能</span>`;
    }else if(m.actualPredScore){
      matchText+=`<span class="review-match-text match-miss">比分未命中</span>`;
    }
    reviewHtml=`<div class="review-divider"></div>
    <div class="review-section">
      <span class="review-label">比赛结果</span>
      <span class="review-score-box"><span class="review-score-num score-left">${esc(parts[0])}</span><span class="review-score-sep"></span><span class="review-score-num">${esc(parts[1])}</span></span>
      ${upsetHtml}
      ${matchText}
    </div>`;
  }

  const cv=(m.city||'')+(m.venue&&m.venue!==m.city?' · '+m.venue:'');

  return`
  <a class="sched-card ${sc}" href="${DETAIL_PAGE}?json=${encodeURIComponent(DATA_DIR+m.file)}" onclick="saveScrollPos(this)">
    <div class="card-top">
      <span class="stage-tag">${esc(m.stage||m.matchId)}</span>
      <span style="display:flex;align-items:center;gap:6px;min-width:0">
        <span class="city-tag">${esc(cv)}</span>
        ${m.consensus!==undefined?`<span class="consensus-badge ${m.consensus?'yes':'no'}">${m.consensus?'共识':'分歧'}</span>`:''}
      </span>
    </div>
    <div class="teams-row">
      <div class="team-col">${flagA}<div class="team-name">${esc(teamA)}</div></div>
      ${middleHtml}
      <div class="team-col">${flagB}<div class="team-name">${esc(teamB)}</div></div>
    </div>
    ${stanceHtml}
    ${predHtml}
    ${reviewHtml}
  </a>`;
}

function setupNavLinks(){
  const navLinks=document.getElementById('nav-links');
  if(!navLinks.children.length){let h='';for(const s of TOURNAMENT)h+=`<a href="#stage-${s.key}" class="nav-link">${s.label}</a>`;navLinks.innerHTML=h}
  navLinks.querySelectorAll('.nav-link').forEach(link=>{
    link.addEventListener('click',()=>{navLinks.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));link.classList.add('active')});
  });
}

function setupScrollHighlight(){
  const navLinks=document.getElementById('nav-links'),links=navLinks.querySelectorAll('.nav-link');
  if(!links.length)return;
  const sections=[];
  links.forEach(l=>{const h=l.getAttribute('href');if(h&&h.startsWith('#')){const el=document.querySelector(h);if(el)sections.push({el,id:h.slice(1)})}});
  function onScroll(){const sy=window.scrollY+80;let cur='';for(const s of sections)if(s.el.offsetTop<=sy)cur=s.id;links.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+cur))}
  window.addEventListener('scroll',onScroll,{passive:true});onScroll();
}

initTheme();
loadSchedule();

// ── Back to Top ──
const backTopBtn=document.getElementById('back-top');
window.addEventListener('scroll',()=>{backTopBtn.classList.toggle('show',window.scrollY>400)});
backTopBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
</script>
