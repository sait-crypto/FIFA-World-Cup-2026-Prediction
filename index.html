<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 辩论预测 · 赛程</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1678F2;--primary-dark:#125ccc;--primary-light:#e8f0fe;
  --bg:#f5f5f5;--card:#fff;--border:#e8e8e8;--divider:#f1f1f1;
  --text:#222;--text2:#555;--text3:#888;
  --green:#27ae60;--red:#e74c3c;--orange:#f39c12;--yellow:#f0ad4e;
  --side-a:#e74c3c;--side-b:#2980b9;--side-x:#f0ad4e;
  --bar-home:#1678F2;--bar-draw:#94a3b8;--bar-away:#e74c3c;
  --radius:8px;--shadow:0 1px 4px rgba(0,0,0,0.08);
  --max-w:1080px;
}
html{font-size:17px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--primary);text-decoration:none}

/* ── Sticky Nav ── */
.sticky-nav{position:sticky;top:0;z-index:100;background:rgba(22,120,242,0.95);backdrop-filter:blur(8px);padding:8px 20px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.nav-brand{color:#fff;font-size:14px;font-weight:700;letter-spacing:1px;white-space:nowrap}
.nav-links{display:flex;gap:6px;flex-wrap:wrap}
.nav-link{color:rgba(255,255,255,0.8);font-size:12px;padding:4px 12px;border-radius:16px;transition:all .2s;text-decoration:none;white-space:nowrap}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,0.2);color:#fff}

/* ── Hero ── */
.hero-header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;
}
.hero-header::before{content:'';position:absolute;top:-50%;right:-20%;width:80%;height:200%;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:none}
.hero-title{font-size:22px;font-weight:800;margin-bottom:4px}
.hero-sub{font-size:13px;opacity:.7}

/* ── Container ── */
.container{max-width:var(--max-w);margin:0 auto;padding:0 16px}

/* ── Section ── */
.section-title{font-size:18px;font-weight:800;color:var(--text);margin:24px 0 12px;padding-left:4px;border-left:4px solid var(--primary);padding:4px 0 4px 12px}
.date-head{font-size:14px;font-weight:700;color:var(--text2);margin:20px 0 8px;padding-left:4px}

/* ── Cards Grid ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}

/* ── Schedule Card ── */
.sched-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;
  text-decoration:none;color:var(--text);display:block;
}
.sched-card:hover{transform:translateY(-3px);box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px}
.stage-tag{background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:4px;font-weight:600}
.city-tag{color:var(--text3);font-size:11px}

/* Teams Row */
.teams-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px}
.team-col{text-align:center;flex:1}
.team-flag{width:56px;height:38px;border-radius:3px;object-fit:cover;margin:0 auto 4px;border:1px solid var(--border);background:var(--divider)}
.team-flag-ph{width:56px;height:38px;border-radius:3px;margin:0 auto 4px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--primary)}
.team-name{font-size:15px;font-weight:700}
.team-rank{font-size:11px;color:var(--text3)}
.vs-text{font-size:18px;font-weight:800;color:var(--text3);flex-shrink:0}

/* Prob Bar */
.prob-bar{display:flex;height:18px;border-radius:9px;overflow:hidden;margin:6px 0;background:var(--divider)}
.prob-bar .seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;min-width:24px;transition:width 0.6s cubic-bezier(0.25,0.46,0.45,0.94)}
.prob-bar .seg.home{background:linear-gradient(90deg,#3b82f6,#2563eb)}
.prob-bar .seg.draw{background:linear-gradient(90deg,#94a3b8,#64748b)}
.prob-bar .seg.away{background:linear-gradient(90deg,#ef4444,#dc2626)}
.prob-legend{display:flex;gap:12px;font-size:11px;color:var(--text3);margin-top:2px}
.prob-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:2px}

/* Prediction Row */
.pred-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.pred-result{font-size:14px;font-weight:700;color:var(--primary)}
.pred-score{font-size:13px;color:var(--text2)}
.pred-conf{font-size:11px;color:var(--text3)}
.pred-conf-bar{width:60px;height:5px;background:var(--divider);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.pred-conf-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(0.25,0.46,0.45,0.94)}
.pred-conf-fill.high{background:var(--green)}
.pred-conf-fill.mid{background:var(--orange)}
.pred-conf-fill.low{background:var(--red)}

/* Top Scores */
.top-scores{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.score-chip{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--primary-light);color:var(--primary);font-weight:600}
.score-chip.best{background:var(--primary);color:#fff}

/* Consensus Badge */
.consensus-badge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.consensus-badge.yes{background:#e8f5e9;color:var(--green)}
.consensus-badge.no{background:#fff3e0;color:var(--orange)}

/* ── Drop Zone ── */
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s;color:var(--text3);margin:20px 0;font-size:14px}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}

/* ── Empty State ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text2)}

/* ── Loading ── */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}

/* ── Footer ── */
.page-footer{text-align:center;padding:20px;font-size:12px;color:var(--text3);margin-top:40px}

/* ── Responsive ── */
@media(max-width:760px){
  .cards{grid-template-columns:1fr}
  .sticky-nav{padding:6px 12px;gap:8px}
  .nav-brand{font-size:12px}
  .nav-link{font-size:11px;padding:3px 8px}
}
</style>
</head>
<body>

<nav class="sticky-nav" id="sticky-nav">
  <span class="nav-brand">⚽ AI 辩论预测</span>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="hero-header" id="hero-header">
  <div class="hero-title">2026 世界杯 · 赛程预测</div>
  <div class="hero-sub">多智能体辩论系统 · 综合分析</div>
</div>

<div class="container" id="main-content">
  <div class="loading" id="loading">正在加载赛程数据...</div>
  <div class="drop-zone" id="drop-zone" style="display:none">
    📂 拖放 data 文件夹或 JSON 文件到此处<br>或点击选择文件
    <input type="file" id="file-input" multiple accept=".json" style="display:none">
  </div>
</div>

<div class="page-footer">辩论数据由多智能体辩论系统生成 · 仅供参考</div>

<script>
const DATA_DIR='data/';
const MANIFEST=DATA_DIR+'manifest.json';
const DETAIL_PAGE='match.html';

// 内嵌文件列表（当 fetch 不可用时使用，如本地 file:// 协议）
// 新增比赛后请更新此列表
const EMBEDDED_FILES=[
  "2026-06-12墨西哥_vs_南非（小组赛）.json",
  "2026-06-12韩国_vs_捷克（小组赛）.json",
  "2026-06-13加拿大_vs_波黑（小组赛）.json",
  "2026-06-13美国_vs_巴拉圭（小组赛）.json"
];

const FLAG_MAP={'韩国':'🇰🇷','捷克':'🇨🇿','墨西哥':'🇲🇽','南非':'🇿🇦','加拿大':'🇨🇦','波黑':'🇧🇦','美国':'🇺🇸','巴拉圭':'🇵🇾','卡塔尔':'🇶🇦','瑞士':'🇨🇭'};

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

function parseTopic(t){const p=t.split(/\s+vs\s+/i);return{teamA:p[0]?.trim()||t,teamB:p[1]?.split('（')[0]?.trim()||''}}

function sideOf(agent,topic){
  const{teamA,teamB}=parseTopic(topic);
  const h=agent.prediction_history||[];
  const last=h[h.length-1];
  if(!last)return'x';
  const w=last.winner||'';
  if(w.includes(teamA))return'a';
  if(w.includes(teamB))return'b';
  return'x';
}

function flagHtml(team){
  const flag=FLAG_MAP[team];
  if(flag)return`<span style="font-size:28px;line-height:1">${flag}</span>`;
  return`<div class="team-flag-ph">${esc(team.charAt(0))}</div>`;
}

function smallFlagHtml(team){
  const flag=FLAG_MAP[team];
  if(flag)return flag;
  return'🏳️';
}

// ── 数据加载 ──

async function loadSchedule(){
  let files=null;

  // 方式1: 尝试 fetch manifest.json（HTTP 服务器模式）
  try{
    const resp=await fetch(MANIFEST);
    if(resp.ok) files=await resp.json();
  }catch(e){/* file:// 协议下 fetch 不可用 */}

  // 方式2: 回退到内嵌列表
  if(!files||!files.length){
    console.log('manifest.json 不可用，使用内嵌文件列表');
    files=EMBEDDED_FILES;
  }

  if(!files||!files.length){
    showDropZone();
    return;
  }

  await loadFilesAndRender(files);
}

async function loadFilesAndRender(files){
  const matches=[];
  for(const file of files){
    try{
      // 尝试从 data/ 目录加载
      const resp=await fetch(DATA_DIR+file);
      if(resp.ok){
        const data=await resp.json();
        matches.push(extractCardData(data,file));
      }
    }catch(e){
      console.warn('跳过文件:',file,e);
    }
  }

  if(!matches.length){
    showDropZone();
    return;
  }

  renderSchedule(matches);
}

function showDropZone(){
  const container=document.getElementById('main-content');
  container.innerHTML=`
    <div class="empty-state">
      <h3>无法自动加载赛程数据</h3>
      <p style="margin-bottom:16px">本地打开时（file:// 协议）浏览器禁止读取文件，请：</p>
      <p>1. 将 JSON 文件拖放到下方区域；或</p>
      <p>2. 使用本地服务器：<code style="background:var(--primary-light);padding:2px 6px;border-radius:4px">python -m http.server</code></p>
    </div>
    <div class="drop-zone" id="drop-zone">
      📂 拖放 data 文件夹或 JSON 文件到此处<br>或点击选择文件
      <input type="file" id="file-input" multiple accept=".json" style="display:none">
    </div>`;
  setupDropZone();
}

function setupDropZone(){
  const dz=document.getElementById('drop-zone');
  const fi=document.getElementById('file-input');
  if(!dz||!fi)return;

  dz.addEventListener('click',()=>fi.click());
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.classList.remove('drag-over');
    handleDroppedFiles(e.dataTransfer.files);
  });
  fi.addEventListener('change',e=>handleDroppedFiles(e.target.files));
}

async function handleDroppedFiles(fileList){
  const matches=[];
  for(const f of fileList){
    if(!f.name.endsWith('.json'))continue;
    try{
      const text=await f.text();
      const data=JSON.parse(text);
      matches.push(extractCardData(data,f.name));
    }catch(e){console.warn('无法解析:',f.name)}
  }
  if(matches.length) renderSchedule(matches);
  else alert('未找到有效的辩论 JSON 文件');
}

function extractCardData(data,filename){
  const{teamA,teamB}=parseTopic(data.topic||'');
  const meta=data.match_meta||{};
  const fp=data.final_prediction;
  const agents=data.agents||[];
  const ti=data.team_info||{};

  let cA=0,cB=0,cX=0;
  for(const a of agents){
    const s=sideOf(a,data.topic);
    if(s==='a')cA++;else if(s==='b')cB++;else cX++;
  }
  const total=agents.length||1;
  const probA=Math.round(cA/total*100);
  const probB=Math.round(cB/total*100);
  const probX=100-probA-probB;

  const stageStr=meta.stage||'';
  const isKnockout=/淘汰|1\/8|1\/4|半|决赛/i.test(stageStr);

  return{
    file:filename,teamA,teamB,
    stage:stageStr,matchId:meta.match_id||'',
    date:meta.date||'',city:meta.city||'',
    venue:meta.venue_zh||meta.venue||'',
    rankingA:ti[teamA]?.world_ranking,rankingB:ti[teamB]?.world_ranking,
    winner:fp?.winner||'',score:fp?.score||'',
    confidence:fp?.confidence||0,
    topPredictions:data.top_predictions||[],
    probA,probB,probX:Math.max(0,probX),
    consensus:data.consensus,isKnockout,
  };
}

// ── 渲染 ──

function renderSchedule(matches){
  const container=document.getElementById('main-content');

  const navLinks=document.getElementById('nav-links');
  const hasGroup=matches.some(m=>!m.isKnockout);
  const hasKnockout=matches.some(m=>m.isKnockout);
  let navHtml='';
  if(hasGroup)navHtml+='<a href="#section-group" class="nav-link active" data-section="group">小组赛</a>';
  if(hasKnockout)navHtml+='<a href="#section-knockout" class="nav-link" data-section="knockout">淘汰赛</a>';
  navLinks.innerHTML=navHtml;

  const byDate={};
  for(const m of matches){
    const d=m.date||'未知日期';
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(m);
  }

  let html='';
  if(hasGroup){
    html+='<div id="section-group"><div class="section-title">小组赛</div>';
    for(const[date,ms]of Object.entries(byDate)){
      const gm=ms.filter(m=>!m.isKnockout);
      if(!gm.length)continue;
      html+=`<div class="date-head">📅 ${esc(date)}</div><div class="cards">`;
      for(const m of gm)html+=renderCard(m);
      html+='</div>';
    }
    html+='</div>';
  }
  if(hasKnockout){
    html+='<div id="section-knockout"><div class="section-title">淘汰赛</div>';
    for(const[date,ms]of Object.entries(byDate)){
      const km=ms.filter(m=>m.isKnockout);
      if(!km.length)continue;
      html+=`<div class="date-head">📅 ${esc(date)}</div><div class="cards">`;
      for(const m of km)html+=renderCard(m);
      html+='</div>';
    }
    html+='</div>';
  }

  container.innerHTML=html;
  requestAnimationFrame(()=>animateProgressBars());

  navLinks.querySelectorAll('.nav-link').forEach(link=>{
    link.addEventListener('click',()=>{
      navLinks.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
      link.classList.add('active');
    });
  });
}

function renderCard(m){
  const confPct=Math.round(m.confidence/10*100);
  const confClass=m.confidence>=7?'high':m.confidence>=4?'mid':'low';

  let topHtml='';
  if(m.topPredictions.length>1){
    topHtml='<div class="top-scores">';
    m.topPredictions.forEach((p,i)=>{
      topHtml+=`<span class="score-chip${i===0?' best':''}">${smallFlagHtml(p.winner)}${esc(p.score)}</span>`;
    });
    topHtml+='</div>';
  }

  const{teamA,teamB}=m;
  const winnerSide=m.winner.includes(teamA)?'a':m.winner.includes(teamB)?'b':'x';
  const winnerFlag=winnerSide==='a'?smallFlagHtml(teamA):winnerSide==='b'?smallFlagHtml(teamB):'🤝';

  // 构建详情页链接 — 如果从 data/ fetch 成功则用 data/ 路径
  const jsonParam=encodeURIComponent(DATA_DIR+m.file);

  return`
  <a class="sched-card" href="${DETAIL_PAGE}?json=${jsonParam}">
    <div class="card-top">
      <span class="stage-tag">${esc(m.stage||m.matchId)}</span>
      <span style="display:flex;align-items:center;gap:6px">
        <span class="city-tag">${esc(m.city)}${m.venue?' · '+esc(m.venue):''}</span>
        ${m.consensus!==undefined?`<span class="consensus-badge ${m.consensus?'yes':'no'}">${m.consensus?'共识':'分歧'}</span>`:''}
      </span>
    </div>
    <div class="teams-row">
      <div class="team-col">
        ${flagHtml(teamA)}
        <div class="team-name">${esc(teamA)}</div>
        ${m.rankingA?`<div class="team-rank">FIFA #${m.rankingA}</div>`:''}
      </div>
      <div class="vs-text">VS</div>
      <div class="team-col">
        ${flagHtml(teamB)}
        <div class="team-name">${esc(teamB)}</div>
        ${m.rankingB?`<div class="team-rank">FIFA #${m.rankingB}</div>`:''}
      </div>
    </div>
    <div class="prob-bar">
      <div class="seg home" style="width:${m.probA}%">${m.probA}%</div>
      <div class="seg draw" style="width:${m.probX}%">${m.probX}%</div>
      <div class="seg away" style="width:${m.probB}%">${m.probB}%</div>
    </div>
    <div class="prob-legend">
      <span><span class="dot" style="background:var(--bar-home)"></span>${esc(teamA)}</span>
      <span><span class="dot" style="background:var(--bar-draw)"></span>平局</span>
      <span><span class="dot" style="background:var(--bar-away)"></span>${esc(teamB)}</span>
    </div>
    ${m.winner?`
    <div class="pred-row">
      <span class="pred-result">${winnerFlag} ${esc(m.winner)}</span>
      <span class="pred-score">${esc(m.score)}</span>
      <span class="pred-conf-bar"><span class="pred-conf-fill ${confClass}" data-target-width="${confPct}%" style="width:0"></span></span>
      <span class="pred-conf">${m.confidence}/10</span>
    </div>
    `:'<div class="pred-row" style="color:var(--text3);font-size:13px">暂无预测结果</div>'}
    ${topHtml}
  </a>`;
}

function animateProgressBars(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('[data-target-width]').forEach(el=>{
      const tw=el.dataset.targetWidth;
      el.style.transition='width 0.6s cubic-bezier(0.25,0.46,0.45,0.94)';
      el.style.width=tw;
    });
    document.querySelectorAll('.prob-bar .seg').forEach(el=>{
      const tw=el.style.width;
      el.style.width='0';
      requestAnimationFrame(()=>{
        el.style.transition='width 0.6s cubic-bezier(0.25,0.46,0.45,0.94)';
        el.style.width=tw;
      });
    });
  });
}

// Load on startup
loadSchedule();
</script>
</body>
</html>
