<!DOCTYPE html>
<html lang="zh-CN" data-theme="default">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 辩论预测 · 赛程</title>
<style>
/* ═══ Theme: Default（高级灰） ═══ */
[data-theme="default"]{
  --primary:#4a7bbf;--primary-dark:#3a65a0;--primary-light:#edf1f8;
  --bg:#f4f4f6;--card:#fff;--border:#ddd;--divider:#ebebec;
  --text:#2a2a2a;--text2:#5a5a5a;--text3:#8a8a8a;
  --red:#b03d3d;--green:#27ae60;--orange:#ec852b;--blue:#3a65a0;--yellow:#a4a380;
  --side-a:#b03d3d;--side-b:#3a65a0;--side-x:#a4a380;
  --nav-bg:rgba(58,72,96,0.96);--nav-text:#d0d8e4;--nav-muted:rgba(255,255,255,0.55);
  --badge-yes-bg:#e2efe6;--badge-no-bg:#f5eadb;
}
/* ═══ Theme: Light（原色） ═══ */
[data-theme="light"]{
  --primary:#1678F2;--primary-dark:#125ccc;--primary-light:#e8f0fe;
  --bg:#f5f5f5;--card:#fff;--border:#e8e8e8;--divider:#f1f1f1;
  --text:#222;--text2:#555;--text3:#888;
  --red:#e74c3c;--green:#27ae60;--orange:#f39c12;--blue:#2980b9;--yellow:#f0ad4e;
  --side-a:#e74c3c;--side-b:#2980b9;--side-x:#f0ad4e;
  --nav-bg:rgba(22,120,242,0.95);--nav-text:#fff;--nav-muted:rgba(255,255,255,0.65);
  --badge-yes-bg:#e8f5e9;--badge-no-bg:#fff3e0;
}
/* ═══ Theme: Dark ═══ */
[data-theme="dark"]{
  --primary:#5a7aaa;--primary-dark:#4a6a98;--primary-light:#252538;
  --bg:#1a1a24;--card:#242432;--border:#363648;--divider:#2a2a38;
  --text:#c8c8d4;--text2:#8a8aa4;--text3:#5a5a72;
  --red:#dd6550;--green:#27ae60;--orange:#e9842c;--blue:#5790d6;--yellow:#bdccab;
  --side-a:#dd6550;--side-b:#5790d6;--side-x:#bdccab;
  --nav-bg:rgba(18,18,28,0.97);--nav-text:#a8a8bc;--nav-muted:rgba(255,255,255,0.4);
  --badge-yes-bg:#1e2e28;--badge-no-bg:#2e2818;
}

*{margin:0;padding:0;box-sizing:border-box}
:root{--radius:10px;--shadow:0 2px 8px rgba(0,0,0,0.12);--max-w:1080px}
html{font-size:17px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s}
a{color:var(--primary);text-decoration:none}

/* ── Sticky Nav ── */
.sticky-nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(10px);padding:9px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.12);transition:background .3s}
.nav-brand{color:var(--nav-text);font-size:14px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.nav-spacer{flex:1}
.nav-links{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.nav-link{color:var(--nav-muted);font-size:13px;padding:4px 12px;border-radius:16px;transition:all .2s;text-decoration:none;white-space:nowrap}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,0.14);color:rgba(255,255,255,0.95)}
.theme-btns{display:flex;gap:2px;margin-left:8px;border-left:1px solid rgba(255,255,255,0.15);padding-left:10px}
.theme-btn{color:var(--nav-muted);font-size:12px;padding:3px 8px;border-radius:12px;cursor:pointer;border:none;background:none;transition:all .2s;line-height:1.2}
.theme-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85)}
.theme-btn.active{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.95)}

/* ── Hero ── */
.hero-header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;transition:background .3s}
.hero-header::before{content:'';position:absolute;top:-50%;right:-20%;width:80%;height:200%;border-radius:50%;background:rgba(255,255,255,0.03);pointer-events:none}
.hero-title{font-size:22px;font-weight:800;margin-bottom:4px}
.hero-sub{font-size:13px;opacity:.6}

/* ── Container ── */
.container{max-width:var(--max-w);margin:0 auto;padding:0 16px}

/* ── Today Button ── */
.today-btn{display:inline-block;padding:10px 120px;background:var(--card);border:1.5px solid var(--primary);border-radius:28px;font-size:15px;font-weight:700;color:var(--primary);cursor:pointer;transition:all .2s;box-shadow:var(--shadow);text-decoration:none;letter-spacing:.5px}
.today-btn:hover{background:var(--primary);color:#fff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
[data-theme="default"] .today-btn{background:var(--bg);border-color:var(--text3);box-shadow:none}
[data-theme="default"] .today-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 16px rgba(0,0,0,0.15)}

/* ── Stage Section ── */
.stage-section[id]{scroll-margin-top:54px}
.stage-title{font-size:20px;font-weight:800;color:var(--text);margin:28px 0 6px;padding:6px 0 6px 14px;border-left:5px solid var(--primary);background:linear-gradient(90deg,var(--primary-light),transparent);border-radius:0 var(--radius) var(--radius) 0;transition:color .3s,border-color .3s,background .3s}
.sub-stage-title{font-size:15px;font-weight:700;color:var(--text2);margin:16px 0 6px;padding-left:4px;transition:color .3s}
.date-head{font-size:13px;font-weight:600;color:var(--text3);margin:14px 0 6px;padding-left:4px}

/* ── Cards Grid ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;align-items:start}

/* ── Schedule Card ── */
.sched-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease,background .3s;text-decoration:none;color:var(--text);display:block;border-left:4px solid var(--text3);animation:card-in .5s ease both;min-width:0;overflow:hidden}
.sched-card:hover{transform:translateY(-4px);box-shadow:0 6px 20px rgba(0,0,0,0.15)}
.sched-card.side-a{border-left-color:var(--side-a)}
.sched-card.side-b{border-left-color:var(--side-b)}
.sched-card.side-x{border-left-color:var(--side-x)}
@keyframes card-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;gap:6px}
.stage-tag{background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:background .3s,color .3s}
.city-tag{color:var(--text3);font-size:11px;display:block;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;transition:color .3s}

/* Teams Row */
.teams-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px}
.team-col{text-align:center;flex:1;min-width:0}
.team-flag{width:72px;height:48px;border-radius:4px;object-fit:contain;margin:0 auto 4px;border:none;background:none}
.team-flag-ph{width:72px;height:48px;border-radius:4px;margin:0 auto 4px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--primary);border:none}
.team-name{font-size:16px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.vs-text{font-size:20px;font-weight:800;color:var(--text3);flex-shrink:0}

/* Stance Bar */
.stance-bar{display:flex;height:20px;border-radius:10px;overflow:hidden;margin:8px 0;background:var(--divider);transition:background .3s}
.stance-bar .seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;min-width:22px;clip-path:inset(0 100% 0 0);animation:bar-enter 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
.stance-bar .seg.seg-a{background:var(--side-a)}
.stance-bar .seg.seg-x{background:var(--side-x)}
.stance-bar .seg.seg-b{background:var(--side-b)}
@keyframes bar-enter{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
.stance-legend{display:flex;gap:14px;font-size:11px;color:var(--text3);margin-top:3px}
.stance-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px}
.stance-legend span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Prediction Row */
.pred-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.pred-winner{font-size:14px;font-weight:800;white-space:nowrap}
.pred-winner.side-a{color:var(--side-a)}
.pred-winner.side-b{color:var(--side-b)}
.pred-winner.side-x{color:var(--side-x)}
.pred-score{font-size:13px;color:var(--text2);font-weight:700;white-space:nowrap}
.pred-conf-bar{flex:1;min-width:50px;max-width:80px;height:8px;background:var(--divider);border-radius:4px;overflow:hidden;transition:background .3s}
.pred-conf-label{font-size:11px;color:var(--text3);white-space:nowrap}
.pred-conf-fill{height:100%;border-radius:4px;display:block;clip-path:inset(0 100% 0 0);animation:bar-enter 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
.pred-conf-fill.high{background:var(--green)}
.pred-conf-fill.mid{background:var(--orange)}
.pred-conf-fill.low{background:var(--red)}
.pred-conf-text{font-size:11px;color:var(--text3);white-space:nowrap}
.topk-row{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:11px;flex-wrap:wrap}
.topk-label{color:var(--text3);white-space:nowrap}
.topk-score{color:var(--text2);font-weight:600;padding:1px 5px;background:var(--primary-light);border-radius:3px}
.topk-score.exact-match{background:var(--green);color:#fff;font-weight:700;padding:1px 6px;border-radius:3px}

/* Prediction score group highlight when matching #1 */
.pred-score-group{display:inline-flex;align-items:center;gap:4px;border-radius:4px;padding:1px 4px}
.pred-score-group.pred-score-match{background:var(--green)}
.pred-score-group.pred-score-match .pred-winner{color:#fff!important}
.pred-score-group.pred-score-match .pred-score{color:#fff!important;font-weight:800}

/* Real Score Display */
.real-score{display:flex;align-items:center;justify-content:center;gap:2px;font-size:28px;font-weight:800;flex-shrink:0;line-height:1}
.real-score-num{min-width:22px;text-align:center}
.real-score-sep{color:var(--text3);font-size:22px;margin:0 2px}
.real-score.exact-match{border:2px solid var(--green);border-radius:8px;padding:2px 10px;background:color-mix(in srgb,var(--green) 6%,transparent)}

/* Accuracy Info - compact, between score and stance bar */
.real-accuracy-info{text-align:center;line-height:1.4;margin-top:6px}
.accuracy-line{font-size:10px;color:var(--text3);white-space:nowrap}
.accuracy-line.rank-1{color:var(--green);font-weight:700}
.accuracy-line.no-match{color:var(--red);font-weight:600}
.accuracy-line strong{font-weight:700}

/* Score + accuracy wrapper - vertical centering with team flags */
.score-result-area{display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}

/* Global Accuracy Stats */
.accuracy-stats{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:12px;color:rgba(255,255,255,0.85);flex-wrap:wrap}
.accuracy-stat{background:rgba(255,255,255,0.12);padding:3px 10px;border-radius:12px;white-space:nowrap}
.accuracy-stat strong{color:#fff}

/* Consensus Badge */
.consensus-badge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;flex-shrink:0;transition:background .3s}
.consensus-badge.yes{background:var(--badge-yes-bg);color:var(--green)}
.consensus-badge.no{background:var(--badge-no-bg);color:var(--orange)}

/* ── Empty / Loading ── */
.empty-slot{padding:10px 16px;margin:4px 0;background:var(--card);border-radius:var(--radius);border:1px dashed var(--border);font-size:13px;color:var(--text3);text-align:center;transition:background .3s;grid-column:1/-1}
.date-loading{color:var(--text3);font-size:13px;display:block;text-align:center;padding:10px 16px;margin:4px 0;background:var(--card);border-radius:var(--radius);border:1px dashed var(--border);grid-column:1/-1;transition:background .3s}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}

/* ── Drop Zone ── */
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:30px 20px;text-align:center;cursor:pointer;transition:border-color .2s;color:var(--text3);margin:20px 0;font-size:14px}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}

/* ── Footer ── */
.page-footer{text-align:center;padding:20px;font-size:12px;color:var(--text3);margin-top:40px}

/* ── Responsive ── */
@media(max-width:760px){
  .cards{grid-template-columns:1fr}
  .sticky-nav{padding:7px 12px;gap:6px}
  .nav-brand{font-size:13px}
  .nav-link{font-size:12px;padding:3px 8px}
}
</style>
</head>
<body>

<nav class="sticky-nav" id="sticky-nav">
  <span class="nav-brand">AI Arena · 多AI辩论预测</span>
  <span class="nav-spacer"></span>
  <div class="nav-links" id="nav-links"></div>
  <div class="theme-btns" id="theme-btns">
    <button class="theme-btn active" data-theme="default" title="默认灰调">◈</button>
    <button class="theme-btn" data-theme="light" title="明亮原色">☀</button>
    <button class="theme-btn" data-theme="dark" title="暗夜模式">◐</button>
  </div>
</nav>

<div class="hero-header" id="hero-header">
  <div class="hero-title">2026 世界杯 · 赛程预测</div>
  <div class="hero-sub">多智能体对抗辩论系统 · 综合研判</div>
  <div style="margin-top:14px"><a class="today-btn" id="today-btn" style="display:none" onclick="jumpToToday()">跳转至今日赛程</a></div>
</div>

<div class="container" id="main-content">
  <div class="loading">正在加载赛程数据...</div>
</div>

<div class="page-footer">辩论数据由多智能体辩论系统生成<br><br>© 2026 华中科技大学智能媒体计算与网络安全实验室<br>仅供学术研究，不作商业用途<br>实验室主页: <a href="https://media.hust.edu.cn/" target="_blank">https://media.hust.edu.cn/</a><br>邮箱: <a href="mailto:skyesong@hust.edu.cn">skyesong@hust.edu.cn</a></div>

<script>
const DATA_DIR='data/',MANIFEST=DATA_DIR+'manifest.json',DETAIL_PAGE='match.html',IMAGES_DIR='images/',REAL_RESULTS=DATA_DIR+'real_results.json';
const SCROLL_KEY='index_scroll_y',THEME_KEY='arena_theme';
let REAL_DATA=null; // 全局真实结果数据

// ═══ 赛程结构 ═══
const TOURNAMENT=[
  {key:'group',label:'小组赛',subs:[
    {key:'g-r1',label:'小组赛第1轮',dates:['2026-06-12','2026-06-13','2026-06-14','2026-06-15','2026-06-16','2026-06-17','2026-06-18']},
    {key:'g-r2',label:'小组赛第2轮',dates:['2026-06-19','2026-06-20','2026-06-21','2026-06-22','2026-06-23','2026-06-24']},
    {key:'g-r3',label:'小组赛第3轮',dates:['2026-06-25','2026-06-26','2026-06-27','2026-06-28']},
  ]},
  {key:'ko',label:'淘汰赛',subs:[
    {key:'r32',label:'1/16 决赛',dates:['2026-06-29','2026-06-30','2026-07-01','2026-07-02','2026-07-03','2026-07-04']},
    {key:'r16',label:'1/8 决赛',dates:['2026-07-05','2026-07-06','2026-07-07','2026-07-08']},
    {key:'qf',label:'1/4 决赛',dates:['2026-07-10','2026-07-11','2026-07-12']},
    {key:'sf',label:'半决赛',dates:['2026-07-15','2026-07-16']},
    {key:'sf',label:'季军赛',dates:['2026-07-19']},
  ]},
  {key:'final',label:'决赛',subs:[
    {key:'f1',label:'决赛',dates:['2026-07-20']},
  ]},
];

// ═══ 主题切换 ═══
function initTheme(){
  const saved=localStorage.getItem(THEME_KEY);
  if(saved)document.documentElement.setAttribute('data-theme',saved);
  updateThemeBtns();
  document.querySelectorAll('.theme-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=btn.dataset.theme;
      document.documentElement.setAttribute('data-theme',t);
      localStorage.setItem(THEME_KEY,t);
      updateThemeBtns();
    });
  });
}
function updateThemeBtns(){
  const cur=document.documentElement.getAttribute('data-theme')||'default';
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===cur));
}

// ═══ 工具函数 ═══
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function parseTopic(t){const p=t.split(/\s+vs\s+/i);return{teamA:p[0]?.trim()||t,teamB:p[1]?.split('（')[0]?.trim()||''}}
function flagImgHtml(name){
  const url=IMAGES_DIR+encodeURIComponent(name)+'.webp';
  const fb=IMAGES_DIR+encodeURIComponent(name)+'.png';
  return `<img class="team-flag" src="${url}" onerror="if(!this.dataset.retry){this.dataset.retry='1';this.src='${fb}'}else{this.style.display='none';this.nextElementSibling.style.display='flex'}" alt="${esc(name)}"><div class="team-flag-ph" style="display:none">${esc(name.charAt(0))}</div>`;
}
function sideOf(agent,topic){
  const{teamA,teamB}=parseTopic(topic);
  const h=agent.prediction_history||[],last=h[h.length-1];
  if(!last)return'x';const w=last.winner||'';
  if(w.includes(teamA))return'a';if(w.includes(teamB))return'b';return'x';
}
function saveScrollPos(cardEl){
  // 保存卡片的文件标识而非像素位置，避免异步加载导致偏移
  const href=cardEl?.getAttribute('href')||'';
  sessionStorage.setItem(SCROLL_KEY,href);
}
function restoreScrollPos(){
  const saved=sessionStorage.getItem(SCROLL_KEY)||'';
  if(!saved)return;
  sessionStorage.removeItem(SCROLL_KEY);
  // 延迟尝试查找目标卡片（等待异步加载完成）
  const tryScroll=(attempt)=>{
    const card=document.querySelector(`.sched-card[href="${CSS.escape(saved)}"]`);
    if(card){card.scrollIntoView({behavior:'instant',block:'center'})}
    else if(attempt<10){setTimeout(()=>tryScroll(attempt+1),300)}
  };
  setTimeout(()=>tryScroll(0),200);
}

// ═══ 数据提取 ═══
function findRealResult(teamA,teamB,date){
  if(!REAL_DATA)return null;
  const matches=REAL_DATA.matches||{};
  for(const key in matches){
    const m=matches[key];
    if(m.home_team===teamA&&m.away_team===teamB&&m.status==='已结束')return m;
    // 也尝试日期匹配
    if(date&&key===`${date}_${teamA}_vs_${teamB}`&&m.status==='已结束')return m;
  }
  return null;
}
function actualToPredFormat(homeTeam,awayTeam,homeScore,awayScore){
  if(homeScore>awayScore)return{winner:homeTeam,predScore:`${homeScore}-${awayScore}`};
  if(awayScore>homeScore)return{winner:awayTeam,predScore:`${awayScore}-${homeScore}`};
  return{winner:'平局',predScore:`${homeScore}-${awayScore}`};
}
function extractCardData(data,filename){
  const{teamA,teamB}=parseTopic(data.topic||'');
  const meta=data.match_meta||{},fp=data.final_prediction,agents=data.agents||[],ti=data.team_info||{};
  let cA=0,cB=0,cX=0;
  for(const a of agents){const s=sideOf(a,data.topic);if(s==='a')cA++;else if(s==='b')cB++;else cX++}
  const total=agents.length||1;
  const topPreds=(data.top_predictions||[]).slice(1,4);
  // 真实结果匹配
  const realResult=findRealResult(teamA,teamB,meta.date||'');
  let realScore=null,actualWinner=null,actualPredScore=null,winnerMatchRank=null,scoreMatchRank=null;
  if(realResult){
    realScore=realResult.score_display;
    const fmt=actualToPredFormat(teamA,teamB,realResult.home_score,realResult.away_score);
    actualWinner=fmt.winner;
    actualPredScore=fmt.predScore;
    // 在全部 top_predictions 中查找排名
    const allPreds=data.top_predictions||[];
    for(let i=0;i<allPreds.length;i++){
      if(winnerMatchRank===null&&allPreds[i].winner===actualWinner)winnerMatchRank=i+1;
      if(scoreMatchRank===null&&allPreds[i].winner===actualWinner&&allPreds[i].score===actualPredScore)scoreMatchRank=i+1;
    }
    // 回退：无 top_predictions 时，检查 final_prediction / verdict 是否命中
    if(!allPreds.length){
      const fp=data.final_prediction||data.verdict;
      if(fp){
        if(fp.winner===actualWinner)winnerMatchRank=1;
        if(fp.winner===actualWinner&&fp.score===actualPredScore)scoreMatchRank=1;
      }
    }
  }
  return{file:filename,teamA,teamB,stage:meta.stage||'',matchId:meta.match_id||'',
    date:meta.date||'',city:meta.city||'',venue:meta.venue_zh||meta.venue||'',
    winner:fp?.winner||'',score:fp?.score||'',confidence:fp?.confidence||0,
    pctA:Math.round(cA/total*100),pctB:Math.round(cB/total*100),
    pctX:Math.max(0,100-Math.round(cA/total*100)-Math.round(cB/total*100)),
    consensus:data.consensus,topPreds,
    realScore,actualWinner,actualPredScore,winnerMatchRank,scoreMatchRank};
}

// ═══ 渲染 ═══

async function loadSchedule(){
  const container=document.getElementById('main-content');
  container.innerHTML='<div class="loading">正在加载赛程数据...</div>';
  let files=null;
  try{const r=await fetch(MANIFEST+'?t='+Date.now());if(r.ok)files=await r.json()}catch(e){}
  // 并行加载真实结果
  try{const r=await fetch(REAL_RESULTS+'?t='+Date.now());if(r.ok)REAL_DATA=await r.json()}catch(e){}
  if(!files||!files.length){showDropZone();return}

  // 先渲染骨架
  const sk=buildSkeleton();
  container.innerHTML=sk.html;
  // Show today button if there are matches today
  const today=new Date().toLocaleDateString('sv-SE');
  const todayBtn=document.getElementById('today-btn');
  if(todayBtn && sk.byDate[today])todayBtn.style.display='inline-block';
  setupNavLinks();
  setupScrollHighlight();

  // 逐条加载并插入，同时收集准确度数据
  const allCards=[];
  for(const file of files){
    try{
      const r=await fetch(DATA_DIR+file+'?t='+Date.now());
      if(r.ok){const d=await r.json();const m=extractCardData(d,file);insertCard(m,sk.byDate);allCards.push(m)}
    }catch(e){console.warn('跳过:',file)}
  }
  // 清除空位 loading
  document.querySelectorAll('.date-loading').forEach(el=>{
    if(!el.parentElement.querySelector('.sched-card'))el.textContent='等待最新数据，还未开始预测';
    else el.remove();
  });
  // 所有卡片加载完毕后恢复滚动位置
  restoreScrollPos();
  // 渲染全局准确度统计
  renderAccuracyStats(allCards);
}

function buildSkeleton(){
  const byDate={};let html='';
  for(const stage of TOURNAMENT){
    html+=`<div class="stage-section" id="stage-${stage.key}"><div class="stage-title">${stage.label}</div>`;
    for(const sub of stage.subs){
      html+=`<div class="sub-stage-title">${sub.label}</div>`;
      for(const d of sub.dates){
        byDate[d]='cards-'+d.replace(/-/g,'');
        html+=`<div class="date-head">${formatDate(d)}</div>`;
        html+=`<div class="cards" id="${byDate[d]}"><span class="date-loading">加载中…</span></div>`;

      }
    }
    html+='</div>';
  }
  return{html,byDate};
}

function insertCard(m,byDate){
  const grid=document.getElementById(byDate[m.date]);
  if(!grid)return;
  const ld=grid.querySelector('.date-loading');if(ld)ld.remove();
  grid.insertAdjacentHTML('beforeend',renderCard(m));
}

function showDropZone(){
  document.getElementById('main-content').innerHTML=`
    <div style="text-align:center;padding:40px;color:var(--text3)">
      <p style="margin-bottom:12px">无法自动加载赛程数据</p>
      <p style="font-size:13px;margin-bottom:8px">请使用本地服务器：<code style="background:var(--primary-light);padding:2px 6px;border-radius:4px">cd FIFA-Prediction && python -m http.server</code></p>
    </div>
    <div class="drop-zone" id="drop-zone">📂 拖放 JSON 文件到此处<input type="file" id="file-input" multiple accept=".json" style="display:none"></div>`;
  const dz=document.getElementById('drop-zone'),fi=document.getElementById('file-input');
  if(!dz||!fi)return;
  dz.addEventListener('click',()=>fi.click());
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleDropped(e.dataTransfer.files)});
  fi.addEventListener('change',e=>handleDropped(e.target.files));
}

async function handleDropped(fileList){
  const matches=[];
  for(const f of fileList){
    if(!f.name.endsWith('.json'))continue;
    try{
      const text=await f.text();
      const data=JSON.parse(text);
      if(f.name==='real_results.json'){REAL_DATA=data;continue}
      matches.push(extractCardData(data,f.name));
    }catch(e){}
  }
  if(matches.length){const byDate={};for(const m of matches){const d=m.date||'';if(d){if(!byDate[d])byDate[d]=[];byDate[d].push(m)}}
    let html='';for(const stage of TOURNAMENT){html+=`<div class="stage-section" id="stage-${stage.key}"><div class="stage-title">${stage.label}</div>`;for(const sub of stage.subs){html+=`<div class="sub-stage-title">${sub.label}</div>`;for(const d of sub.dates){const ms=byDate[d]||[];html+=`<div class="date-head">${formatDate(d)}</div>`;if(ms.length){html+='<div class="cards">';for(const m of ms)html+=renderCard(m);html+='</div>'}else html+=`<div class="empty-slot">等待最新数据，还未开始预测</div>`}}html+='</div>'}
    document.getElementById('main-content').innerHTML=html;setupNavLinks();setupScrollHighlight();}
}

function formatDate(d){
  if(!d)return'';const p=d.split('-');if(p.length!==3)return d;
  const w=['日','一','二','三','四','五','六'];
  const dt=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  const isToday=d===new Date().toLocaleDateString('sv-SE');
  return `🗓 ${parseInt(p[1])}月${parseInt(p[2])}日 周${w[dt.getDay()]}${isToday?' · 今天':''}`;
}

function jumpToToday(){
  const today=new Date().toLocaleDateString('sv-SE');
  const el=document.getElementById('cards-'+today.replace(/-/g,''))||document.querySelector('.date-head');
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

function renderAccuracyStats(allCards){
  const withResult=allCards.filter(m=>m.realScore);
  if(!withResult.length)return;
  // 胜负准确率
  let winnerCorrect=0;
  for(const m of withResult){
    if(m.actualWinner&&m.winner===m.actualWinner)winnerCorrect++;
  }
  // 比分命中率（top_predictions任一项命中）
  let scoreHit=0;
  for(const m of withResult){
    if(m.scoreMatchRank!==null)scoreHit++;
  }
  // 综合评分
  let totalScore=0,maxScore=0;
  for(const m of withResult){
    maxScore+=10;
    if(!m.actualWinner)continue;
    if(m.winner===m.actualWinner)totalScore+=5;
    if(m.scoreMatchRank!==null)totalScore+=3;
    // 进球差
    const r=REAL_DATA&&Object.values(REAL_DATA.matches||{}).find(x=>x.home_team===m.teamA&&x.away_team===m.teamB);
    if(r){
      const ap=actualToPredFormat(m.teamA,m.teamB,r.home_score,r.away_score);
      const predParts=m.score.split('-').map(Number);
      const actualParts=ap.predScore.split('-').map(Number);
      if(predParts.length===2&&actualParts.length===2){
        if(Math.abs(predParts[0]-actualParts[0])<=1)totalScore+=1;
        if(Math.abs(predParts[1]-actualParts[1])<=1)totalScore+=1;
        if(predParts[0]+predParts[1]===actualParts[0]+actualParts[1])totalScore+=1;
      }
    }
  }
  const heroEl=document.getElementById('hero-header');
  if(!heroEl)return;
  const pct1=withResult.length?Math.round(winnerCorrect/withResult.length*100):0;
  const pct2=withResult.length?Math.round(scoreHit/withResult.length*100):0;
  const statsHtml=`<div class="accuracy-stats">
    <span class="accuracy-stat">胜负准确率 <strong>${winnerCorrect}/${withResult.length}</strong> (${pct1}%)</span>
    <span class="accuracy-stat">比分命中率 <strong>${scoreHit}/${withResult.length}</strong> (${pct2}%)</span>
    <span class="accuracy-stat">综合评分 <strong>${totalScore}/${maxScore}</strong></span>
  </div>`;
  heroEl.insertAdjacentHTML('beforeend',statsHtml);
}

function renderCard(m){
  const{teamA,teamB}=m;
  const ws=m.winner.includes(teamA)?'a':m.winner.includes(teamB)?'b':'x';
  const sc=ws==='a'?'side-a':ws==='b'?'side-b':'side-x';
  const confPct=Math.round(m.confidence/10*100);
  const cc=m.confidence>=7?'high':m.confidence>=4?'mid':'low';

  let barHtml='';
  if(m.pctA)barHtml+=`<div class="seg seg-a" style="width:${m.pctA}%">${m.pctA}%</div>`;
  if(m.pctX)barHtml+=`<div class="seg seg-x" style="width:${m.pctX}%">${m.pctX}%</div>`;
  if(m.pctB)barHtml+=`<div class="seg seg-b" style="width:${m.pctB}%">${m.pctB}%</div>`;

  // 中间区域：真实比分 or VS
  let middleHtml='<div class="vs-text">VS</div>';
  let accuracyHtml='';
  if(m.realScore){
    const parts=m.realScore.split('-');
    const isExact1=m.scoreMatchRank===1;
    let scoreHtml=`<div class="real-score"><span class="real-score-num">${esc(parts[0]||'')}</span><span class="real-score-sep">:</span><span class="real-score-num">${esc(parts[1]||'')}</span></div>`;
    // 准确度信息
    let lines='';
    if(m.winnerMatchRank!==null){
      const cls=m.winnerMatchRank===1?'rank-1':m.winnerMatchRank<=3?'':'no-match';
      lines+=`<div class="accuracy-line ${cls}"><strong>胜负</strong>匹配<strong>第${m.winnerMatchRank}可能</strong></div>`;
    }else if(m.actualWinner){
      lines+=`<div class="accuracy-line no-match"><strong>胜负</strong>未命中</div>`;
    }
    if(m.scoreMatchRank!==null){
      const cls=m.scoreMatchRank===1?'rank-1':m.scoreMatchRank<=3?'':'no-match';
      lines+=`<div class="accuracy-line ${cls}"><strong>比分</strong>匹配<strong>第${m.scoreMatchRank}可能</strong></div>`;
    }else if(m.actualPredScore){
      lines+=`<div class="accuracy-line no-match"><strong>比分</strong>未命中</div>`;
    }
    if(lines) accuracyHtml=`<div class="real-accuracy-info">${lines}</div>`;
    middleHtml=`<div class="score-result-area">${scoreHtml}${accuracyHtml}</div>`;
  }

  let predHtml='';
  if(m.winner){
    const winLabel=ws!=='x'?esc(m.winner)+' 胜':esc(m.winner);
    // Top-k alternative predictions with highlighting
    let topkHtml='';
    if(m.topPreds&&m.topPreds.length){
      const altScores=m.topPreds.filter(p=>p.score&&(p.winner!==m.winner||p.score!==m.score)).slice(0,3);
      if(altScores.length) topkHtml=`<div class="topk-row"><span class="topk-label">其它可能比分</span>${altScores.map(p=>{
        const pDraw=p.winner&&!p.winner.includes(teamA)&&!p.winner.includes(teamB);
        const pLabel=pDraw?esc(p.winner):esc(p.winner)+' 胜';
        let cls='topk-score';
        if(m.actualPredScore&&p.winner===m.actualWinner&&p.score===m.actualPredScore){
          cls+=' exact-match';
        }
        return`<span class="${cls}">${pLabel} ${esc(p.score)}</span>`;
      }).join('')}</div>`;
    }
    predHtml=`<div class="pred-row">
      <span class="pred-score-group${m.scoreMatchRank===1?' pred-score-match':''}"><span class="pred-winner ${sc}">${winLabel}</span> <span class="pred-score">${esc(m.score)}</span></span>
      <span class="pred-conf-label">准确度</span>
      <span class="pred-conf-bar"><span class="pred-conf-fill ${cc}" style="width:${confPct}%"></span></span>
      <span class="pred-conf-text">${m.confidence}/10</span>
    </div>${topkHtml}`;
  }else{
    predHtml='<div class="pred-row" style="color:var(--text3);font-size:13px">暂无预测</div>';
  }

  const cv=(m.city||'')+(m.venue&&m.venue!==m.city?' · '+m.venue:'');

  return`
  <a class="sched-card ${sc}" href="${DETAIL_PAGE}?json=${encodeURIComponent(DATA_DIR+m.file)}" onclick="saveScrollPos(this)">
    <div class="card-top">
      <span class="stage-tag">${esc(m.stage||m.matchId)}</span>
      <span style="display:flex;align-items:center;gap:6px;min-width:0">
        <span class="city-tag">${esc(cv)}</span>
        ${m.consensus!==undefined?`<span class="consensus-badge ${m.consensus?'yes':'no'}">${m.consensus?'共识':'分歧'}</span>`:''}
      </span>
    </div>
    <div class="teams-row">
      <div class="team-col">${flagImgHtml(teamA)}<div class="team-name">${esc(teamA)}</div></div>
      ${middleHtml}
      <div class="team-col">${flagImgHtml(teamB)}<div class="team-name">${esc(teamB)}</div></div>
    </div>
    ${barHtml?`<div class="stance-bar">${barHtml}</div><div class="stance-legend"><span><span class="dot" style="background:var(--side-a)"></span>${esc(teamA)}</span><span><span class="dot" style="background:var(--side-x)"></span>平局</span><span><span class="dot" style="background:var(--side-b)"></span>${esc(teamB)}</span></div>`:''}
    ${predHtml}
  </a>`;
}

function setupNavLinks(){
  const navLinks=document.getElementById('nav-links');
  if(!navLinks.children.length){let h='';for(const s of TOURNAMENT)h+=`<a href="#stage-${s.key}" class="nav-link">${s.label}</a>`;navLinks.innerHTML=h}
  navLinks.querySelectorAll('.nav-link').forEach(link=>{
    link.addEventListener('click',()=>{navLinks.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));link.classList.add('active')});
  });
}

function setupScrollHighlight(){
  const navLinks=document.getElementById('nav-links'),links=navLinks.querySelectorAll('.nav-link');
  if(!links.length)return;
  const sections=[];
  links.forEach(l=>{const h=l.getAttribute('href');if(h&&h.startsWith('#')){const el=document.querySelector(h);if(el)sections.push({el,id:h.slice(1)})}});
  function onScroll(){const sy=window.scrollY+80;let cur='';for(const s of sections)if(s.el.offsetTop<=sy)cur=s.id;links.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+cur))}
  window.addEventListener('scroll',onScroll,{passive:true});onScroll();
}

initTheme();
loadSchedule();
</script>
