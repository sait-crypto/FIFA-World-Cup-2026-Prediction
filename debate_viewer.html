<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 辩论竞技场</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

/* ═══ Theme Variables ═══ */
:root{
  --bg:#0d0d1a;--bg2:#1a1a2e;--bg3:#252540;
  --fg:#e8e8e8;--fg2:#888899;
  --accent:#e94560;
  --side-a:#4fc3f7;--side-b:#ef5350;--side-x:#a55eea;
  --a1:#ff4757;--a2:#2ed573;--a3:#1e90ff;--a4:#ffa502;--a5:#a55eea;
  --border:#444466;--border2:#666688;
  --bubble-bg:rgba(13,13,26,0.92);
  --table-bg:#2a1a0a;--table-border:#5a3a1a;
  --battle-inner:#1e1e3a;
  --bar-bg:#111;--scanline:rgba(0,0,0,0.12);
}
[data-theme="light"]{
  --bg:#e8e8d8;--bg2:#f5f5ea;--bg3:#d8d8c8;
  --fg:#1a1a2e;--fg2:#666677;
  --accent:#c0392b;
  --side-a:#1565c0;--side-b:#c62828;--side-x:#6a1b9a;
  --a1:#c62828;--a2:#2e7d32;--a3:#1565c0;--a4:#e65100;--a5:#6a1b9a;
  --border:#aaaacc;--border2:#8888aa;
  --bubble-bg:rgba(245,245,234,0.95);
  --table-bg:#c4a882;--table-border:#8b6914;
  --battle-inner:#ddd8c8;
  --bar-bg:#ccc;--scanline:rgba(0,0,0,0.06);
}
[data-theme="cyber"]{
  --bg:#0a0a14;--bg2:#12122a;--bg3:#1a1a3a;
  --fg:#00ffcc;--fg2:#009977;
  --accent:#ff00ff;
  --side-a:#00ccff;--side-b:#ff3366;--side-x:#cc00ff;
  --a1:#ff3366;--a2:#33ff99;--a3:#00ccff;--a4:#ffcc00;--a5:#cc00ff;
  --border:#330066;--border2:#6600cc;
  --bubble-bg:rgba(10,10,20,0.95);
  --table-bg:#1a0a2a;--table-border:#6600cc;
  --battle-inner:#12122a;
  --bar-bg:#0a0a1a;--scanline:rgba(0,255,204,0.04);
}

body{
  font-family:'Press Start 2P','Microsoft YaHei',monospace;
  background:var(--bg);color:var(--fg);
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:8px;image-rendering:pixelated;
}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px)}

#game{max-width:1200px;width:100%;height:820px;position:relative;overflow:hidden;background:var(--bg2);border:3px solid var(--border2)}
@media(max-width:640px){#game{height:100dvh;max-height:820px}}

/* Loading */
#load-screen{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--bg)}
#load-screen.hidden{display:none}
#load-screen h1{font-size:16px;color:var(--accent);text-shadow:2px 2px 0 #000}
#load-screen .sub{font-size:8px;color:var(--fg2)}
#drop-zone{width:400px;height:130px;border:3px dashed var(--border);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:9px;color:var(--fg2);transition:border-color .2s}
#drop-zone:hover,#drop-zone.dragover{border-color:var(--accent);background:rgba(233,69,96,.1)}
#drop-zone .icon{font-size:32px}
#file-input{display:none}

/* Main */
#main{display:none;flex-direction:column;height:100%}
#main.active{display:flex}

/* Top Bar */
#topbar{height:32px;background:var(--bar-bg);display:flex;align-items:center;padding:0 10px;gap:10px;border-bottom:2px solid var(--border);font-size:8px;flex-shrink:0}
#topbar .title{color:var(--accent);font-size:10px}
#topbar .tag{padding:1px 6px;border:1px solid var(--border);font-size:7px}
#topbar .tag.yes{border-color:#2ed573;color:#2ed573}
#topbar .tag.no{border-color:#ef5350;color:#ef5350}
#topbar .spacer{flex:1}
#topbar button{background:var(--bg3);color:var(--fg2);border:1px solid var(--border);font-family:inherit;font-size:8px;padding:2px 8px;cursor:pointer}
#topbar button:hover{background:var(--border)}
#topbar .theme-btn{min-width:60px;color:var(--accent);border-color:var(--accent)}

/* Content */
#content{flex:1;display:flex;overflow:hidden}
#arena-col{flex:0 1 640px;min-width:320px;display:flex;flex-direction:column;border-right:2px solid var(--border)}
#battle{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse at center,var(--battle-inner) 0%,var(--bg) 100%);min-height:0}

/* Round table — shifted down for vertical centering of all content */
#table{position:absolute;width:210px;height:115px;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--table-bg);border:3px solid var(--table-border);transition:opacity .3s steps(4),filter .3s steps(4)}
#table::after{content:'';position:absolute;inset:6px;border:1px solid var(--table-border);opacity:.5}
#table.dimmed{opacity:.15;filter:blur(2px)}

/* ── Round Table Avatars ── */
.avatar{position:absolute;width:96px;text-align:center;transition:opacity .3s steps(4);z-index:10}
.avatar .sprite{
  width:48px;height:48px;margin:0 auto;
  border:2px solid var(--border);background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:bold;color:#fff;text-shadow:1px 1px 0 #000;
  transition:border-color .2s steps(3),box-shadow .2s steps(3),transform .3s steps(4);
  background-size:cover;background-position:center;
}
.avatar.speaking .sprite{border-color:#fff;transform:scale(1.4);z-index:15;box-shadow:0 0 6px 2px rgba(255,255,255,0.5)}
.avatar.dimmed{opacity:.15}
/* dimmed: just opacity, no shrinking or hiding */
.avatar .aname{font-size:10px;white-space:nowrap;margin-top:5px;text-shadow:1px 1px 0 #000}
.avatar .apersp{font-size:10px;opacity:.7}
.avatar .hp-label{font-size:8px;margin-top:1px;font-weight:bold;text-shadow:1px 1px 0 #000;transition:color .4s steps(4),opacity .5s steps(4)}
.avatar .hp{margin:2px auto 0;height:7px;background:#222;border:1px solid #444;width:74px;overflow:hidden;transition:opacity .5s steps(4)}
.avatar.no-stance .hp-label,.avatar.no-stance .hp{opacity:0}
.avatar .hp-fill{height:100%;transition:width .6s steps(6),background .4s steps(4)}

@keyframes px-glow{0%,100%{box-shadow:0 0 0 #fff}50%{box-shadow:0 0 8px 2px #fff}}

/* Casting & Hit — round table */
.avatar.cast-attack .sprite{animation:cast-attack .8s steps(4)}
.avatar.cast-buff .sprite{animation:cast-buff .8s steps(4)}
.avatar.hit-critical .sprite{animation:hit-critical .8s steps(4)}
.avatar.hit-heavy .sprite{animation:hit-heavy 1s steps(5)}
.avatar.defend .sprite{animation:defend-shield .8s steps(4)}
.avatar.acc-up-anim .sprite{animation:acc-up-glow .8s steps(4)}

@keyframes cast-attack{0%{transform:scale(1)}25%{transform:scale(1.2) rotate(-8deg)}50%{transform:scale(1.15) rotate(5deg)}75%{transform:scale(1.05) rotate(-2deg)}100%{transform:scale(1)}}
@keyframes cast-buff{0%{transform:scale(1);filter:brightness(1)}40%{transform:scale(1.08) translateY(-4px);filter:brightness(1.6)}70%{transform:scale(1.03);filter:brightness(1.2)}100%{transform:scale(1);filter:brightness(1)}}
@keyframes hit-critical{0%,100%{transform:translateX(0);filter:brightness(1)}15%{transform:translateX(-7px);filter:brightness(2.5) hue-rotate(-30deg)}30%{transform:translateX(7px);filter:brightness(0.5)}45%{transform:translateX(-5px);filter:brightness(1.8)}60%{transform:translateX(5px);filter:brightness(1)}75%{transform:translateX(-3px)}}
@keyframes hit-heavy{0%,100%{transform:translateX(0);filter:brightness(1)}8%{transform:translateX(-10px) scale(1.1);filter:brightness(3) hue-rotate(-60deg)}18%{transform:translateX(10px) scale(0.95);filter:brightness(0.3)}28%{transform:translateX(-8px);filter:brightness(2.5) hue-rotate(30deg)}38%{transform:translateX(8px);filter:brightness(0.5)}48%{transform:translateX(-6px) scale(1.05);filter:brightness(2)}58%{transform:translateX(6px);filter:brightness(0.8)}68%{transform:translateX(-4px);filter:brightness(1.5)}78%{transform:translateX(4px)}}
@keyframes defend-shield{0%{box-shadow:0 0 0 0 rgba(79,195,247,0);border-color:var(--border)}30%{box-shadow:0 0 22px 8px rgba(79,195,247,0.5);border-color:#4fc3f7}60%{box-shadow:0 0 14px 5px rgba(79,195,247,0.3);border-color:#4fc3f7}100%{box-shadow:0 0 0 0 rgba(79,195,247,0);border-color:var(--border)}}
@keyframes acc-up-glow{0%{box-shadow:0 0 0 0 rgba(46,213,115,0);filter:brightness(1)}30%{box-shadow:0 0 25px 10px rgba(46,213,115,0.6);filter:brightness(1.8)}60%{box-shadow:0 0 15px 6px rgba(46,213,115,0.3);filter:brightness(1.3)}100%{box-shadow:0 0 0 0 rgba(46,213,115,0);filter:brightness(1)}}

.magic-circle{position:absolute;width:70px;height:20px;left:50%;bottom:-12px;transform:translateX(-50%);border:2px solid var(--side-a);border-radius:50%;pointer-events:none;animation:magic-pulse 1s steps(4) forwards}
@keyframes magic-pulse{0%{transform:translateX(-50%) scale(0.3);opacity:0}30%{transform:translateX(-50%) scale(1.2);opacity:0.9}60%{transform:translateX(-50%) scale(1);opacity:0.6}100%{transform:translateX(-50%) scale(1.1);opacity:0}}

/* ── Speech Bubbles (unified, no tails) ── */
.speech-bubble{
  position:absolute;padding:6px 10px;border:2px solid;
  background:var(--bubble-bg);border-radius:4px;font-size:11px;
  max-width:260px;z-index:25;pointer-events:none;
  font-family:'Microsoft YaHei',sans-serif;line-height:1.5;
  word-break:break-all;
}
@keyframes bubble-pop{0%{opacity:0;transform:scale(0.8)}30%{opacity:1;transform:scale(1.05)}60%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0.95)}}
.speech-bubble.persistent{animation:bubble-pop-in .4s steps(4) forwards;pointer-events:auto}
.speech-bubble.persistent .evidence-link{pointer-events:auto;cursor:pointer}
@keyframes bubble-pop-in{0%{opacity:0;transform:scale(0.8)}40%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}

/* ── Special Agents (curator, arbitrator, scribe) ── */
#special-agents{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;gap:30px;z-index:10;
}
.sp-agent{text-align:center;width:90px;position:relative}
.sp-table{width:80px;height:36px;margin:0 auto 2px;background:var(--table-bg);border:2px solid var(--table-border)}
.sp-sprite{
  width:48px;height:48px;margin:8px auto 0;
  border:2px solid var(--border);background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:bold;color:#fff;text-shadow:1px 1px 0 #000;
  background-size:cover;background-position:center;
  transition:border-color .2s steps(3),box-shadow .2s steps(3),transform .3s steps(4);
}
.sp-agent.speaking .sp-sprite{border-color:#fff;transform:scale(1.4);z-index:15;box-shadow:0 0 6px 2px rgba(255,255,255,0.5)}
.sp-agent.dimmed{opacity:.15}
.sp-name{font-size:9px;margin-top:2px;text-shadow:1px 1px 0 #000;color:var(--fg2)}

/* ── Duel Overlay ── */
#duel-overlay{position:absolute;inset:0;z-index:50;background:rgba(5,5,15,0.92);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .8s steps(8)}
#duel-overlay.active{opacity:1;pointer-events:auto}
[data-theme="light"] #duel-overlay{background:rgba(220,218,200,0.92)}
[data-theme="light"] #victory-screen{background:rgba(240,238,220,0.96)}
[data-theme="cyber"] #duel-overlay{background:rgba(5,5,15,0.92)}

#duel-top{height:210px;display:flex;align-items:flex-start;justify-content:space-between;padding:55px 40px 0;flex-shrink:0;position:relative}
.duel-av{text-align:center;width:140px;position:relative}
.duel-av .sprite{
  width:72px;height:72px;margin:0 auto;border:3px solid var(--border);background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:bold;color:#fff;text-shadow:2px 2px 0 #000;
  background-size:cover;background-position:center;
}
.duel-av .dname{font-size:10px;margin-top:5px;text-shadow:1px 1px 0 #000}
.duel-av .dpersp{font-size:9px;opacity:.7}
.duel-av .dpred{font-size:9px;margin-top:2px;font-weight:bold;text-shadow:1px 1px 0 #000;transition:color .4s steps(4)}
.duel-av .dhp{margin:3px auto 0;height:9px;background:#222;border:1px solid #444;width:110px;overflow:hidden}
.duel-av .dhp-fill{height:100%;transition:width .6s steps(6),background .4s steps(4)}

/* Duel speech bubble (no tails) — allow longer text */
.duel-speech{
  position:absolute;white-space:normal;max-width:180px;font-size:13px;font-weight:bold;
  padding:8px 16px;border:2px solid;border-radius:4px;
  background:var(--bubble-bg);z-index:58;pointer-events:none;
  font-family:'Microsoft YaHei',sans-serif;
}

.duel-av.cast-attack .sprite{animation:cast-attack-d .8s steps(4)}
.duel-av.cast-buff .sprite{animation:cast-buff-d .8s steps(4)}
.duel-av.hit-critical .sprite{animation:hit-critical-d .8s steps(4)}
.duel-av.hit-heavy .sprite{animation:hit-heavy-d 1s steps(5)}
.duel-av.defend .sprite{animation:defend-shield-d .8s steps(4)}
.duel-av.acc-up-anim .sprite{animation:acc-up-glow-d .8s steps(4)}
@keyframes cast-attack-d{0%{transform:scale(1)}25%{transform:scale(1.25) rotate(-8deg)}50%{transform:scale(1.2) rotate(5deg)}75%{transform:scale(1.05) rotate(-2deg)}100%{transform:scale(1)}}
@keyframes cast-buff-d{0%{transform:scale(1);filter:brightness(1)}40%{transform:scale(1.1) translateY(-6px);filter:brightness(1.8)}70%{transform:scale(1.04);filter:brightness(1.3)}100%{transform:scale(1);filter:brightness(1)}}
@keyframes hit-critical-d{0%,100%{transform:translateX(0);filter:brightness(1)}15%{transform:translateX(-8px);filter:brightness(3) hue-rotate(-30deg)}30%{transform:translateX(8px);filter:brightness(0.4)}45%{transform:translateX(-6px);filter:brightness(2)}60%{transform:translateX(6px);filter:brightness(1)}75%{transform:translateX(-4px)}}
@keyframes hit-heavy-d{0%,100%{transform:translateX(0);filter:brightness(1)}8%{transform:translateX(-12px) scale(1.15);filter:brightness(3.5) hue-rotate(-60deg)}18%{transform:translateX(12px) scale(0.9);filter:brightness(0.2)}28%{transform:translateX(-10px);filter:brightness(2.5) hue-rotate(30deg)}38%{transform:translateX(10px);filter:brightness(0.4)}48%{transform:translateX(-7px) scale(1.05);filter:brightness(2)}58%{transform:translateX(7px);filter:brightness(0.7)}68%{transform:translateX(-5px);filter:brightness(1.5)}78%{transform:translateX(5px)}}
@keyframes defend-shield-d{0%{box-shadow:0 0 0 0 rgba(79,195,247,0);border-color:var(--border)}30%{box-shadow:0 0 25px 10px rgba(79,195,247,0.5);border-color:#4fc3f7}60%{box-shadow:0 0 16px 6px rgba(79,195,247,0.3);border-color:#4fc3f7}100%{box-shadow:0 0 0 0 rgba(79,195,247,0);border-color:var(--border)}}
@keyframes acc-up-glow-d{0%{box-shadow:0 0 0 0 rgba(46,213,115,0);filter:brightness(1)}30%{box-shadow:0 0 28px 12px rgba(46,213,115,0.6);filter:brightness(1.8)}60%{box-shadow:0 0 16px 7px rgba(46,213,115,0.3);filter:brightness(1.3)}100%{box-shadow:0 0 0 0 rgba(46,213,115,0);filter:brightness(1)}}

#duel-arrow-svg{position:absolute;top:95px;left:50%;transform:translateX(-50%);width:220px;height:24px;z-index:55;pointer-events:none}
.projectile{position:absolute;z-index:56;pointer-events:none;font-size:22px;transition:left .9s steps(10),top .9s steps(10)}

#duel-chat{flex:1;overflow-y:auto;padding:4px 16px;min-height:0}
#duel-chat::-webkit-scrollbar{width:3px}
#duel-chat::-webkit-scrollbar-thumb{background:var(--border)}
.duel-bubble{width:70%;padding:6px 10px;margin:6px 0;font-size:10px;line-height:1.6;background:var(--bg2);border:2px solid var(--border);word-break:break-all;white-space:pre-wrap;flex-shrink:0}
.duel-bubble.left{margin-right:auto;margin-left:4%;border-color:#4fc3f7}
.duel-bubble.right{margin-left:auto;margin-right:4%;border-color:#ef5350}
.duel-bubble.counter{border-color:#ffa502 !important}
.duel-bubble .bhead{font-size:9px;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.duel-bubble .bhead .bname{font-weight:bold}
.duel-bubble .bhead .btag{padding:1px 4px;font-size:7px;border:1px solid}
.duel-bubble strong{color:#ffd54f}

/* Floating text */
.float-text{position:absolute;z-index:60;pointer-events:none;font-size:13px;font-weight:bold;text-shadow:1px 1px 0 #000,2px 2px 0 rgba(0,0,0,.5);animation:float-up 2s steps(6) forwards}
.float-text.pred-changed{font-size:14px;color:#ffd54f}
.float-text.acc-up{color:#2ed573}
.float-text.acc-down{color:#ef5350}
.float-text.acc-same{color:#888899}
.float-text.response-text{color:#4fc3f7}
@keyframes float-up{0%{transform:translateY(0);opacity:1}60%{opacity:1}100%{transform:translateY(-45px);opacity:0}}

#battle.shake{animation:shake .25s steps(3)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(5px)}75%{transform:translateX(-5px)}}
.fx-icon{position:absolute;z-index:55;pointer-events:none;font-size:24px;animation:fx-pop .9s steps(4) forwards}
@keyframes fx-pop{0%{transform:scale(0);opacity:1}40%{transform:scale(1.5);opacity:1}100%{transform:scale(1);opacity:0}}

/* Arrow on round table (pre-duel) */
.rt-arrow{position:absolute;z-index:20;pointer-events:none}
.rt-arrow line{stroke-dasharray:8 5;animation:dash-flow .6s linear infinite}
@keyframes dash-flow{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-13}}

/* Prediction change flash */
.pred-flash{animation:pred-flash .5s steps(4)}
@keyframes pred-flash{0%{filter:brightness(1)}25%{filter:brightness(2.5)}50%{filter:brightness(0.5)}75%{filter:brightness(1.3)}100%{filter:brightness(1)}}

/* ── Victory Screen ── */
#victory-screen{position:absolute;inset:0;z-index:200;background:rgba(5,5,15,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:victory-in .8s steps(6)}
#victory-screen.active{display:flex}
@keyframes victory-in{0%{opacity:0;transform:scale(0.8)}100%{opacity:1;transform:scale(1)}}
#victory-screen .vcrown{font-size:48px}
#victory-screen .vtitle{font-size:18px;color:#ffd54f;text-shadow:2px 2px 0 #000,0 0 12px rgba(255,213,79,.4)}
#victory-screen .vpred{font-size:14px;text-shadow:1px 1px 0 #000}
#victory-screen .vsides{display:flex;gap:20px;margin-top:8px;flex-wrap:wrap;justify-content:center;max-width:580px}
#victory-screen .vside{text-align:center;min-width:100px}
#victory-screen .vside-label{font-size:10px;margin-bottom:8px;padding:2px 8px;border:1px solid}
#victory-screen .vagents{display:flex;gap:12px;justify-content:center}
#victory-screen .vagent{text-align:center;width:80px}
#victory-screen .vagent .sprite{width:44px;height:44px;margin:0 auto;border:2px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:#fff;text-shadow:1px 1px 0 #000;background-size:cover;background-position:center}
#victory-screen .vagent .vaname{font-size:8px;margin-top:2px}
#victory-screen .vagent .vavpred{font-size:7px;font-weight:bold}
#victory-screen .vtopn{margin-top:8px;padding:8px 12px;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid var(--border);max-width:580px;width:100%}
#victory-screen .vtopn-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
#victory-screen .vtopn-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px}
#victory-screen .vtopn-best{font-weight:700;color:#ffd700}
#victory-screen .vtopn-rank{color:var(--text2);min-width:20px;font-size:10px}
#victory-screen .vtopn-score{min-width:80px}
#victory-screen .vtopn-conf{color:var(--text2);font-size:10px}
#victory-screen .vclose{font-size:8px;color:var(--fg2);margin-top:12px;cursor:pointer;border:1px solid var(--border);padding:4px 12px;background:var(--bg3)}
#victory-screen .vclose:hover{background:var(--border)}

/* ── Prediction Change Center Popup ── */
.pred-center-popup{
  position:absolute;left:50%;transform:translate(-50%,-50%);
  z-index:70;pointer-events:none;text-align:center;
  animation:pred-popup-in .3s steps(4) forwards,pred-popup-out .4s steps(4) forwards;
}
.pred-center-popup .popup-inner{
  padding:14px 24px;border-radius:8px;font-size:16px;font-weight:bold;
  text-shadow:2px 2px 0 #000;line-height:1.6;
  border:3px solid;max-width:400px;
  font-family:'Microsoft YaHei',sans-serif;
}
.pred-center-popup .popup-name{color:inherit;font-weight:900}
.pred-center-popup .popup-rest{color:inherit;opacity:1}
.pred-center-popup.type-conf-down .popup-inner{background:rgba(239,83,80,var(--popup-bg-opacity,0.1));border-color:#ef5350;color:#ef5350}
.pred-center-popup.type-conf-up .popup-inner{background:rgba(46,213,115,var(--popup-bg-opacity,0.1));border-color:#2ed573;color:#2ed573}

@keyframes pred-popup-in{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes pred-popup-out{0%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(0.9)}}

/* Controls */

#ctrl button{background:var(--bg3);color:var(--fg);border:1px solid var(--border);font-family:inherit;font-size:8px;padding:1px 6px;cursor:pointer;min-width:24px}

#ctrl select{background:var(--bg3);color:var(--fg);border:1px solid var(--border);font-family:inherit;font-size:6px;padding:1px 2px}
#progress{flex:1;height:5px;background:#222;border:1px solid #444;cursor:pointer;position:relative}
#progress .fill{height:100%;background:var(--accent);transition:width .2s steps(4)}

/* Right: Log */
#log-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#log-header{height:26px;background:var(--bar-bg);display:flex;align-items:center;padding:0 10px;border-bottom:2px solid var(--border);font-size:10px;color:var(--accent);flex-shrink:0}

#dialog-area::-webkit-scrollbar-thumb{background:var(--border)}

.chain-group{margin-bottom:8px;padding-left:16px;border-left:4px solid var(--border);background:rgba(68,68,102,0.15)}
.chain-group .chain-root{margin-left:-16px;padding-left:0}
.chain-group .chain-title{font-size:10px;padding:2px 8px;color:var(--accent);background:rgba(233,69,96,0.1);border-bottom:1px solid var(--border)}
.chain-group .msg-row{margin-bottom:4px}

.msg-row{margin-bottom:5px;padding:4px 8px;border:2px solid var(--border2);background:var(--bg2);border-radius:3px;box-shadow:0 0 0 1px var(--border)}
.msg-row.challenge{border-color:#ef5350;background:rgba(239,83,80,0.08)}
.msg-row.response{border-color:#4fc3f7;background:rgba(79,195,247,0.08)}
.msg-row.counter{border-color:#ffa502;background:rgba(255,165,2,0.08)}
.msg-row.stance{border-color:#2ed573;background:rgba(46,213,115,0.08)}
.msg-row.pred-changed{background:rgba(239,83,80,0.15);border-width:3px}
.msg-row .mr-head{font-size:11px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:2px}
.msg-row .mr-head .mr-name{font-weight:bold}
.msg-row .mr-head .mr-tag{display:inline-block;padding:2px 8px;font-size:14px;border:2px solid;border-radius:2px;font-weight:bold}

.evidence-link{color:#ffa502;cursor:pointer;text-decoration:underline}

</style>

<body>
<div id="game">
  <div id="load-screen">
    <h1>⚔️ 辩论竞技场</h1>
    <div class="sub">16-BIT DEBATE ARENA</div>
    <div id="drop-zone"><div class="icon">📂</div><div>拖拽 JSON 到此处</div><div style="font-size:6px">或点击选择文件</div></div>
    <input type="file" id="file-input" accept=".json">
  </div>
  <div id="main">
    <div id="topbar">
      <span class="title" id="topic">---</span>
      <span class="tag" id="mode-tag">圆桌</span>

            <div class="sp-agent" id="sp-arbitrator"><div class="sp-table"></div><div class="sp-sprite" id="sp-arb-sprite">⚖️</div><div class="sp-name">仲裁者</div></div>
            <div class="sp-agent" id="sp-scribe"><div class="sp-table"></div><div class="sp-sprite" id="sp-scr-sprite">📜</div><div class="sp-name">场记</div></div>
          </div>

          <div id="duel-overlay">

              <svg id="duel-arrow-svg" viewBox="0 0 220 24">
                <defs>
                  <marker id="ah-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef5350"/></marker>
                  <marker id="ah-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4fc3f7"/></marker>
                  <marker id="ah-y" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ffa502"/></marker>
                </defs>
                <line id="arrow-line" x1="10" y1="12" x2="210" y2="12" stroke="#ef5350" stroke-width="2.5" stroke-dasharray="8,5" marker-end="url(#ah-r)"/>
              </svg>
              <div class="duel-av" id="duel-right">
                <div class="sprite" id="dr-sprite"></div>
                <div class="dname" id="dr-name"></div>
                <div class="dpersp" id="dr-persp"></div>
                <div class="dpred" id="dr-pred"></div>
                <div class="dhp"><div class="dhp-fill" id="dr-hp"></div></div>
              </div>
            </div>
            <div id="duel-chat"></div>
          </div>
          <!-- Victory Screen -->
          <div id="victory-screen">
            <div class="vcrown">🏆</div>
            <div class="vtitle">胜 方</div>
            <div class="vpred" id="v-pred"></div>
            <div class="vsides" id="v-sides"></div>
          </div>
        </div>
        <div id="ctrl">
          <button id="btn-prev">◀</button>
          <button id="btn-play">▶</button>
          <button id="btn-next">▶|</button>
          <select id="speed">
            <option value="4000">0.5x</option>
            <option value="2600" selected>1x</option>
            <option value="1500">2x</option>
            <option value="800">4x</option>
          </select>
          <div id="progress"><div class="fill"></div></div>
          <span class="plabel" id="plabel">0/0</span>

      <div id="log-col">

</div>
<div id="ev-popup">
  <span class="close" onclick="this.parentElement.style.display='none'">✕</span>
  <div id="ev-content"></div>

<script>
// ═══════════════════════════════════════════════════════════
// ⚙️ 配置参数 — 所有可调参数集中在此
// ═══════════════════════════════════════════════════════════

// ── JSON 数据源 ──
// 留空 → 文件上传模式；填写相对路径 → 自动加载同目录下的 JSON 文件
// 例如：'debate_data.json' 或 'data/match.json'
// 也支持 ?json=xxx.json 查询参数覆盖
// 也支持从 index.html 通过 localStorage 传递数据
const JSON_FILE = '';  // 留空 → 文件上传模式；从 index.html 打开时通过 ?json= 参数获取

// ── 圆桌布局 ──
const PENT_CX = 320;          // 五边形中心X
const PENT_CY = 230;          // 五边形中心Y
const PENT_RX = 195;          // 五边形X半径
const PENT_RY = 110;          // 五边形Y半径
const TABLE_OFFSET_Y = 15;     // 方桌相对五边形中心的下移偏移（可调）
const AVATAR_W = 96;          // avatar容器宽度
const AVATAR_SPRITE = 48;     // avatar sprite尺寸
const AVATAR_NAME_TOP = 12;   // 名字距sprite的间距（可调）
const AVATAR_HP_BAR_W = 74;   // HP条宽度
const PRED_POPUP_DURATION = 2200; // 中心跳字持续时间(ms)（可调）
const PRED_POPUP_Y = 42;      // 中心跳字Y轴位置(%)（可调）
const PRED_POPUP_BG_OPACITY = 0.6; // 中心跳字背景框透明度（可调，0=全透明，1=不透明）

// ── 功能Agent布局 ──
const SP_GAP = 30;            // 三个功能agent间距
const SP_OFFSET_Y = 110;      // 功能agent距五边形底部的偏移
const SP_SPRITE_MARGIN = 8;  // 功能agent sprite距桌子的下移量
const SP_NAME_FONT = 10;      // 功能agent名字字号
const SP_NAME_TOP = 10;       // 功能agent名字距sprite的间距（可调）

// ── 对抗界面布局 ──
const DUEL_TOP_H = 210;       // 对抗顶部区域高度
const DUEL_PAD_TOP = 55;      // 对抗顶部padding-top
const DUEL_PAD_LR = 40;       // 对抗左右padding
const DUEL_AV_W = 140;        // 对抗avatar容器宽度
const DUEL_SPRITE = 72;       // 对抗sprite尺寸
const DUEL_NAME_TOP = 5;      // 对打名字距sprite的间距
const DUEL_ARROW_Y = 95;      // 对抗箭头Y位置
const DUEL_ARROW_SHORTEN = 40; // 对抗箭头向中心缩短的像素（可调）
const DUEL_ARROW_W = 220;     // 对抗箭头SVG宽度

// ── 对抗动画参数 ──
const DUEL_OVERLAY_FADE = 800;     // overlay渐显时间ms
const DUEL_ANIM_DELAY = 900;       // overlay显示后动画延迟ms
const ARROW_AUTO_MS = 1500;        // 自动播放时箭头停留时间ms
const CHALLENGE_ANIM_MS = 2500;    // 质疑动画总时长ms（用于auto-play节拍）
const RESPONSE_ANIM_MS = 1000;     // 回应动画总时长ms
const PROJECTILE_MS = 700;         // 投掷物飞行时间ms
const BATTLE_CRY_MS = 3000;        // 战吼气泡停留时间ms
const FLOAT_TEXT_MS = 2200;        // 跳字停留时间ms
const FX_ICON_MS = 1000;           // FX图标停留时间ms

// ── 打字机参数 ──
const TW_SPEED = 12;          // 打字速度ms/字符
const TW_BATCH = 3;           // 每帧字符数

// ── 图片资源 ──
// 图片统一放在 images/ 目录下，填写文件名即可
const AVATAR_IMAGES = {
  '智能体1': 'images/1.png',
  '智能体2': 'images/2.png',
  '智能体3': 'images/3.png',
  '智能体4': 'images/4.png',
  '智能体5': 'images/5.png',
  '智能体6': 'images/6.png',
  '智能体7': 'images/7.png',
  '智能体8': 'images/8.png',
  
  // '审核员':   'images/curator.png',
  // '仲裁者':   'images/arbitrator.png',
  // '场记':     'images/scribe.png',
};
const FX_IMAGES = {
  // 'challenge': 'images/fire.png',
  // 'counter':   'images/lightning.png',
  // 'response':  'images/heal.png',
  // 'defend':    'images/shield.png',
};

// ── 音效资源 ──
// 音效文件放在 sounds/ 目录下，填写文件名即可
// 留空或不填则不播放音效
const SOUNDS = {
  challenge:  'sounds/shoot2.wav',   // 质疑攻击
  hit:        'sounds/hit.wav',         // 命中/预测变化
  defend:     'sounds/shield.wav',      // 防御/无变化
  victory:    'sounds/victory.wav',     // 胜利结算
  duel_start: 'sounds/heal.wav',  // 对抗开始
  stance:     'sounds/buff-short.wav',      // 立场发表
  stance_chg: 'sounds/change-stance.wav',  // 立场改变
  score_chg:  'sounds/change-stance.wav',   // 比分变化（立场未变）
  conf_up:    'sounds/buff-short.wav',     // 准确度上升
  conf_down:  'sounds/gethit.wav',   // 准确度下降
  response:   'sounds/response.wav',    // 回应/反质疑
  // arrow:      'sounds/shoot2.wav',       // 方桌箭头动画
  // phase:      'sounds/phase.mp3',       // 阶段分隔
  arb_verdict:'sounds/buff-short.wav', // 仲裁者裁定
  // step:       'sounds/step.mp3',        // 手动步进
};

function playSound(name){
  const src=SOUNDS[name];if(!src)return;
  try{const a=new Audio(src);a.volume=0.5;a.play().catch(()=>{})}catch(e){}
}

// ── 预测变化弹窗消息 ──
// 每种情况一组消息，随机选取；可自行增减
const PRED_CHANGE_MESSAGES = {
  // 只有准确度减少
  conf_down: [
    '{name}开始怀疑自己的观点，准确度下降',
    '{name}的论证出现了裂痕，信心动摇',
    '{name}面对质疑，信心有所降低',
  ],
  // 只有准确度增加
  conf_up: [
    '{name}更加确信自己的观点，准确度上升',
    '{name}找到了更强的论据，信心增强',
    '{name}的论证更加坚实，信心提升',
  ],
  // 比分预测变化，立场未变
  score_changed: [
    '{name}认为自己的预测有误，调整了比分',
    '{name}修正了比分预测',
    '{name}对比分判断做出调整',
  ],
  // 立场改变
  stance_changed: [
    '{name}被彻底说服了，改变了立场！',
    '{name}无法坚持原有立场，倒向另一方！',
    '{name}的观点发生根本转变！',
  ],
};

// ═══════════════════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════════════════
let DATA=null,flat=[],idx=-1,playing=false,timer=null;
let avatars={},predMap={},predPtr={};
let currentChainRoot=null,duelSpeaker='',duelTarget='',currentDuelPair='';
let currentDuelTargetPeek=null,currentDuelMsg=null,duelArrowType='';
let victoryShown=false;
let chainChanges=[]; // {speaker, target, changed, oldPred, newPred, arrowType}
let inChain=false;
let duelPending=null; // {speaker, target, arrowType, targetPeek, msg, predInfo, isResponse}
let stanceBubbleTimeout=null,stanceBubbleEl=null,arbBubbleEl=null;
let duelAnimLock=false; // 动画锁，防止auto-play时消息重叠

const COLORS_HEX=['#ff4757','#2ed573','#1e90ff','#ffa502','#a55eea'];
const THEMES=['','light','cyber'];
let themeIdx=0;

// Pentagon layout (from config)
const CX=PENT_CX,CY=PENT_CY,RX=PENT_RX,RY=PENT_RY;

// Computed duel avatar centers (dynamic — recalculated from actual element positions)
function getDuelCenterX(side){
  const av=document.getElementById(side==='left'?'duel-left':'duel-right');
  if(!av)return side==='left'?(DUEL_PAD_LR+DUEL_AV_W/2):(640-DUEL_PAD_LR-DUEL_AV_W/2);
  const overlay=document.getElementById('duel-overlay');
  const avRect=av.getBoundingClientRect();
  const olRect=overlay.getBoundingClientRect();
  return avRect.left+avRect.width/2-olRect.left;
}
function getDuelSpriteY(side){
  const av=document.getElementById(side==='left'?'duel-left':'duel-right');
  if(!av)return DUEL_ARROW_Y;
  const sprite=av.querySelector('.sprite');
  if(!sprite)return DUEL_ARROW_Y;
  const overlay=document.getElementById('duel-overlay');
  const spRect=sprite.getBoundingClientRect();
  const olRect=overlay.getBoundingClientRect();
  return spRect.top+spRect.height/2-olRect.top;
}
// Legacy constants for fallback
const DUEL_LEFT_CX = DUEL_PAD_LR + DUEL_AV_W/2;
const DUEL_RIGHT_CX = 640 - DUEL_PAD_LR - DUEL_AV_W/2;
function pentPos(i,n){const a=-Math.PI/2+(2*Math.PI*i/n);return{x:CX+RX*Math.cos(a),y:CY+RY*Math.sin(a)}}

// Side colors
function resolveSideColor(w){
  if(!w||w==='-')return'#888';
  const t=DATA?.topic||'',p=t.split(/\s+vs\s+/);
  if(p.length===2){if(w.includes(p[0].trim()))return'var(--side-a)';if(w.includes(p[1].split('（')[0].trim()))return'var(--side-b)'}
  return'var(--side-x)';
}

// ═══════════════════════════════════════════════════════════
// MARKDOWN PARSER
// ═══════════════════════════════════════════════════════════
function renderMd(text){return text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}
function renderMdHtml(html){return html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}

function renderStanceSummary(text){
  const vpMatch=text.match(/\*\*观点\*\*[：:]\s*([\s\S]*?)(?=\*\*论述\*\*|$)/);
  const argMatch=text.match(/\*\*论述\*\*[：:]\s*([\s\S]*?)$/);
  let html='';
  if(vpMatch)html+=`<div style="margin-bottom:4px"><span style="color:#ffd54f;font-weight:bold">观点</span> ${renderMdHtml(escapeHtml(vpMatch[1].trim()))}</div>`;
  if(argMatch)html+=`<div><span style="color:#4fc3f7;font-weight:bold">论述</span> ${renderMdHtml(escapeHtml(argMatch[1].trim()))}</div>`;
  if(!html)html=renderMd(escapeHtml(text));
  return html.replace(/E(\d{3})/g,'<a class="evidence-link" data-eid="E$1">E$1</a>');
}

// ═══════════════════════════════════════════════════════════
// THEME SWITCHER
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-theme').onclick=()=>{
  themeIdx=(themeIdx+1)%THEMES.length;
  const t=THEMES[themeIdx];
  document.documentElement.setAttribute('data-theme',t||'');
  const labels=['🎨dark','🎨light','🎨cyber'];
  document.getElementById('btn-theme').textContent=labels[themeIdx];
};

// ═══════════════════════════════════════════════════════════
// FILE I/O
// ═══════════════════════════════════════════════════════════
const dz=document.getElementById('drop-zone'),fi=document.getElementById('file-input');
dz.onclick=()=>fi.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add('dragover')};
dz.ondragleave=()=>dz.classList.remove('dragover');
dz.ondrop=e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0])};
fi.onchange=e=>{if(e.target.files[0])load(e.target.files[0])};
document.getElementById('btn-load').onclick=()=>{fi.value='';fi.click()};
function load(f){const r=new FileReader();r.onload=e=>{try{DATA=JSON.parse(e.target.result);init()}catch(err){alert('JSON error: '+err.message)}};r.readAsText(f,'utf-8')}

// ── JSON 文件自动加载 ──
// 优先级：localStorage（从index.html传入）> 查询参数 ?json=xxx.json > 配置变量 JSON_FILE
(function tryAutoLoad(){
  // Check if index.html passed config via localStorage
  try{
    const cfg=JSON.parse(localStorage.getItem('debate_arena_config')||'{}');
    if(cfg.avatar_images) Object.assign(AVATAR_IMAGES,cfg.avatar_images);
  }catch(e){}
  // Check localStorage for data passed from index.html
  try{
    const lsData=localStorage.getItem('debate_arena_data');
    if(lsData){DATA=JSON.parse(lsData);localStorage.removeItem('debate_arena_data');init();return}
  }catch(e){}
  const params=new URLSearchParams(window.location.search);
  const file=params.get('json')||JSON_FILE;
  if(!file)return;
  fetch(file+'?t='+Date.now()).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(d=>{DATA=d;init()}).catch(err=>{console.warn('自动加载JSON失败：',err)});
})();

function init(){
  document.getElementById('load-screen').classList.add('hidden');
  document.getElementById('main').classList.add('active');
  document.getElementById('topic').textContent=DATA.topic||'辩论';
  document.getElementById('mode-tag').textContent='圆桌';
  const ct=document.getElementById('cons-tag');
  ct.textContent=DATA.consensus?'✅共识':'⚖️未共识';ct.className='tag '+(DATA.consensus?'yes':'no');
  flat=[];const labels=['陈述','自由质疑','分配质疑','阶段3','阶段4'];
  const phaseVerdicts=DATA.phase_verdicts||[];
  let phaseVerdictIdx=0;
  DATA.rounds.forEach((r,i)=>{
    flat.push({sep:true,label:`── ${labels[i]||'阶段'+(i+1)} ──`});
    r.forEach((m,mi)=>flat.push({msg:m,ri:i,mi}));
    while(phaseVerdictIdx<phaseVerdicts.length&&phaseVerdicts[phaseVerdictIdx].phase===(i+1)){
      const pv=phaseVerdicts[phaseVerdictIdx];
      flat.push({phaseVerdict:true,content:pv.content,consensus:pv.consensus,speaker:pv.speaker,arena_summary:pv.arena_summary||'',arena_bubble:pv.arena_bubble||''});
      phaseVerdictIdx++;
    }
  });
  if(DATA.arbitrator_verdict){flat.push({sep:true,label:'── ⚖️ 仲裁结论 ──'});flat.push({msg:DATA.arbitrator_verdict,end:true,endTitle:'仲裁者裁定'})}
  // 只有当 verdict 与 arbitrator_verdict 不同时才显示（兼容旧数据）
  if(DATA.verdict&&!DATA.consensus&&DATA.verdict!==DATA.arbitrator_verdict)flat.push({msg:DATA.verdict,end:true,endTitle:'最终裁定'});
  if(DATA.summary)flat.push({msg:DATA.summary,end:true,endTitle:'总结'});
  idx=-1;playing=false;currentChainRoot=null;currentDuelPair='';victoryShown=false;inChain=false;chainChanges=[];
  duelPending=null;
  predMap={};predPtr={};buildAvatars();buildSpecialAgents();
  document.getElementById('dialog-area').innerHTML='';
  document.getElementById('victory-screen').classList.remove('active');
  hideDuelOverlay();clearBattle();updateProgress();
  // Initial position: set table to configured CY
  document.getElementById('table').style.top=(CY+TABLE_OFFSET_Y)+'px';
}

// ── Robust layout initialization ──
// Polls #battle dimensions and calls updatePentagonPositions when they change
let _layoutLastW=0,_layoutLastH=0;
(function setupLayoutObserver(){
  function tick(){
    // Always schedule next tick FIRST, so the loop never dies
    setTimeout(tick,200);
    if(!DATA||!DATA.agents)return;
    const b=document.getElementById('battle');
    if(!b)return;
    const w=b.offsetWidth,h=b.offsetHeight;
    if(w>0&&h>0&&(w!==_layoutLastW||h!==_layoutLastH)){
      _layoutLastW=w;_layoutLastH=h;
      updatePentagonPositions();
    }
  }
  // Start checking on various events
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>setTimeout(tick,30));
  else setTimeout(tick,30);
  window.addEventListener('load',()=>setTimeout(tick,30));
  window.addEventListener('resize',()=>{_layoutLastW=0;_layoutLastH=0;setTimeout(tick,30)});
  document.addEventListener('visibilitychange',()=>{if(!document.hidden){_layoutLastW=0;_layoutLastH=0;setTimeout(tick,30)}});
})();

function buildAvatars(){
  const battle=document.getElementById('battle');
  battle.querySelectorAll('.avatar').forEach(a=>a.remove());avatars={};
  const n=DATA.agents?.length||5;
  (DATA.agents||[]).forEach((agent,i)=>{
    const pos=pentPos(i,n),color=COLORS_HEX[i%COLORS_HEX.length];
    const el=document.createElement('div');el.className='avatar no-stance';
    el.style.left=(pos.x-48)+'px';el.style.top=(pos.y-24)+'px';
    el.dataset.idx=i;el.dataset.color=color;el.dataset.cx=pos.x;el.dataset.cy=pos.y;
    const pred=agent.prediction_history?.[0];
    const w=pred?pred.winner:'-',s=pred?pred.score:'',c=pred?pred.confidence:0;
    const hpC=resolveSideColor(w),pC=resolveSideColor(w);
    const img=AVATAR_IMAGES[agent.name];
    const spriteStyle=img?`border-color:${color};background-image:url('${img}')`:`border-color:${color};background:${color}22`;
    const spriteInner=img?'':`<span style="color:${color}">${i+1}</span>`;
    el.innerHTML=`
      <div class="sprite" style="${spriteStyle}">${spriteInner}</div>
      <div class="aname" style="color:${color}">${agent.name}</div>
      <div class="apersp">${agent.perspective_short||''}</div>
      <div class="hp-label" style="color:${pC}"></div>
      <div class="hp"><div class="hp-fill" style="width:0%;background:${hpC}"></div></div>
    `;
    battle.appendChild(el);
    avatars[agent.name]={el,color,idx:i};
    predMap[agent.name]={winner:w,score:s,confidence:c};
    predPtr[agent.name]=0;
  });
  // Always recalculate positions based on actual container size after building
  const b=document.getElementById('battle');
  if(b&&b.offsetWidth>0&&b.offsetHeight>0){
    updatePentagonPositions();
  }else{
    // Container not ready yet, schedule retry
    setTimeout(()=>updatePentagonPositions(),100);
    setTimeout(()=>updatePentagonPositions(),500);
  }
}

function buildSpecialAgents(){
  const specials=[
    {id:'sp-cur-sprite',name:'审核员',emoji:'📋'},
    {id:'sp-arb-sprite',name:'仲裁者',emoji:'⚖️'},

    const el=document.getElementById(sp.id);

    else{el.textContent=sp.emoji}

  // Don't set top here — updatePentagonPositions() handles it
}

function updateAvatarHP(name){
  const pred=predMap[name];if(!pred)return;const av=avatars[name];if(!av)return;
  const hpC=resolveSideColor(pred.winner),pC=resolveSideColor(pred.winner);
  const fill=av.el.querySelector('.hp-fill');
  fill.style.width=(pred.confidence*10)+'%';fill.style.background='#fff';
  setTimeout(()=>{fill.style.background=hpC},300);
  const label=av.el.querySelector('.hp-label');
  label.textContent=`${pred.winner} ${pred.score} 胜`;label.style.color=pC;
}

function updateDuelAvatarHP(name){
  const pred=predMap[name];if(!pred)return;
  const hpC=resolveSideColor(pred.winner),pC=resolveSideColor(pred.winner);
  const isL=(name===duelSpeaker);
  const hf=document.getElementById(isL?'dl-hp':'dr-hp');
  const pl=document.getElementById(isL?'dl-pred':'dr-pred');
  if(hf){hf.style.width=(pred.confidence*10)+'%';hf.style.background='#fff';setTimeout(()=>{hf.style.background=hpC},300)}
  if(pl){pl.textContent=`${pred.winner} ${pred.score} 胜 准${pred.confidence}/10`;pl.style.color=pC}
}

function showSpeechBubble(parentEl,text,borderColor,cssClass,duration){
  if(!text)return;
  const bub=document.createElement('div');
  bub.className='speech-bubble'+(cssClass?' '+cssClass:'');
  bub.style.borderColor=borderColor;bub.style.color=borderColor;
  bub.innerHTML=renderMd(text);
  parentEl.appendChild(bub);
  const d=duration||1500;
  setTimeout(()=>bub.remove(),d);
  return bub;
}

// Round table speech bubble — positioned in #battle, no tails
function showRoundTableBubble(name,text,borderColor,persistent){
  const av=avatars[name];if(!av)return;
  const bub=document.createElement('div');
  bub.className='speech-bubble'+(persistent?' persistent':'');
  bub.style.borderColor=borderColor;bub.style.color=borderColor;
  // Split text at evidence section marker, render summary separately
  const evSplit=text.split('🔍 新证据：');
  let html=renderStanceSummary(evSplit[0]);
  if(evSplit.length>1){
    // Evidence section: evSplit[1] contains HTML evidence links already
    html+=`<div style="margin-top:4px;font-size:10px;color:#ffa502">🔍 新证据：${evSplit[1]}</div>`;
  }
  bub.innerHTML=html;
  const battle=document.getElementById('battle');
  battle.appendChild(bub);
  // Position above avatar, centered, clamped to visible area
  const cx=parseFloat(av.el.dataset.cx);
  const cy=parseFloat(av.el.dataset.cy);
  const bw=bub.offsetWidth,bh=bub.offsetHeight;
  let left=cx-bw/2;
  let top=cy-24-bh-10; // above avatar sprite
  left=Math.max(4,Math.min(left,636-bw));
  if(top<4)top=cy+30; // if too high, place below
  bub.style.left=left+'px';bub.style.top=top+'px';
  bindEvLinks(bub);
  return bub;
}

function fillDuelAvatar(side,name){
  const av=avatars[name];const pred=predMap[name];
  const color=av?av.color:'#fff';const idx=av?av.idx:0;
  const hpC=resolveSideColor(pred?.winner),pC=resolveSideColor(pred?.winner);
  const img=AVATAR_IMAGES[name];
  const spriteStyle=img?`border-color:${color};background-image:url('${img}')`:`border-color:${color};background:${color}22`;
  const spriteInner=img?'':`<span style="color:${color}">${idx+1}</span>`;
  document.getElementById(side+'-sprite').style.cssText=spriteStyle;
  document.getElementById(side+'-sprite').innerHTML=spriteInner;
  document.getElementById(side+'-name').style.color=color;
  document.getElementById(side+'-name').textContent=name;
  document.getElementById(side+'-persp').textContent=av?(DATA.agents[idx]?.perspective_short||''):'';
  const pl=document.getElementById(side+'-pred');pl.textContent=pred?`${pred.winner} ${pred.score} 胜 准${pred.confidence}/10`:'';pl.style.color=pC;
  const hf=document.getElementById(side+'-hp');hf.style.width=pred?(pred.confidence*10)+'%':'0%';hf.style.background=hpC;
}

function showDuelOverlay(speaker,target,arrowType){
  duelSpeaker=speaker;duelTarget=target;currentDuelPair=speaker+'|'+target;
  playSound('duel_start');
  fillDuelAvatar('dl',speaker);fillDuelAvatar('dr',target);
  updateArrowColor(arrowType);
  // Clear any existing stance/arbitrator bubbles when entering duel
  if(stanceBubbleEl&&stanceBubbleEl.parentNode)stanceBubbleEl.remove();stanceBubbleEl=null;
  if(arbBubbleEl&&arbBubbleEl.parentNode)arbBubbleEl.remove();arbBubbleEl=null;
  Object.entries(avatars).forEach(([n,a])=>{a.el.classList.remove('cast-attack','cast-buff','hit-critical','defend','hit-heavy','acc-up-anim');a.el.classList.add(n===speaker||n===target?'speaking':'dimmed')});
  document.querySelectorAll('.sp-agent').forEach(el=>el.classList.add('dimmed'));
  document.getElementById('duel-chat').innerHTML='';
  const dl=document.getElementById('duel-left'),dr=document.getElementById('duel-right');
  dl.classList.remove('cast-attack','cast-buff','hit-critical','defend','hit-heavy','acc-up-anim');
  dr.classList.remove('cast-attack','cast-buff','hit-critical','defend','hit-heavy','acc-up-anim');
  document.getElementById('duel-overlay').classList.add('active');
}

function updateArrowColor(at){
  const line=document.getElementById('arrow-line');
  const c={challenge:'#ef5350',response:'#4fc3f7',counter:'#ffa502'};
  const m={challenge:'ah-r',response:'ah-b',counter:'ah-y'};
  line.setAttribute('stroke',c[at]||'#ef5350');line.setAttribute('marker-end',`url(#${m[at]||'ah-r'})`);

function addDuelBubble(msg){
  const chat=document.getElementById('duel-chat');const box=document.createElement('div');
  const isL=(msg.speaker===duelSpeaker);let cls='duel-bubble '+(isL?'left':'right');
  if(msg.counter_challenge&&msg.action==='回应')cls+=' counter';box.className=cls;
  const av=avatars[msg.speaker];const nc=av?av.color:'#fff';
  let tag=msg.action||'立场';
  if(msg.counter_challenge&&msg.action==='回应')tag='↩️反质疑';else if(msg.action==='质疑')tag='⚔️质疑';else if(msg.action==='回应')tag='🛡️回应';else tag='📝'+tag;
  const newEvIds=msg.new_evidence||[];
  let newEvTag='';
  if(newEvIds.length>0){
    const evLinks=newEvIds.map(eid=>`<a class="evidence-link" data-eid="${eid}" style="margin-right:4px">${eid}</a>`).join('');
    newEvTag=`<div style="margin-top:3px;font-size:9px;color:#ffa502">🔍 新证据：${evLinks}</div>`;
  }
  box.innerHTML=`<div class="bhead"><span class="bname" style="color:${nc}">${msg.speaker}</span><span class="btag" style="border-color:${nc};color:${nc}">${tag}</span></div><div class="bbody"></div>${newEvTag}`;
  chat.appendChild(box);chat.scrollTop=chat.scrollHeight;
  typewriter(box.querySelector('.bbody'),msg.arena_summary||msg.content,TW_SPEED);
  bindEvLinks(box);
}

const ANIM_CLASSES='cast-attack cast-buff hit-critical hit-heavy defend acc-up-anim'.split(' ');

function clearAnimClasses(el){ANIM_CLASSES.forEach(c=>el.classList.remove(c))}

function showProjectile(speaker,target,type){
  const overlay=document.getElementById('duel-overlay');if(!overlay.classList.contains('active'))return;
  playSound('challenge');
  const isL=(speaker===duelSpeaker);
  // Dynamic: bind to actual avatar element positions, shortened toward center
  const rawSX=getDuelCenterX(isL?'left':'right');
  const rawEX=getDuelCenterX(isL?'right':'left');
  // Shorten: move start toward end, move end toward start
  const sX=isL?rawSX+DUEL_ARROW_SHORTEN:rawSX-DUEL_ARROW_SHORTEN;
  const eX=isL?rawEX-DUEL_ARROW_SHORTEN:rawEX+DUEL_ARROW_SHORTEN;
  const y=getDuelSpriteY(isL?'left':'right');
  const el=document.createElement('div');el.className='projectile';
  const img=FX_IMAGES[type];
  if(img){el.innerHTML=`<img src="${img}" style="width:24px;height:24px">`}
  else if(type==='challenge'){el.textContent='🔥';el.style.fontSize='22px'}
  else if(type==='counter'){el.textContent='⚡';el.style.fontSize='24px'}
  else{el.textContent='✨';el.style.fontSize='20px'}
  el.style.left=sX+'px';el.style.top=y+'px';overlay.appendChild(el);el.offsetHeight;
  el.style.left=eX+'px';el.style.top=y+'px';
  // Impact FX at target avatar center (same position as projectile end)
  setTimeout(()=>{const fx=document.createElement('div');fx.className='fx-icon';
    if(type==='challenge'){fx.textContent='💥'}
    else if(type==='counter'){fx.textContent='💫'}
    else{fx.textContent='💚'}
    fx.style.left=(eX-12)+'px';fx.style.top='80px';overlay.appendChild(fx);setTimeout(()=>fx.remove(),FX_ICON_MS)},PROJECTILE_MS);
  setTimeout(()=>el.remove(),PROJECTILE_MS+200);
}

function showFxIcon(name,emoji){
  const overlay=document.getElementById('duel-overlay');
  const el=document.createElement('div');el.className='fx-icon';el.textContent=emoji;
  const isShield=emoji==='🛡️';
  if(isShield)playSound('defend');
  if(overlay.classList.contains('active')){
    const isL=(name===duelSpeaker);
    const cx=getDuelCenterX(isL?'left':'right');
    const sy=getDuelSpriteY(isL?'left':'right');
    if(isShield){
      // Shield: inward toward screen center (toward center from avatar)
      el.style.left=(cx+(isL?15:-15))+'px';el.style.top=sy+'px';
    }else{
      // Explosion/skull/heart: slightly outward from avatar center + up
      el.style.left=(cx+(isL?-15:15))+'px';el.style.top=(sy-50)+'px';
    }
    overlay.appendChild(el);
  }else{
    const av=avatars[name];if(!av)return;
    el.style.left=(parseFloat(av.el.dataset.cx)-12)+'px';
    el.style.top=(parseFloat(av.el.dataset.cy)-30)+'px';
    document.getElementById('battle').appendChild(el);
  }
  setTimeout(()=>el.remove(),FX_ICON_MS);
}

let twTimers=[];
function typewriter(el,text,speed){
  twTimers.forEach(t=>clearInterval(t));twTimers=[];
  const html=renderMdHtml(escapeHtml(text)).replace(/E(\d{3})/g,'<a class="evidence-link" data-eid="E$1">E$1</a>');
  el.dataset.twFull=html;let pos=0;const batch=TW_BATCH;
  const chatEl=document.getElementById('duel-chat');
  const t=setInterval(()=>{
    pos+=batch;
    if(pos>=html.length){el.innerHTML=html;bindEvLinks(el);clearInterval(t);twTimers=twTimers.filter(x=>x!==t);chatEl.scrollTop=chatEl.scrollHeight;return}
    let safe=pos,inTag=false;
    for(let i=0;i<pos&&i<html.length;i++){if(html[i]==='<')inTag=true;if(html[i]==='>'&&inTag)inTag=false}
    if(inTag)safe=html.indexOf('>',pos)+1||pos;
    el.innerHTML=html.substring(0,safe)+'<span style="animation:blink-cursor .4s steps(1) infinite;background:var(--fg)">▌</span>';
    chatEl.scrollTop=chatEl.scrollHeight;
  },speed);twTimers.push(t);
}

function completeTypewriters(){twTimers.forEach(t=>clearInterval(t));twTimers=[];document.querySelectorAll('[data-tw-full]').forEach(el=>{el.innerHTML=el.dataset.twFull;bindEvLinks(el)})}

function advancePred(name){
  const agent=(DATA.agents||[]).find(a=>a.name===name);
  if(!agent||!agent.prediction_history)return{changed:false,confDelta:0,oldPred:null,newPred:null};
  const ptr=predPtr[name]||0;
  if(ptr<agent.prediction_history.length){
    const p=agent.prediction_history[ptr];const prev=predMap[name];
    const changed=prev&&(prev.winner!==p.winner||prev.score!==p.score);
    const confDelta=p.confidence-(prev?prev.confidence:0);
    const oldP={winner:prev?.winner||'-',score:prev?.score||'',confidence:prev?.confidence||0};
    predMap[name]={winner:p.winner,score:p.score,confidence:p.confidence};
    predPtr[name]=ptr+1;
    if(ptr===0){const av=avatars[name];if(av)av.el.classList.remove('no-stance')}
    updateAvatarHP(name);updateDuelAvatarHP(name);
    if(changed)showPredChange(name,oldP,predMap[name]);
    return{changed,confDelta,oldPred:oldP,newPred:{...predMap[name]}};
  }
  return{changed:false,confDelta:0,oldPred:null,newPred:null};
}

function peekTargetPred(targetName){
  const agent=(DATA.agents||[]).find(a=>a.name===targetName);
  if(!agent||!agent.prediction_history)return null;
  const ptr=predPtr[targetName]||0;if(ptr>=agent.prediction_history.length)return null;
  const p=agent.prediction_history[ptr];const prev=predMap[targetName];
  const changed=prev&&(prev.winner!==p.winner||prev.score!==p.score);
  const confDelta=p.confidence-(prev?prev.confidence:0);
  const oldP={winner:prev?.winner||'-',score:prev?.score||'',confidence:prev?.confidence||0};
  return{changed,confDelta,oldPred:oldP,newPred:{winner:p.winner,score:p.score,confidence:p.confidence}};
}

function applyTargetPeek(targetName,peek){if(!peek)return;predMap[targetName]={...peek.newPred};updateAvatarHP(targetName);updateDuelAvatarHP(targetName)}

function stepForward(){
  // If animations are locked (duel playing), skip this step
  if(duelAnimLock){return true}
  // If quote is pending (pre-attack quote shown, waiting for click to start attack)
  if(quotePending){
    quotePending=false;
    completeTypewriters(); // Finish quote bubble text immediately
    // Start attack animations using saved duel info
    duelAnimLock=true;
    startAttackAnimations(duelSpeaker,duelTarget,duelArrowType||'challenge',currentDuelTargetPeek,currentDuelMsg);
    addDuelBubble(currentDuelMsg);
    setTimeout(()=>{duelAnimLock=false},CHALLENGE_ANIM_MS);
    return true;
  }
  // If there's a pending duel (arrow shown, waiting for click), process it
  if(duelPending){processPendingDuel();return true}
  // If trophy is scheduled (arbitrator bubble shown), dismiss bubble and show trophy
  if(trophyScheduled){
    trophyScheduled=false;
    dismissArbBubbleAndShowTrophy();
    return true;
  }
  if(idx>=flat.length-1){stopPlay();if(!victoryShown){showVictoryScreen();victoryShown=true}return false}
  completeTypewriters();playSound('step');idx++;showItem(idx);updateProgress();return true;
}

function stepBack(){
  if(idx<=0)return;completeTypewriters();const target=idx-1;
  duelPending=null;quotePending=false;stanceBubbleEl=null;arbBubbleEl=null;
  document.getElementById('dialog-area').innerHTML='';currentChainRoot=null;currentDuelPair='';inChain=false;chainChanges=[];
  document.getElementById('victory-screen').classList.remove('active');victoryShown=false;
  document.getElementById('battle').querySelectorAll('.speech-bubble,.fx-icon,.float-text,.projectile,.magic-circle,.rt-arrow').forEach(e=>e.remove());
  removeRoundTableArrow();
  Object.keys(predPtr).forEach(k=>predPtr[k]=0);
  (DATA.agents||[]).forEach(a=>{const ph=a.prediction_history;if(ph&&ph[0])predMap[a.name]={winner:ph[0].winner,score:ph[0].score,confidence:ph[0].confidence};else predMap[a.name]={winner:'-',score:'',confidence:0}});
  buildAvatars();hideDuelOverlay();idx=-1;
  for(let i=0;i<=target;i++){idx=i;const item=flat[i];if(item.sep)addSep(item.label);else if(item.end)addEndCard(item);else if(item.phaseVerdict){/* skip phase verdict visuals during replay */}else{const info=advancePred(item.msg.speaker);addLogRow(item.msg,info.changed);if(item.msg.target)showDuelForItem(item.msg,info,true);else if(item.msg.action==='立场')showStanceBubble(item.msg,info);else{hideDuelOverlay();removeRoundTableArrow();clearBattle();if(avatars[item.msg.speaker])avatars[item.msg.speaker].el.classList.add('speaking')}}}
  updateProgress();
}

  if(top<4)top=4;
  bub.style.left=left+'px';bub.style.top=top+'px';
  bindEvLinks(bub);
  arbBubbleEl=bub;
  // Bubble persists until next action — no auto-dismiss
}

// ═══════════════════════════════════════════════════════════
// DUEL FLOW: arrow → click → overlay → animations
// ═══════════════════════════════════════════════════════════
function showDuelForItem(msg,predInfo,autoProceed){
  const arrowType=msg.action==='质疑'?'challenge':msg.counter_challenge?'counter':'response';
  const isResponse=arrowType==='response';
  const newPair=msg.speaker+'|'+msg.target,newPairReverse=msg.target+'|'+msg.speaker;
  const overlay=document.getElementById('duel-overlay');
  let targetPeek=null;if(!isResponse&&msg.target)targetPeek=peekTargetPred(msg.target);

  // Track chain
  inChain=true;
  if(targetPeek){
    chainChanges.push({speaker:msg.speaker,target:msg.target,changed:targetPeek.changed,oldPred:targetPeek.oldPred,newPred:targetPeek.newPred,arrowType});
  }

  if(!autoProceed&&currentDuelPair!==newPair&&currentDuelPair!==newPairReverse){
    // Interactive mode: show arrow on round table, wait for click (or auto-proceed if playing)
    removeRoundTableArrow();
    showRoundTableArrow(msg.speaker,msg.target,arrowType);
    // Dim other avatars and table to highlight participants
    Object.entries(avatars).forEach(([n,a])=>{
      clearAnimClasses(a.el);
      if(n===msg.speaker||n===msg.target){a.el.classList.add('speaking');a.el.classList.remove('dimmed')}
      else{a.el.classList.add('dimmed')}
    });
    document.getElementById('table').classList.add('dimmed');
    // Store pending duel info
    duelPending={speaker:msg.speaker,target:msg.target,arrowType,targetPeek,msg,predInfo,isResponse};
    // Auto-proceed if currently playing; otherwise stop and wait for user click
    if(playing){
      setTimeout(()=>{if(duelPending)processPendingDuel()},1500);
    }
    // Fade out existing overlay if active
    if(overlay.classList.contains('active'))overlay.classList.remove('active');
  }else{
    // Auto-proceed mode (stepBack/progress rebuild) or same pair
    if(currentDuelPair!==newPair&&currentDuelPair!==newPairReverse){
      // New pair, auto-proceed
      removeRoundTableArrow();
      showDuelOverlay(msg.speaker,msg.target,arrowType);
      removeRoundTableArrow();
    }else{
      updateArrowColor(arrowType);
    }
    if(isResponse){runResponseAnimations(msg.speaker,predInfo,msg);addDuelBubble(msg)}
    else runChallengeAnimations(msg.speaker,msg.target,arrowType,targetPeek,msg,true);
  }
}

function processPendingDuel(){
  if(!duelPending)return;
  const p=duelPending;duelPending=null;
  removeRoundTableArrow();
  // Clear stance/arbitrator bubbles
  if(stanceBubbleEl&&stanceBubbleEl.parentNode)stanceBubbleEl.remove();stanceBubbleEl=null;
  if(arbBubbleEl&&arbBubbleEl.parentNode)arbBubbleEl.remove();arbBubbleEl=null;
  // Un-dim round table avatars
  _clearAllEmphasis();
  // Show duel overlay (fade in)
  showDuelOverlay(p.speaker,p.target,p.arrowType);
  // Lock animations to prevent auto-play from advancing too fast
  duelAnimLock=true;
  setTimeout(()=>{
    if(p.isResponse){
      runResponseAnimations(p.speaker,p.predInfo,p.msg);
      addDuelBubble(p.msg);
      // Unlock after response animation completes
      setTimeout(()=>{duelAnimLock=false},RESPONSE_ANIM_MS);
    }else{
      // runChallengeAnimations handles its own lock management (may set quotePending)
      runChallengeAnimations(p.speaker,p.target,p.arrowType,p.targetPeek,p.msg);
      // Only unlock if quote is NOT pending (otherwise stepForward will manage the lock)
      if(!quotePending){
        setTimeout(()=>{duelAnimLock=false},CHALLENGE_ANIM_MS);
      }else{
        // Quote is shown, unlock so user can click to proceed
        duelAnimLock=false;
      }
    }
  },DUEL_ANIM_DELAY);
}

function runChallengeAnimations(speaker,target,arrowType,targetPeek,msg,skipQuote){
  // Pre-attack: show target's last speech as a quote bubble in duel chat (only at duel start)
  // skipQuote=true means we're in replay/rebuild mode — skip the quote pause entirely
  const chat=document.getElementById('duel-chat');
  const targetContent=findLastSpeechContent(target);
  // Save for stepForward quotePending resolution
  currentDuelTargetPeek=targetPeek;currentDuelMsg=msg;duelArrowType=arrowType;
  if(!skipQuote&&chat&&chat.children.length===0&&targetContent){
    showPreAttackQuoteInChat(target,targetContent);
    if(!playing){
      // Manual mode: pause here, next click starts the actual attack
      quotePending=true;
      return;
    }
    // Auto-play: small delay then start attack (with proper lock)
    duelAnimLock=true;
    setTimeout(()=>{
      startAttackAnimations(speaker,target,arrowType,targetPeek,msg);
      addDuelBubble(msg);
      setTimeout(()=>{duelAnimLock=false},CHALLENGE_ANIM_MS);
    },1200);
    return;
  }
  // No quote to show, proceed directly
  startAttackAnimations(speaker,target,arrowType,targetPeek,msg);
  addDuelBubble(msg);
}

function startAttackAnimations(speaker,target,arrowType,targetPeek,msg){
  showCasting(speaker,'attack');
  showDuelSpeechBubble(speaker,msg?.arena_bubble,arrowType);
  setTimeout(()=>showProjectile(speaker,target,arrowType),350);
  setTimeout(doShake,300);
  setTimeout(()=>{
    if(targetPeek){
      if(targetPeek.changed){
        // Prediction changed — heavy damage + flash screen + center popup
        applyTargetPeek(target,targetPeek);
        showHitHeavy(target);
        showFloatTextAt(target,`预测变化：${targetPeek.newPred.winner} ${targetPeek.newPred.score}`,'pred-changed');
        // Center popup: determine change type
        const stanceChanged=targetPeek.oldPred.winner!==targetPeek.newPred.winner;
        if(stanceChanged){
          showPredCenterPopup(pickRandom(PRED_CHANGE_MESSAGES.stance_changed).replace('{name}',target),'type-stance',target);
        }else{
          showPredCenterPopup(pickRandom(PRED_CHANGE_MESSAGES.score_changed).replace('{name}',target),'type-score',target);
        }
      }else if(targetPeek.confDelta!==0){
        applyTargetPeek(target,targetPeek);
        if(targetPeek.confDelta>0){
          showAccUp(target);
          showFloatTextAt(target,`准+${targetPeek.confDelta}`,'acc-up');
          showPredCenterPopup(pickRandom(PRED_CHANGE_MESSAGES.conf_up).replace('{name}',target),'type-conf-up',target);
        }else{
          showHitCritical(target);
          showFloatTextAt(target,`准${targetPeek.confDelta}`,'acc-down');
          showPredCenterPopup(pickRandom(PRED_CHANGE_MESSAGES.conf_down).replace('{name}',target),'type-conf-down',target);
        }
      }else{
        showDefend(target);
        showFloatTextAt(target,'准-0','acc-same');
      }
    }else{
      showDefend(target);
      showFloatTextAt(target,'准-0','acc-same');
    }
  },1250);
}

function runResponseAnimations(speaker,predInfo,msg){
  playSound('response');
  showCasting(speaker,'buff');
  showDuelSpeechBubble(speaker,msg?.arena_bubble,'response');
  setTimeout(()=>showMagicCircle(speaker),200);
  setTimeout(()=>{
    showFloatTextAt(speaker,'回应','response-text');
  },500);
}

function showDuelSpeechBubble(name,bubble,arrowType){
  if(!bubble)return;
  const overlay=document.getElementById('duel-overlay');if(!overlay.classList.contains('active'))return;
  const isL=(name===duelSpeaker);const duelAv=document.getElementById(isL?'duel-left':'duel-right');if(!duelAv)return;
  const el=document.createElement('div');el.className='duel-speech';
  const c=arrowType==='challenge'?'#ef5350':arrowType==='counter'?'#ffa502':'#4fc3f7';
  el.style.borderColor=c;el.style.color=c;
  // Left avatar: bubble toward center (right side); Right avatar: mirror (left side)
  if(isL){el.style.right='-70px';el.style.top='-40px'}
  else{el.style.left='-70px';el.style.top='-40px'}
  el.textContent=bubble;
  duelAv.appendChild(el);setTimeout(()=>el.remove(),BATTLE_CRY_MS);
}

function showItem(i){
  const item=flat[i];
  if(item.sep){addSep(item.label);clearBattle();
    if(inChain&&chainChanges.length){hideDuelOverlay();removeRoundTableArrow();showChainReport();inChain=false;chainChanges=[]}
    return;
  }
  if(item.phaseVerdict){
    const summary=item.arena_summary||item.content;
    const isFinal=item.is_final||false;
    showArbitratorBubble(summary,item.consensus);
    const area=document.getElementById('dialog-area');
    const row=document.createElement('div');row.className='msg-row stance';
    const tagLabel=isFinal?(item.consensus?'✅共识·终裁':'⚖️终裁'):(item.consensus?'✅共识':'⚖️未共识');
    row.innerHTML=`<div class="mr-head"><span class="mr-name" style="color:var(--accent)">⚖️ 仲裁者</span><span class="mr-tag" style="border-color:var(--accent);color:var(--accent)">${tagLabel}</span></div><div class="mr-body">${renderMdHtml(escapeHtml(item.content)).replace(/E(\d{3})/g,'<a class="evidence-link" data-eid="E$1">E$1</a>')}</div>`;
    area.appendChild(row);area.scrollTop=area.scrollHeight;bindEvLinks(row);
    // 最终仲裁：播放奖杯动画
    if(isFinal&&!victoryShown){scheduleTrophyAfterArbitrator()}
    return;
  }
  if(item.end){
    addEndCard(item);clearBattle();
    if(inChain&&chainChanges.length){hideDuelOverlay();removeRoundTableArrow();showChainReport();inChain=false;chainChanges=[]}
    if(item.msg?.speaker==='仲裁者')showArbitratorBubble(item.msg.content,DATA.consensus);
    // Auto-show trophy after arbitrator verdict bubble exits
    if(item.endTitle==='仲裁者裁定'||item.endTitle==='最终裁定'){
      if(!victoryShown){
        // In auto-play: wait for bubble display time then exit then show trophy
        // In manual: next click dismisses bubble, then trophy shows
        scheduleTrophyAfterArbitrator();
      }
    }
    return;
  }
  const msg=item.msg;const predInfo=advancePred(msg.speaker);

  if(msg.target){showDuelForItem(msg,predInfo)}
  else if(msg.action==='立场'){showStanceBubble(msg,predInfo)}
  else{
    if(!document.getElementById('duel-overlay').classList.contains('active')){
      clearBattle();if(avatars[msg.speaker])avatars[msg.speaker].el.classList.add('speaking');
    }
  }
  addLogRow(msg,predInfo.changed);
}

function startPlay(){if(idx>=flat.length-1)return;playing=true;document.getElementById('btn-play').textContent='⏸';scheduleNext(parseInt(document.getElementById('speed').value))}
function stopPlay(){playing=false;document.getElementById('btn-play').textContent='▶';clearTimeout(timer)}
function scheduleNext(spd){if(!playing)return;const delay=duelAnimLock?500:spd;timer=setTimeout(()=>{if(!stepForward())return;scheduleNext(spd)},delay)}

document.getElementById('btn-play').onclick=()=>playing?stopPlay():startPlay();
document.getElementById('btn-next').onclick=()=>{stopPlay();stepForward()};
document.getElementById('btn-prev').onclick=()=>{stopPlay();stepBack()};
document.getElementById('speed').onchange=()=>{if(playing){stopPlay();startPlay()}};

document.getElementById('progress').onclick=e=>{
  stopPlay();const rect=e.currentTarget.getBoundingClientRect();const pct=(e.clientX-rect.left)/rect.width;const target=Math.round(pct*(flat.length-1));
  duelPending=null;quotePending=false;stanceBubbleEl=null;arbBubbleEl=null;
  document.getElementById('dialog-area').innerHTML='';currentChainRoot=null;currentDuelPair='';inChain=false;chainChanges=[];
  document.getElementById('victory-screen').classList.remove('active');victoryShown=false;
  document.getElementById('battle').querySelectorAll('.speech-bubble,.fx-icon,.float-text,.projectile,.magic-circle,.rt-arrow').forEach(e=>e.remove());
  removeRoundTableArrow();
  Object.keys(predPtr).forEach(k=>predPtr[k]=0);
  (DATA.agents||[]).forEach(a=>{const ph=a.prediction_history;if(ph&&ph[0])predMap[a.name]={winner:ph[0].winner,score:ph[0].score,confidence:ph[0].confidence};else predMap[a.name]={winner:'-',score:'',confidence:0}});
  buildAvatars();hideDuelOverlay();idx=-1;
  for(let i=0;i<=target;i++){idx=i;const item=flat[i];if(item.sep)addSep(item.label);else if(item.end)addEndCard(item);else if(item.phaseVerdict){/* skip phase verdict visuals during replay */}else{const info=advancePred(item.msg.speaker);addLogRow(item.msg,info.changed);if(item.msg.target)showDuelForItem(item.msg,info,true);else if(item.msg.action==='立场')showStanceBubble(item.msg,info);else{hideDuelOverlay();removeRoundTableArrow();clearBattle();if(avatars[item.msg.speaker])avatars[item.msg.speaker].el.classList.add('speaking')}}}
  updateProgress();
};

function updateProgress(){const total=flat.length;const pct=total>1?(idx/(total-1))*100:0;document.querySelector('#progress .fill').style.width=pct+'%';document.getElementById('plabel').textContent=`${Math.max(0,idx+1)}/${total}`}

// ═══════════════════════════════════════════════════════════
// VICTORY SCREEN
// ═══════════════════════════════════════════════════════════
function showVictoryScreen(){
  playSound('victory');
  const sides={};DATA.agents.forEach(agent=>{const hist=agent.prediction_history;const last=hist&&hist.length>0?hist[hist.length-1]:null;if(last){const key=last.winner;if(!sides[key])sides[key]={winner:last.winner,score:last.score,color:resolveSideColor(last.winner),agents:[]};sides[key].agents.push(agent)}});
  const sideList=Object.values(sides).sort((a,b)=>b.agents.length-a.agents.length);const winner=sideList[0];if(!winner)return;
  const vPred=document.getElementById('v-pred');vPred.textContent=`${winner.winner} ${winner.score} 胜`;vPred.style.color=winner.color;
  const vSides=document.getElementById('v-sides');vSides.innerHTML='';
  sideList.forEach(s=>{const sDiv=document.createElement('div');sDiv.className='vside';const sLabel=document.createElement('div');sLabel.className='vside-label';sLabel.style.color=s.color;sLabel.style.borderColor=s.color;sLabel.textContent=`${s.winner} ${s.score} 胜（${s.agents.length}人）`;sDiv.appendChild(sLabel);
  const aDiv=document.createElement('div');aDiv.className='vagents';
  s.agents.forEach(agent=>{const idx=DATA.agents.indexOf(agent);const color=COLORS_HEX[idx%COLORS_HEX.length];const last=agent.prediction_history?.[agent.prediction_history.length-1];
    const img=AVATAR_IMAGES[agent.name];const spriteStyle=img?`border-color:${color};background-image:url('${img}')`:`border-color:${color};background:${color}22`;const spriteInner=img?'':`<span style="color:${color}">${idx+1}</span>`;
    const d=document.createElement('div');d.className='vagent';d.innerHTML=`<div class="sprite" style="${spriteStyle}">${spriteInner}</div><div class="vaname" style="color:${color}">${agent.name}</div><div class="vavpred" style="color:${s.color}">${last?last.winner+' '+last.score+' 胜':''}</div>`;aDiv.appendChild(d)});
  sDiv.appendChild(aDiv);vSides.appendChild(sDiv)});
  // Top-N 预测 — 追加到 victory-screen（独立一行，不在 vsides 内）
  const topPreds=DATA.top_predictions||[];
  if(topPreds.length>1){
    const tpDiv=document.createElement('div');tpDiv.className='vtopn';
    const tpTitle=document.createElement('div');tpTitle.className='vtopn-title';tpTitle.textContent='可能比分';
    tpDiv.appendChild(tpTitle);
    topPreds.forEach((p,i)=>{
      const item=document.createElement('div');item.className='vtopn-item'+(i===0?' vtopn-best':'');
      item.innerHTML=`<span class="vtopn-rank">#${i+1}</span><span class="vtopn-score">${escapeHtml(p.winner)} ${escapeHtml(p.score)} 胜</span><span class="vtopn-conf">${p.confidence||0}/10</span>`;
      tpDiv.appendChild(item);
    });
    document.getElementById('victory-screen').appendChild(tpDiv);
  }
  document.getElementById('victory-screen').classList.add('active');
}
// Removed close button — trophy auto-plays and persists

// ═══════════════════════════════════════════════════════════
// EVIDENCE
// ═══════════════════════════════════════════════════════════
function bindEvLinks(el){if(!el)return;el.querySelectorAll('.evidence-link').forEach(a=>{a.onclick=e=>{e.stopPropagation();showEv(a.dataset.eid,e)}})}
function showEv(eid,event){const ev=(DATA.evidence_pool||[]).find(e=>e.id===eid);const popup=document.getElementById('ev-popup');const content=document.getElementById('ev-content');
  if(ev){
    let urlLine='';
    if(ev.url)urlLine=`<div style="margin:4px 0"><a href="${ev.url}" target="_blank" rel="noopener" style="color:#4fc3f7;font-size:11px;word-break:break-all;text-decoration:underline">🔗 ${ev.url}</a></div>`;
    content.innerHTML=`<span class="eid">${ev.id}</span>${urlLine}<div style="margin-top:4px">${escapeHtml(ev.content)}</div><div class="einfo">来源：${ev.source||''} | 置信度：${ev.confidence}${ev.title?' | '+ev.title:''}</div>`;
  }else{content.innerHTML=`<span class="eid">${eid}</span> — 未找到`}
  popup.style.display='block';popup.style.left=Math.min(event.clientX+10,window.innerWidth-380)+'px';popup.style.top=Math.min(event.clientY+10,window.innerHeight-230)+'px'}
document.addEventListener('click',e=>{const p=document.getElementById('ev-popup');if(!p.contains(e.target)&&!e.target.classList.contains('evidence-link'))p.style.display='none'});

// Keyboard
document.addEventListener('keydown',e=>{if(!DATA)return;if(e.key===' '||e.code==='Space'){e.preventDefault();playing?stopPlay():startPlay()}else if(e.key==='ArrowRight'){e.preventDefault();stopPlay();stepForward()}else if(e.key==='ArrowLeft'){e.preventDefault();stopPlay();stepBack()}});

// Mouse click on game area: left = forward, right = backward
document.getElementById('arena-col').addEventListener('click',e=>{
  if(!DATA)return;
  // Don't intercept clicks on controls, evidence links, etc.
  if(e.target.closest('#ctrl')||e.target.closest('#ev-popup')||e.target.closest('.evidence-link')||e.target.closest('button')||e.target.closest('select'))return;
  stopPlay();stepForward();
});
document.getElementById('arena-col').addEventListener('contextmenu',e=>{
  if(!DATA)return;
  e.preventDefault();
  if(e.target.closest('#ctrl')||e.target.closest('#ev-popup'))return;
  stopPlay();stepBack();
});

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// TROPHY AFTER ARBITRATOR
// ═══════════════════════════════════════════════════════════
let trophyScheduled=false;
function scheduleTrophyAfterArbitrator(){
  trophyScheduled=true;
  if(playing){
    // Auto-play: wait enough for bubble to display and exit
    setTimeout(()=>{
      if(!trophyScheduled)return;
      trophyScheduled=false;
      dismissArbBubbleAndShowTrophy();
    },4000);
  }
  // Manual mode: trophy shows on next stepForward after bubble is dismissed
}
function dismissArbBubbleAndShowTrophy(){
  if(arbBubbleEl&&arbBubbleEl.parentNode){arbBubbleEl.remove();arbBubbleEl=null}
  hideDuelOverlay();
  if(!victoryShown){showVictoryScreen();victoryShown=true}
}

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function attrEscape(t){return t.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function truncateHtml(html,max){const text=html.replace(/<[^>]+>/g,'');if(text.length<=max)return html;let r='',l=0,inTag=false;for(let i=0;i<html.length&&l<max;i++){const c=html[i];if(c==='<')inTag=true;r+=c;if(!inTag)l++;if(c==='>')inTag=false}return r+'...'}

// ═══════════════════════════════════════════════════════════
// RESPONSIVE LAYOUT — reposition pentagon avatars on resize
// ═══════════════════════════════════════════════════════════
function updatePentagonPositions(){
  if(!DATA||!DATA.agents)return;
  const battle=document.getElementById('battle');
  if(!battle)return;
  const bw=battle.offsetWidth;
  const bh=battle.offsetHeight;
  if(bw===0||bh===0)return;
  // Scale only the RADIUS to fit container, keep center at user-configured CX/CY
  const scaleX=bw/640;
  const scaleY=bh/580;
  const cx=CX*scaleX, cy=CY, rx=RX*scaleX, ry=RY*scaleY;
  const n=DATA.agents.length||5;
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+(2*Math.PI*i/n);
    const px=cx+rx*Math.cos(a), py=cy+ry*Math.sin(a);
    const av=avatars[DATA.agents[i]?.name];
    if(av){
      av.el.style.left=(px-48)+'px';
      av.el.style.top=(py-24)+'px';
      av.el.dataset.cx=px;av.el.dataset.cy=py;
    }
  }
  // Special agents: keep relative to pentagon center
  const sa=document.getElementById('special-agents');
  if(sa)sa.style.top=(cy+ry+SP_OFFSET_Y)+'px';
  // Table position: always at user-configured CY + offset
  const tbl=document.getElementById('table');
  tbl.style.top=(CY+TABLE_OFFSET_Y)+'px';
}
